- {}
- oAuth2ClientCredentials:
  - nnef-eventexposure
paths:
  /notifications:
    post:
      description: Endpoint that the NF service consumer implements to receive Notifications
        generated by the producer NF. The producer calls this endpoint using the URI
        registered as the notification URI at subscription creation time.
      operationId: ReceiveNefEventExposureNotif
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NefEventExposureNotif'
        required: true
      responses:
        "204":
          description: The receipt of the Notification is acknowledged.
        "307":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedirectResponse'
          description: Temporary Redirect
          headers:
            Location:
              description: The URI pointing to the resource located on the redirect
                target
              explode: false
              required: true
              schema:
                type: string
              style: simple
            "3gpp-Sbi-Target-Nf-Id":
              description: |
                'Identifier of target NF (service) instance towards which the request is redirected'
              explode: false
              schema:
                type: string
              style: simple
        "308":
