    MediaType:
      description: Indicates the media type of a media component.
      title: mediaType
      type: string
    Mnc:
      description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits,\
        \ as defined in  clause 9.3.3.5 of 3GPP TS 38.413. \n"
      pattern: "^\\d{2,3}$"
      title: Mnc
      type: string
    MpxMediaInfo:
      anyOf: []
      description: Contains the Multiplexed Media Identification Information.
      example:
        payloadType: 84
        rtcpPacketType: 26
        identificationTag: identificationTag
        ssrcId: 86987008
        rtpSdesHdrExtId: 0
      nullable: true
      properties:
        ssrcId:
          description: |
            Integer where the allowed values correspond to the value range of an unsigned 32-bit integer.
          maximum: 4294967295
          minimum: 0
          title: Uint32
          type: integer
        payloadType:
          maximum: 127
          minimum: 0
          title: payloadType
          type: integer
        identificationTag:
          title: identificationTag
          type: string
        rtpSdesHdrExtId:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: ueNum
          type: integer
        rtcpPacketType:
          maximum: 255
          minimum: 0
          title: rtcpPacketType
          type: integer
      title: MpxMediaInfo
      type: object
    MriTransferMethod:
      description: "This data type indicates the method used for transferring Media\
        \ Related Information.  \n"
      title: MriTransferMethod
      type: string
    MsConsumptionCollection:
      description: |
        Contains the Media Streaming Consumption information collected for an UE Application via AF.
      example:
        msConsumps:
        - msConsumps
        - msConsumps
      properties:
        msConsumps:
          items:
            description: |
              Represents the Media Streaming Consumption reports with formatting as specified in  clause 11.3.3 of 3GPP TS 26.512 [30], if required for Media Streaming UE Application.
            type: string
          minItems: 1
          title: msConsumps
          type: array
      required:
      - msConsumps
      title: MsConsumptionCollection
      type: object
    MsQoeMetricsCollection:
      description: |
