    NgeNbId:
      description: "This represents the identifier of the ng-eNB ID as specified in\
        \ clause 9.3.1.8 of  3GPP TS 38.413. The value of the ng-eNB ID shall be encoded\
        \ in hexadecimal representation.  Each character in the string shall take\
        \ a value of \"0\" to \"9\", \"a\" to \"f\" or \"A\" to \"F\" and  shall represent\
        \ 4 bits. The padding 0 shall be added to make multiple nibbles, so the most\
        \  significant character representing the padding 0 if required together with\
        \ the 4 most  significant bits of the ng-eNB ID shall appear first in the\
        \ string, and the character  representing the 4 least significant bit of the\
        \ ng-eNB ID (to form a nibble) shall appear last  in the string. \n"
      example: SMacroNGeNB-34B89
      pattern: "^(MacroNGeNB-[A-Fa-f0-9]{5}|LMacroNGeNB-[A-Fa-f0-9]{6}|SMacroNGeNB-[A-Fa-f0-9]{5})$"
      title: NgeNbId
      type: string
    Nid:
      description: "This represents the Network Identifier, which together with a\
        \ PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS 23.501\
        \ clause 5.30.2.1). \n"
      pattern: "^[A-Fa-f0-9]{11}$"
      title: Nid
      type: string
    NrCellId:
      description: "36-bit string identifying an NR Cell Id as specified in clause\
        \ 9.3.1.7 of 3GPP TS 38.413,  in hexadecimal representation. Each character\
        \ in the string shall take a value of \"0\" to \"9\",  \"a\" to \"f\" or \"\
        A\" to \"F\" and shall represent 4 bits. The most significant character  representing\
        \ the 4 most significant bits of the Cell Id shall appear first in the string,\
        \ and  the character representing the 4 least significant bit of the Cell\
        \ Id shall appear last in the  string. \n"
      pattern: "^[A-Fa-f0-9]{9}$"
      title: NrCellId
      type: string
    NrLocation:
      description: Contains the NR user location.
      example:
        ignoreNcgi: false
        geographicalInformation: geographicalInformation
        globalGnbId:
          eNbId: eNbId
          wagfId: wagfId
          tngfId: tngfId
          gNbId:
            bitLength: 24
            gNBValue: gNBValue
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          n3IwfId: n3IwfId
          ngeNbId: SMacroNGeNB-34B89
        ageOfLocationInformation: 23138
        ncgi:
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          nrCellId: nrCellId
        ntnTaiInfo:
          tacList:
          - null
          - null
          derivedTac: derivedTac
          plmnId:
            mnc: mnc
            nid: nid
            mcc: mcc
        tai:
          tac: tac
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
        ueLocationTimestamp: 2000-01-23T04:56:07.000+00:00
        geodeticInformation: geodeticInformation
      properties:
        tai:
          $ref: '#/components/schemas/Tai'
        ncgi:
          $ref: '#/components/schemas/Ncgi'
        ignoreNcgi:
          default: false
          title: ignoreNcgi
          type: boolean
        ageOfLocationInformation:
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station. Value "0" indicates that the location information was obtained after a successful paging procedure for Active Location Retrieval when the UE is in idle mode or after a successful  NG-RAN location reporting procedure with the eNB when the UE is in connected mode. Any other value than "0" indicates that the location information is the last known one. See 3GPP TS 29.002 clause 17.7.8.
          maximum: 32767
          minimum: 0
          title: ageOfLocationInformation
          type: integer
        ueLocationTimestamp:
          description: string with format "date-time" as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        geographicalInformation:
          description: |
            Refer to geographical Information. See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{16}$"
          title: geographicalInformation
          type: string
        geodeticInformation:
          description: |
            Refers to Calling Geodetic Location. See ITU-T Recommendation Q.763 (1999) [24] clause 3.88.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{20}$"
          title: geodeticInformation
          type: string
        globalGnbId:
          $ref: '#/components/schemas/GlobalRanNodeId'
        ntnTaiInfo:
          $ref: '#/components/schemas/NtnTaiInfo'
      required:
      - ncgi
      - tai
      title: NrLocation
      type: object
    NtnTaiInfo:
      description: Contains NR NTN TAI Information.
      example:
        tacList:
        - null
        - null
        derivedTac: derivedTac
        plmnId:
          mnc: mnc
          nid: nid
          mcc: mcc
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnIdNid'
        tacList:
          items:
            $ref: '#/components/schemas/Tac'
          minItems: 1
          title: tacList
          type: array
        derivedTac:
          description: "2 or 3-octet string identifying a tracking area code as specified\
            \ in clause 9.3.3.10  of 3GPP TS 38.413, in hexadecimal representation.\
            \ Each character in the string shall  take a value of \"0\" to \"9\",\
            \ \"a\" to \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most\
            \ significant character representing the 4 most significant bits of the\
            \ TAC shall  appear first in the string, and the character representing\
            \ the 4 least significant bit  of the TAC shall appear last in the string.\
            \ \n"
          pattern: "(^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)"
          title: Tac
          type: string
      required:
      - plmnId
      - tacList
      title: NtnTaiInfo
      type: object
