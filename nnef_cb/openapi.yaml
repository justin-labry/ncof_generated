          title: Float
          type: number
      title: SvcExperience
      type: object
    Tac:
      description: "2 or 3-octet string identifying a tracking area code as specified\
        \ in clause 9.3.3.10  of 3GPP TS 38.413, in hexadecimal representation. Each\
        \ character in the string shall  take a value of \"0\" to \"9\", \"a\" to\
        \ \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most significant\
        \ character representing the 4 most significant bits of the TAC shall  appear\
        \ first in the string, and the character representing the 4 least significant\
        \ bit  of the TAC shall appear last in the string. \n"
      pattern: "(^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)"
      title: Tac
      type: string
    Tai:
      description: Contains the tracking area identity as described in 3GPP 23.003
      example:
        tac: tac
        nid: nid
        plmnId:
          mnc: mnc
          mcc: mcc
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        tac:
          description: "2 or 3-octet string identifying a tracking area code as specified\
            \ in clause 9.3.3.10  of 3GPP TS 38.413, in hexadecimal representation.\
            \ Each character in the string shall  take a value of \"0\" to \"9\",\
            \ \"a\" to \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most\
            \ significant character representing the 4 most significant bits of the\
            \ TAC shall  appear first in the string, and the character representing\
            \ the 4 least significant bit  of the TAC shall appear last in the string.\
            \ \n"
          pattern: "(^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)"
          title: Tac
          type: string
        nid:
          description: "This represents the Network Identifier, which together with\
            \ a PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS\
            \ 23.501 clause 5.30.2.1). \n"
          pattern: "^[A-Fa-f0-9]{11}$"
          title: Nid
          type: string
      required:
      - plmnId
      - tac
      title: Tai
      type: object
    TimeWindow:
      description: Represents a time window identified by a start time and a stop
        time.
      example:
        startTime: 2000-01-23T04:56:07.000+00:00
        stopTime: 2000-01-23T04:56:07.000+00:00
      properties:
        startTime:
          description: string with format "date-time" as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        stopTime:
          description: string with format "date-time" as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
      required:
      - startTime
      - stopTime
      title: TimeWindow
      type: object
    TnapId:
      description: Contain the TNAP Identifier see clause5.6.2 of 3GPP TS 23.501.
      example:
        bssId: bssId
        civicAddress: civicAddress
        ssId: ssId
      properties:
        ssId:
          description: "This IE shall be present if the UE is accessing the 5GC via\
            \ a trusted WLAN access network.When present, it shall contain the SSID\
            \ of the access point to which the UE is attached, that is received over\
            \ NGAP,  see IEEE Std 802.11-2012. \n"
          title: ssId
          type: string
        bssId:
          description: "When present, it shall contain the BSSID of the access point\
            \ to which the UE is attached, that is received over NGAP, see IEEE Std\
            \ 802.11-2012. \n"
          title: bssId
          type: string
        civicAddress:
          description: string with format 'bytes' as defined in OpenAPI
          format: byte
          title: Bytes
          type: string
      title: TnapId
      type: object
    TngfId:
      description: "This represents the identifier of the TNGF ID as specified in\
        \ clause 9.3.1.161 of  3GPP TS 38.413  in hexadecimal representation. Each\
        \ character in the string shall take a value of \"0\" to \"9\", \"a\"  to\
        \ \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most significant\
        \ character representing the  4 most significant bits of the TNGF ID shall\
        \ appear first in the string, and the character  representing the 4 least\
        \ significant bit of the TNGF ID shall appear last in the string. \n"
      pattern: "^[A-Fa-f0-9]+$"
      title: TngfId
      type: string
    TosTrafficClass:
      description: |
        2-octet string, where each octet is encoded in hexadecimal representation. The first octet contains the IPv4 Type-of-Service or the IPv6 Traffic-Class field and the second octet contains the ToS/Traffic Class mask field.
      title: tosTC
      type: string
    TransportProtocol:
      description: "Possible values are:\n- UDP: User Datagram Protocol.\n- TCP: Transmission\
        \ Control Protocol. \n"
      title: protocol
      type: string
    TwapId:
      description: |
        Contain the TWAP Identifier as defined in clause 4.2.8.5.3 of 3GPP TS 23.501 or the WLAN location information as defined in clause 4.5.7.2.8 of 3GPP TS 23.402.
      example:
        bssId: bssId
        civicAddress: civicAddress
        ssId: ssId
      properties:
        ssId:
          description: "This IE shall contain the SSID of the access point to which\
            \ the UE is attached, that is received over NGAP, see IEEE Std 802.11-2012.\
            \ \n"
          title: ssId
          type: string
        bssId:
          description: "When present, it shall contain the BSSID of the access point\
            \ to which the UE is attached, for trusted WLAN access, see IEEE Std 802.11-2012.\
            \ \n"
          title: bssId
          type: string
        civicAddress:
          description: string with format 'bytes' as defined in OpenAPI
          format: byte
          title: Bytes
          type: string
      required:
      - ssId
      title: TwapId
      type: object
    UeCommunicationInfo:
      description: Contains UE communication information associated with an application.
      example:
        comms:
        - dlVol: 0
          startTime: 2000-01-23T04:56:07.000+00:00
          endTime: 2000-01-23T04:56:07.000+00:00
          ulVol: 0
        - dlVol: 0
          startTime: 2000-01-23T04:56:07.000+00:00
          endTime: 2000-01-23T04:56:07.000+00:00
          ulVol: 0
        appId: appId
        interGroupId: interGroupId
        supi: supi
      properties:
        supi:
          description: "String identifying a Supi that shall contain either an IMSI,\
            \ a network specific identifier,\na Global Cable Identifier (GCI) or a\
            \ Global Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS\
            \ 23.003. It shall be formatted as follows\n - for an IMSI \"imsi-<imsi>\"\
            , where <imsi> shall be formatted according to clause 2.2\n   of 3GPP\
            \ TS 23.003 that describes an IMSI.\n - for a network specific identifier\
            \ \"nai-<nai>, where <nai> shall be formatted\n   according to clause\
            \ 28.7.2 of 3GPP TS 23.003 that describes an NAI.\n - for a GCI \"gci-<gci>\"\
            , where <gci> shall be formatted according to clause 28.15.2\n   of 3GPP\
            \ TS 23.003.\n - for a GLI \"gli-<gli>\", where <gli> shall be formatted\
            \ according to clause 28.16.2 of\n   3GPP TS 23.003.To enable that the\
            \ value is used as part of an URI, the string shall\n   only contain characters\
            \ allowed according to the \"lower-with-hyphen\" naming convention\n \
            \  defined in 3GPP TS 29.501.\n"
          pattern: "^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$"
          title: Supi
          type: string
        interGroupId:
          description: "String identifying a group of devices network internal globally\
            \ unique ID which identifies a set of IMSIs, as specified in clause 19.9\
            \ of 3GPP TS 23.003. \n"
          pattern: "^[A-Fa-f0-9]{8}-[0-9]{3}-[0-9]{2,3}-([A-Fa-f0-9][A-Fa-f0-9]){1,10}$"
          title: GroupId
          type: string
        appId:
          description: String providing an application identifier.
          title: ApplicationId
          type: string
        comms:
          items:
            $ref: '#/components/schemas/CommunicationCollection'
          minItems: 1
          title: comms
          type: array
      required:
      - comms
      title: UeCommunicationInfo
      type: object
