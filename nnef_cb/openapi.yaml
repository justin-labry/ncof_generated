openapi: 3.0.0
info:
  description: |
    Callback receiver specification for the Nnef_EventExposure service.

    This spec is consumed by NCOF (the NF service consumer) that subscribes
    to AF/RICF (acting as NEF in this PoC) events. The consumer must implement an HTTP server that exposes
    the endpoint defined here so that AF/RICF (acting as NEF in this PoC) can deliver notifications to it.

    It is intentionally extracted from `TS29591_Nnef_EventExposure_PoC_ETRI_DoDo1.yaml` because OpenAPI Generator does
    not generate server stubs for the `callbacks:` section of an OpenAPI document.
    Generating from this standalone spec yields a ready-to-implement FastAPI server
    stub on the consumer side.

    Schema simplifications applied for code-generator compatibility (the original
    `TS29591_Nnef_EventExposure_PoC_ETRI_DoDo1.yaml` is unchanged):
      - `oneOf` constraints are dropped (validation deferred to business logic).
      - 3GPP forward-compatible enum pattern (`anyOf: [enum-string, free-string]`)
        is flattened to plain `type: string`.
      - All cross-file `$ref`s are inlined into this single document.

    6G-I2P ETRI-MoDuTec PoC Scenario.
  title: Nnef_EventExposure Notification (Callback Receiver)
  version: 0.1.0
servers:
- description: SwaggerHub API Auto Mocking
  url: https://virtserver.swaggerhub.com/ETRI_INRS_TEAM/Nnef_EventExposure_Notification_Callback_PoC_ETRI_DoDo1/0.1.0
- url: "{notifApiRoot}"
  variables:
    notifApiRoot:
      default: https://example.com
      description: "The base URL of the consumer NF that receives notifications from\
        \ the producer. The full callback URL registered during subscription must\
        \ be `{notifApiRoot}` + `/notifications`."
