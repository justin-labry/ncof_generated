      properties:
        event:
          description: "Represents a Network Exposure Event.  \nPossible values are:\n\
            - SVC_EXPERIENCE: Indicates that the subscribed/notified event is service\
            \ experience\n  information for an application.\n- UE_MOBILITY: Indicates\
            \ that the subscribed/notified event is UE mobility information.\n- UE_COMM:\
            \ Indicates that the subscribed/notified event is UE communication information.\n\
            - EXCEPTIONS: Indicates that the subscribed/notified event is exceptions\
            \ information.\n- USER_DATA_CONGESTION: Indicates that the subscribed/notified\
            \ event is user data congestion\n  analytics related information.\n- PERF_DATA:\
            \ Indicates that the subscribed/notified event is performance data information.\n\
            - DISPERSION: Indicates that the subscribed/notified event is dispersion\
            \ information.\n- COLLECTIVE_BEHAVIOUR: Indicates that the subscribed/notified\
            \ event is collective behaviour\n  information.\n- MS_QOE_METRICS: Indicates\
            \ that the subscribed/notified event is Media Streaming QoE\n  metrics.\n\
            - MS_CONSUMPTION: Indicates that the subscribed/notified event is Media\
            \ Streaming\n  consumption reports.\n- MS_NET_ASSIST_INVOCATION: Indicates\
            \ that the subscribed/notified event is Media Streaming\n  network assistance\
            \ invocation.\n- MS_DYN_POLICY_INVOCATION: Indicates that the subscribed/notified\
            \ event is Media Streaming\n  dynamic policy invocation.\n- MS_ACCESS_ACTIVITY:\
            \ Indicates that the subscribed/notified event is Media Streaming access\n\
            \  activity.\n- GNSS_ASSISTANCE_DATA: Indicates that the subscribed/notified\
            \ event is GNSS Assistance Data\n  Collection.\n- DATA_VOLUME_TRANSFER_TIME:\
            \ Indicates that the event subscribed is data volume transfer \n  time\
            \ information.\n- APP_ACTIVE_TIME: Indicates that the event subscribed\
            \ is application activation time\n  information.\n- SIGNALLING_INFO: Indicates\
            \ that the event subscribed/notified is signalling information.\n"
          title: NefEvent
          type: string
        timeStamp:
          description: string with format "date-time" as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        svcExprcInfos:
