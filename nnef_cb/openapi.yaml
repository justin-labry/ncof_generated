            $ref: '#/components/schemas/Confidence'
        required:
        - confidence
        - includedAngle
        - innerRadius
        - offsetAngle
        - point
        - uncertaintyRadius
        type: object
      description: Ellipsoid Arc.
      title: EllipsoidArc
