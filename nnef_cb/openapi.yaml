          $ref: '#/components/schemas/VerticalDirection'
        hUncertainty:
          description: Indicates value of speed uncertainty.
          format: float
          maximum: 255
          minimum: 0
          title: hUncertainty
          type: number
        vUncertainty:
          description: Indicates value of speed uncertainty.
          format: float
          maximum: 255
          minimum: 0
          title: hUncertainty
          type: number
      required:
