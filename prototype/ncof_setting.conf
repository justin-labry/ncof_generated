# ==============================================================================
# NCOF Mock-up 설정 단일 출처 (Single Source of Truth)
# ------------------------------------------------------------------------------
# 이 파일 하나만 수정하고 서버를 재시작하면 포트·프로토콜이 반영됩니다.
#   - 각 NF의 run.sh / run_http2.sh 가 이 파일을 읽어 listen 포트·TLS 설정에 사용
#   - NCOF(nrf.py)·클라이언트(client2.py)가 이 파일을 읽어 대상 주소를 구성
#   - GUI(vite.config.ts)가 NCOF_PORT / NCOF_TLS 를 읽어 dev 프록시를 구성
# 이 파일은 git 으로 추적됩니다(.env 과 달리 clone 시 함께 공유됨).
# 우선순위: CLI 환경변수 > 이 파일 > 코드 기본값. (예: NCOF_TLS=1 sh run_http2.sh)
# ==============================================================================

# --- NF 호스트/포트 ---
NF_HOST=127.0.0.1
NCOF_PORT=9000
SMF_PORT=9001
NEF_PORT=9002
UPF_PORT=9003
PCF_PORT=9004

# --- HTTP/2 전송 모드 ---
# 0(또는 off)=h2c(평문 HTTP/2, 기본) · 1(또는 true/yes/on)=HTTP/2 over TLS(self-signed cert.pem/key.pem)
NCOF_TLS=0
