        supis:
          items:
            $ref: '#/components/schemas/Supi'
          minItems: 1
          title: supis
          type: array
        snssai:
          $ref: '#/components/schemas/Snssai'
        appId:
          description: String providing an application identifier.
          title: ApplicationId
          type: string
        srvExpcType:
          description: "Represents the type of the service experience analytics. \
            \ \nPossible values are:  \n- VOICE: Indicates that the service experience\
            \ analytics is for voice service.\n- VIDEO: Indicates that the service\
            \ experience analytics is for video service.\n- OTHER: Indicates that\
            \ the service experience analytics is for other service.\n"
          title: ServiceExperienceType
          type: string
        ueLocs:
          items:
            $ref: '#/components/schemas/LocationInfo'
          minItems: 1
          title: ueLocs
          type: array
        upfInfo:
          $ref: '#/components/schemas/UpfInformation'
        dnai:
          description: "DNAI (Data network access identifier), see clause 5.6.7 of\
            \ 3GPP TS 23.501."
          title: Dnai
          type: string
        appServerInst:
          $ref: '#/components/schemas/AddrFqdn'
        confidence:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
        dnn:
          description: |
            String representing a Data Network as defined in clause 9A of 3GPP TS 23.003;  it shall contain either a DNN Network Identifier, or a full DNN with both the Network  Identifier and Operator Identifier, as specified in 3GPP TS 23.003 clause 9.1.1 and 9.1.2. It shall be coded as string in which the labels are separated by dots  (e.g. "Label1.Label2.Label3").
          title: Dnn
          type: string
        networkArea:
          $ref: '#/components/schemas/NetworkAreaInfo'
        nsiId:
          description: Contains the Identifier of the selected Network Slice instance
          title: NsiId
          type: string
        ratio:
          description: "Unsigned integer indicating Sampling Ratio (see clauses 4.15.1\
            \ of 3GPP TS 23.502), expressed in percent. \n"
          maximum: 100
          minimum: 1
          title: SamplingRatio
          type: integer
        ratFreq:
          $ref: '#/components/schemas/RatFreqInformation'
        pduSesInfo:
          $ref: '#/components/schemas/PduSessionInfo'
      required:
      - svcExprc
      title: ServiceExperienceInfo
      type: object
    ServiceExperienceType:
      description: "Represents the type of the service experience analytics.  \nPossible\
        \ values are:  \n- VOICE: Indicates that the service experience analytics\
        \ is for voice service.\n- VIDEO: Indicates that the service experience analytics\
        \ is for video service.\n- OTHER: Indicates that the service experience analytics\
        \ is for other service.\n"
      title: ServiceExperienceType
      type: string
    Snssai:
      description: |
        When Snssai needs to be converted to string (e.g. when used in maps as key), the string shall be composed of one to three digits "sst" optionally followed by "-" and 6 hexadecimal digits "sd".
      example:
        sd: sd
        sst: 237
      properties:
        sst:
          description: "Unsigned integer, within the range 0 to 255, representing\
            \ the Slice/Service Type.  It indicates the expected Network Slice behaviour\
            \ in terms of features and services. Values 0 to 127 correspond to the\
            \ standardized SST range. Values 128 to 255 correspond  to the Operator-specific\
            \ range. See clause 28.4.2 of 3GPP TS 23.003. Standardized values are\
            \ defined in clause 5.15.2.2 of 3GPP TS 23.501. \n"
          maximum: 255
          minimum: 0
          title: sst
          type: integer
        sd:
          description: |
            3-octet string, representing the Slice Differentiator, in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the SD shall appear first in the string, and the character representing the 4 least significant bit of the SD shall appear last in the string. This is an optional parameter that complements the Slice/Service type(s) to allow to  differentiate amongst multiple Network Slices of the same Slice/Service type. This IE shall be absent if no SD value is associated with the SST.
          pattern: "^[A-Fa-f0-9]{6}$"
          title: sd
          type: string
      required:
      - sst
      title: Snssai
      type: object
    SscMode:
      description: "represents the service and session continuity mode It shall comply\
        \ with the provisions defined in table 5.4.3.6-1. \n"
      title: SscMode
      type: string
    Supi:
      description: "String identifying a Supi that shall contain either an IMSI, a\
        \ network specific identifier,\na Global Cable Identifier (GCI) or a Global\
        \ Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS 23.003. It\
        \ shall be formatted as follows\n - for an IMSI \"imsi-<imsi>\", where <imsi>\
        \ shall be formatted according to clause 2.2\n   of 3GPP TS 23.003 that describes\
        \ an IMSI.\n - for a network specific identifier \"nai-<nai>, where <nai>\
        \ shall be formatted\n   according to clause 28.7.2 of 3GPP TS 23.003 that\
        \ describes an NAI.\n - for a GCI \"gci-<gci>\", where <gci> shall be formatted\
        \ according to clause 28.15.2\n   of 3GPP TS 23.003.\n - for a GLI \"gli-<gli>\"\
        , where <gli> shall be formatted according to clause 28.16.2 of\n   3GPP TS\
        \ 23.003.To enable that the value is used as part of an URI, the string shall\n\
        \   only contain characters allowed according to the \"lower-with-hyphen\"\
        \ naming convention\n   defined in 3GPP TS 29.501.\n"
      pattern: "^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$"
      title: Supi
      type: string
    SupportedFeatures:
      description: |
        A string used to indicate the features supported by an API that is used as defined in clause  6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in  hexadecimal representation Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in  table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
      pattern: "^[A-Fa-f0-9]*$"
      title: supportedFeatures
      type: string
    SupportedGADShapes:
      description: Indicates supported GAD shapes.
      title: SupportedGADShapes
      type: string
    SvcExperience:
      description: Contains a mean opinion score with the customized range.
      example:
        mos: 5.962134
        lowerRange: 2.302136
        upperRange: 5.637377
      properties:
        mos:
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: varTransTimeUl
          type: number
        upperRange:
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: varTransTimeUl
          type: number
        lowerRange:
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: varTransTimeUl
          type: number
      title: SvcExperience
      type: object
    Tac:
      description: "2 or 3-octet string identifying a tracking area code as specified\
        \ in clause 9.3.3.10  of 3GPP TS 38.413, in hexadecimal representation. Each\
        \ character in the string shall  take a value of \"0\" to \"9\", \"a\" to\
        \ \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most significant\
        \ character representing the 4 most significant bits of the TAC shall  appear\
        \ first in the string, and the character representing the 4 least significant\
        \ bit  of the TAC shall appear last in the string. \n"
      pattern: "(^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)"
      title: Tac
      type: string
    Tai:
      description: Contains the tracking area identity as described in 3GPP 23.003
      example:
        tac: tac
        nid: nid
        plmnId:
          mnc: mnc
          mcc: mcc
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        tac:
          description: "2 or 3-octet string identifying a tracking area code as specified\
            \ in clause 9.3.3.10  of 3GPP TS 38.413, in hexadecimal representation.\
            \ Each character in the string shall  take a value of \"0\" to \"9\",\
            \ \"a\" to \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most\
            \ significant character representing the 4 most significant bits of the\
            \ TAC shall  appear first in the string, and the character representing\
            \ the 4 least significant bit  of the TAC shall appear last in the string.\
            \ \n"
          pattern: "(^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)"
          title: Tac
          type: string
        nid:
          description: "This represents the Network Identifier, which together with\
            \ a PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS\
            \ 23.501 clause 5.30.2.1). \n"
          pattern: "^[A-Fa-f0-9]{11}$"
          title: Nid
          type: string
      required:
      - plmnId
      - tac
      title: Tai
      type: object
    TermCause:
      description: "Represents the cause for the analytics subscription termination\
        \ request.  \nPossible values are:  \n  - USER_CONSENT_REVOKED: The user consent\
        \ has been revoked.\n  - NCOF_OVERLOAD: The NCOF is overloaded.\n  - UE_LEFT_AREA:\
        \ The UE has moved out of the NCOF serving area.\n"
      title: termCause
      type: string
    ThresholdLevel:
      description: Represents a threshold level.
      example:
        svcExpLevel: 3.3531933
        nfStorageUsage: 3
        minTrafficRate: minTrafficRate
        avgTrafficRate: avgTrafficRate
        varPacketDelay: 6.778325
        nfMemoryUsage: 6
        speed: 3.0937452
        avgPacketDelay: 1
        varPacketLossRate: 6.704019
        varTrafficRate: 6.965118
        congLevel: 6
        nfCpuUsage: 9
        maxTrafficRate: maxTrafficRate
        maxPacketDelay: 1
        nfLoadLevel: 8
        aggTrafficRate: aggTrafficRate
        avgPacketLossRate: 687
        maxPacketLossRate: 594
      properties:
        congLevel:
          title: congLevel
          type: integer
        nfLoadLevel:
          title: nfLoadLevel
          type: integer
        nfCpuUsage:
          title: nfCpuUsage
          type: integer
        nfMemoryUsage:
          title: nfMemoryUsage
          type: integer
        nfStorageUsage:
          title: nfStorageUsage
          type: integer
        avgTrafficRate:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        maxTrafficRate:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        minTrafficRate:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        aggTrafficRate:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        varTrafficRate:
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: varTransTimeUl
          type: number
        avgPacketDelay:
          description: |
            Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds.
          minimum: 1
          title: PacketDelBudget
          type: integer
        maxPacketDelay:
          description: |
            Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds.
          minimum: 1
          title: PacketDelBudget
          type: integer
        varPacketDelay:
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: varTransTimeUl
          type: number
        avgPacketLossRate:
          description: |
            Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
          maximum: 1000
          minimum: 0
          title: PacketLossRate
          type: integer
        maxPacketLossRate:
          description: |
            Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
          maximum: 1000
          minimum: 0
          title: PacketLossRate
          type: integer
        varPacketLossRate:
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: varTransTimeUl
          type: number
        svcExpLevel:
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: varTransTimeUl
          type: number
        speed:
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: varTransTimeUl
          type: number
      title: ThresholdLevel
      type: object
    TimeWindow:
      description: Represents a time window identified by a start time and a stop
        time.
      example:
        startTime: 2000-01-23T04:56:07.000+00:00
        stopTime: 2000-01-23T04:56:07.000+00:00
      properties:
        startTime:
          description: string with format 'date-time' as defined in OpenAPI.
