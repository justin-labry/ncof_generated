    MacAddr48:
      description: |
        String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
      pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
      title: destMacAddr
      type: string
    MatchingDirection:
      description: "Represents the matching direction when crossing a threshold. \
        \ \nPossible values are:\n- ASCENDING: Threshold is crossed in ascending direction.\n\
        - DESCENDING: Threshold is crossed in descending direction.\n- CROSSED: Threshold\
        \ is crossed either in ascending or descending direction.\n"
      title: MatchingDirection
      type: string
    MaxDataBurstVol:
      description: "Unsigned integer indicating Maximum Data Burst Volume (see clauses\
        \ 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
      maximum: 4095
      minimum: 1
      title: MaxDataBurstVol
      type: integer
    Mcc:
      description: "Mobile Country Code part of the PLMN, comprising 3 digits, as\
        \ defined in clause 9.3.3.5 of 3GPP TS 38.413. \n"
      pattern: "^\\d{3}$"
      title: Mcc
      type: string
    Mnc:
      description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits,\
        \ as defined in  clause 9.3.3.5 of 3GPP TS 38.413. \n"
      pattern: "^\\d{2,3}$"
      title: Mnc
      type: string
    N3IwfId:
      description: "This represents the identifier of the N3IWF ID as specified in\
        \ clause 9.3.1.57 of  3GPP TS 38.413 in hexadecimal representation. Each character\
        \ in the string shall take a value  of \"0\" to \"9\", \"a\" to \"f\" or \"\
        A\" to \"F\" and shall represent 4 bits. The most significant  character representing\
        \ the 4 most significant bits of the N3IWF ID shall appear first in the  string,\
        \ and the character representing the 4 least significant bit of the N3IWF\
        \ ID shall  appear last in the string. \n"
      pattern: "^[A-Fa-f0-9]+$"
      title: N3IwfId
      type: string
    N3gaLocation:
      description: Contains the Non-3GPP access user location.
      example:
        ueIpv4Addr: 198.51.100.1
        twapId:
          bssId: bssId
          civicAddress: civicAddress
          ssId: ssId
        hfcNodeId:
          hfcNId: hfcNId
        protocol: protocol
        gli: gli
        n3gppTai:
          tac: tac
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
        tnapId:
          bssId: bssId
          civicAddress: civicAddress
          ssId: ssId
        w5gbanLineType: w5gbanLineType
        ueIpv6Addr: 2001:db8:85a3::8a2e:370:7334
        gci: gci
        n3IwfId: n3IwfId
        portNumber: 0
      properties:
        n3gppTai:
          $ref: '#/components/schemas/Tai'
        n3IwfId:
          description: "This IE shall contain the N3IWF identifier received over NGAP\
            \ and shall be encoded as a  string of hexadecimal characters. Each character\
            \ in the string shall take a value of \"0\"  to \"9\", \"a\" to \"f\"\
            \ or \"A\" to \"F\" and shall represent 4 bits. The most significant \
            \ character representing the 4 most significant bits of the N3IWF ID shall\
            \ appear first in  the string, and the character representing the 4 least\
            \ significant bit of the N3IWF ID  shall appear last in the string. \n"
          pattern: "^[A-Fa-f0-9]+$"
          title: n3IwfId
          type: string
        ueIpv4Addr:
          description: |
            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          title: Ipv4Addr
          type: string
        ueIpv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        portNumber:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
        protocol:
          description: "Possible values are:\n- UDP: User Datagram Protocol.\n- TCP:\
            \ Transmission Control Protocol. \n"
          title: TransportProtocol
          type: string
        tnapId:
          $ref: '#/components/schemas/TnapId'
        twapId:
          $ref: '#/components/schemas/TwapId'
        hfcNodeId:
          $ref: '#/components/schemas/HfcNodeId'
        gli:
          description: string with format 'bytes' as defined in OpenAPI
          format: byte
          title: Bytes
          type: string
        w5gbanLineType:
          description: |
            Possible values are:
            - DSL: Identifies a DSL line
            - PON: Identifies a PON line
          title: LineType
          type: string
        gci:
          description: |
            Global Cable Identifier uniquely identifying the connection between the 5G-CRG or FN-CRG to the 5GS. See clause 28.15.4 of 3GPP TS 23.003. This shall be encoded as a string per clause 28.15.4 of 3GPP TS 23.003, and compliant with the syntax specified  in clause 2.2  of IETF RFC 7542 for the username part of a NAI. The GCI value is specified in CableLabs WR-TR-5WWC-ARCH.
          title: Gci
          type: string
      title: N3gaLocation
      type: object
    Ncgi:
      description: "Contains the NCGI (NR Cell Global Identity), as described in 3GPP\
        \ 23.003"
      example:
        nid: nid
        plmnId:
          mnc: mnc
          mcc: mcc
        nrCellId: nrCellId
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        nrCellId:
          description: "36-bit string identifying an NR Cell Id as specified in clause\
            \ 9.3.1.7 of 3GPP TS 38.413,  in hexadecimal representation. Each character\
            \ in the string shall take a value of \"0\" to \"9\",  \"a\" to \"f\"\
            \ or \"A\" to \"F\" and shall represent 4 bits. The most significant character\
            \  representing the 4 most significant bits of the Cell Id shall appear\
            \ first in the string, and  the character representing the 4 least significant\
            \ bit of the Cell Id shall appear last in the  string. \n"
          pattern: "^[A-Fa-f0-9]{9}$"
          title: NrCellId
          type: string
        nid:
          description: "This represents the Network Identifier, which together with\
            \ a PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS\
            \ 23.501 clause 5.30.2.1). \n"
          pattern: "^[A-Fa-f0-9]{11}$"
          title: Nid
          type: string
      required:
      - nrCellId
      - plmnId
      title: Ncgi
      type: object
    NcofEvent:
      description: "Describes the NCOF Events.  \nPossible values are:\n- SLICE_LOAD_LEVEL:\
        \ Indicates that the event subscribed is load level information of Network\n\
        \  Slice.\n- NETWORK_PERFORMANCE: Indicates that the event subscribed is network\
        \ performance\n  information.\n- NF_LOAD: Indicates that the event subscribed\
        \ is load level and status of one or several\n  Network Functions.\n- SERVICE_EXPERIENCE:\
        \ Indicates that the event subscribed is service experience.\n- UE_MOBILITY:\
        \ Indicates that the event subscribed is UE mobility information.\n- UE_COMMUNICATION:\
        \ Indicates that the event subscribed is UE communication information.\n-\
        \ QOS_SUSTAINABILITY: Indicates that the event subscribed is QoS sustainability.\n\
        - ABNORMAL_BEHAVIOUR: Indicates that the event subscribed is abnormal behaviour.\n\
        - USER_DATA_CONGESTION: Indicates that the event subscribed is user data congestion\n\
        \  information.\n- NSI_LOAD_LEVEL: Indicates that the event subscribed is\
        \ load level information of Network\n  Slice and the optionally associated\
        \ Network Slice Instance.\n- DN_PERFORMANCE: Indicates that the event subscribed\
        \ is DN performance information.\n- DISPERSION: Indicates that the event subscribed\
        \ is dispersion information.\n- RED_TRANS_EXP: Indicates that the event subscribed\
        \ is redundant transmission experience.\n- WLAN_PERFORMANCE: Indicates that\
        \ the event subscribed is WLAN performance.\n- SM_CONGESTION: Indicates the\
        \ Session Management Congestion Control Experience information\n  for specific\
        \ DNN and/or S-NSSAI.\n- PFD_DETERMINATION: Indicates that the event subscribed\
        \ is the PFD Determination nformation\n  for known application identifier(s).\n\
        - PDU_SESSION_TRAFFIC: Indicates that the event subscribed is the PDU Session\
        \ traffic\n  information.\n- E2E_DATA_VOL_TRANS_TIME: Indicates that the event\
        \ subscribed is of E2E data volume \n  transfer time.\n- MOVEMENT_BEHAVIOUR:\
        \ Indicates that the event subscribed is the Movement Behaviour\n  information.\n\
        - LOC_ACCURACY: Indicates that the event subscribed is of location accuracy.\n\
        - RELATIVE_PROXIMITY: Indicates that the event subscribed is the Relative\
        \ Proximity\n  information.\n- SIGNALLING_STORM: Indicates that the event\
        \ subscribed is the Signalling Storm information.\n- QOS_POLICY_ASSIST: Indicates\
        \ that the event subscribed is the QoS and Policy\n  Assistance information.\n"
      title: event
      type: string
    NcofFailureCode:
      description: "Represents the failure reason.  \nPossible values are:\n- UNAVAILABLE_DATA:\
        \ Indicates the requested statistics information for the event is rejected\n\
        \  since necessary data to perform the service is unavailable.\n- BOTH_STAT_PRED_NOT_ALLOWED:\
        \ Indicates the requested analysis information for the event is\n  rejected\
        \ since the start time is in the past and the end time is in the future, which\n\
        \  means the NF service consumer requested both statistics and prediction\
        \ for the analytics.\n- PREDICTION_NOT_ALLOWED: Indicates that the request\
        \ for the prediction of the analytics\n  event is not allowed.\n- UNSATISFIED_REQUESTED_ANALYTICS_TIME:\
        \ Indicates that the requested event is rejected since\n  the analytics information\
        \ is not ready when the time indicated by the \"timeAnaNeeded\"\n  attribute\
        \ (as provided during the creation or modification of subscription) is reached.\n\
        - NO_ROAMING_SUPPORT: Indicates that the request shall be rejected because\
        \ roaming analytics\n  or data are required and the NCOF neither supports\
        \ roaming exchange capabilitiy nor can\n  it forward the request to another\
        \ NCOF.\n- OTHER: Indicates the requested analysis information for the event\
        \ is rejected due to other\n  reasons.\n"
      title: failNotifyCode
      type: string
    NetworkAreaInfo:
      description: |
        Describes a network area information in which the NF service consumer requests the number of UEs.
      example:
        ncgis:
        - nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          nrCellId: nrCellId
        - nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          nrCellId: nrCellId
        tais:
        - tac: tac
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
        - tac: tac
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
        gRanNodeIds:
        - eNbId: eNbId
          wagfId: wagfId
          tngfId: tngfId
          gNbId:
            bitLength: 24
            gNBValue: gNBValue
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          n3IwfId: n3IwfId
          ngeNbId: SMacroNGeNB-34B89
        - eNbId: eNbId
          wagfId: wagfId
          tngfId: tngfId
          gNbId:
            bitLength: 24
            gNBValue: gNBValue
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          n3IwfId: n3IwfId
          ngeNbId: SMacroNGeNB-34B89
        ecgis:
        - eutraCellId: eutraCellId
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
        - eutraCellId: eutraCellId
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
      properties:
        ecgis:
          description: Contains a list of E-UTRA cell identities.
          items:
            $ref: '#/components/schemas/Ecgi'
          minItems: 1
          title: ecgis
          type: array
        ncgis:
          description: Contains a list of NR cell identities.
          items:
            $ref: '#/components/schemas/Ncgi'
          minItems: 1
          title: ncgis
          type: array
        gRanNodeIds:
          description: Contains a list of NG RAN nodes.
          items:
            $ref: '#/components/schemas/GlobalRanNodeId'
          minItems: 1
          title: gRanNodeIds
          type: array
        tais:
          description: Contains a list of tracking area identities.
          items:
            $ref: '#/components/schemas/Tai'
          minItems: 1
          title: tais
          type: array
      title: NetworkAreaInfo
      type: object
    NfInstanceId:
      description: "String uniquely identifying a NF instance. The format of the NF\
        \ Instance ID shall be a  Universally Unique Identifier (UUID) version 4.\
        \ \n"
      format: uuid
      title: NfInstanceId
      type: string
    NfSetId:
      description: "NF Set Identifier (see clause 28.12 of 3GPP TS 23.003), formatted\
        \ as the following string \"set<Set ID>.<nftype>set.5gc.mnc<MNC>.mcc<MCC>\"\
        , or  \"set<SetID>.<NFType>set.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\" with  <MCC>\
        \ encoded as defined in clause 5.4.2 (\"Mcc\" data type definition)  <MNC>\
        \ encoding the Mobile Network Code part of the PLMN, comprising 3 digits.\
        \ \n  If there are only 2 significant digits in the MNC, one \"0\" digit shall\
        \ be inserted \n  at the left side to fill the 3 digits coding of MNC.  Pattern:\
        \ '^[0-9]{3}$'\n<NFType> encoded as a value defined in Table 6.1.6.3.3-1 of\
        \ 3GPP TS 29.510 but \n  with lower case characters <Set ID> encoded as a\
        \ string of characters consisting of \n  alphabetic characters (A-Z and a-z),\
        \ digits (0-9) and/or the hyphen (-) and that \n  shall end with either an\
        \ alphabetic character or a digit. \n"
      title: NfSetId
      type: string
    NgeNbId:
      description: "This represents the identifier of the ng-eNB ID as specified in\
        \ clause 9.3.1.8 of  3GPP TS 38.413. The value of the ng-eNB ID shall be encoded\
        \ in hexadecimal representation.  Each character in the string shall take\
        \ a value of \"0\" to \"9\", \"a\" to \"f\" or \"A\" to \"F\" and  shall represent\
        \ 4 bits. The padding 0 shall be added to make multiple nibbles, so the most\
        \  significant character representing the padding 0 if required together with\
        \ the 4 most  significant bits of the ng-eNB ID shall appear first in the\
        \ string, and the character  representing the 4 least significant bit of the\
        \ ng-eNB ID (to form a nibble) shall appear last  in the string. \n"
      example: SMacroNGeNB-34B89
      pattern: "^(MacroNGeNB-[A-Fa-f0-9]{5}|LMacroNGeNB-[A-Fa-f0-9]{6}|SMacroNGeNB-[A-Fa-f0-9]{5})$"
      title: NgeNbId
      type: string
    Nid:
      description: "This represents the Network Identifier, which together with a\
        \ PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS 23.501\
        \ clause 5.30.2.1). \n"
      pattern: "^[A-Fa-f0-9]{11}$"
      title: Nid
      type: string
