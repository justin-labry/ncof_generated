      properties:
        event:
          description: "Describes the NCOF Events.  \nPossible values are:\n- SLICE_LOAD_LEVEL:\
            \ Indicates that the event subscribed is load level information of Network\n\
            \  Slice.\n- NETWORK_PERFORMANCE: Indicates that the event subscribed\
            \ is network performance\n  information.\n- NF_LOAD: Indicates that the\
            \ event subscribed is load level and status of one or several\n  Network\
            \ Functions.\n- SERVICE_EXPERIENCE: Indicates that the event subscribed\
            \ is service experience.\n- UE_MOBILITY: Indicates that the event subscribed\
            \ is UE mobility information.\n- UE_COMMUNICATION: Indicates that the\
            \ event subscribed is UE communication information.\n- QOS_SUSTAINABILITY:\
            \ Indicates that the event subscribed is QoS sustainability.\n- ABNORMAL_BEHAVIOUR:\
            \ Indicates that the event subscribed is abnormal behaviour.\n- USER_DATA_CONGESTION:\
            \ Indicates that the event subscribed is user data congestion\n  information.\n\
            - NSI_LOAD_LEVEL: Indicates that the event subscribed is load level information\
            \ of Network\n  Slice and the optionally associated Network Slice Instance.\n\
            - DN_PERFORMANCE: Indicates that the event subscribed is DN performance\
            \ information.\n- DISPERSION: Indicates that the event subscribed is dispersion\
            \ information.\n- RED_TRANS_EXP: Indicates that the event subscribed is\
            \ redundant transmission experience.\n- WLAN_PERFORMANCE: Indicates that\
            \ the event subscribed is WLAN performance.\n- SM_CONGESTION: Indicates\
            \ the Session Management Congestion Control Experience information\n \
            \ for specific DNN and/or S-NSSAI.\n- PFD_DETERMINATION: Indicates that\
            \ the event subscribed is the PFD Determination nformation\n  for known\
            \ application identifier(s).\n- PDU_SESSION_TRAFFIC: Indicates that the\
            \ event subscribed is the PDU Session traffic\n  information.\n- E2E_DATA_VOL_TRANS_TIME:\
            \ Indicates that the event subscribed is of E2E data volume \n  transfer\
            \ time.\n- MOVEMENT_BEHAVIOUR: Indicates that the event subscribed is\
            \ the Movement Behaviour\n  information.\n- LOC_ACCURACY: Indicates that\
            \ the event subscribed is of location accuracy.\n- RELATIVE_PROXIMITY:\
            \ Indicates that the event subscribed is the Relative Proximity\n  information.\n\
            - SIGNALLING_STORM: Indicates that the event subscribed is the Signalling\
            \ Storm information.\n- QOS_POLICY_ASSIST: Indicates that the event subscribed\
            \ is the QoS and Policy\n  Assistance information.\n"
          title: event
          type: string
        start:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        expiry:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        timeStampGen:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        failNotifyCode:
          description: "Represents the failure reason.  \nPossible values are:\n-\
            \ UNAVAILABLE_DATA: Indicates the requested statistics information for\
            \ the event is rejected\n  since necessary data to perform the service\
            \ is unavailable.\n- BOTH_STAT_PRED_NOT_ALLOWED: Indicates the requested\
            \ analysis information for the event is\n  rejected since the start time\
            \ is in the past and the end time is in the future, which\n  means the\
            \ NF service consumer requested both statistics and prediction for the\
            \ analytics.\n- PREDICTION_NOT_ALLOWED: Indicates that the request for\
            \ the prediction of the analytics\n  event is not allowed.\n- UNSATISFIED_REQUESTED_ANALYTICS_TIME:\
            \ Indicates that the requested event is rejected since\n  the analytics\
            \ information is not ready when the time indicated by the \"timeAnaNeeded\"\
            \n  attribute (as provided during the creation or modification of subscription)\
            \ is reached.\n- NO_ROAMING_SUPPORT: Indicates that the request shall\
            \ be rejected because roaming analytics\n  or data are required and the\
            \ NCOF neither supports roaming exchange capabilitiy nor can\n  it forward\
            \ the request to another NCOF.\n- OTHER: Indicates the requested analysis\
            \ information for the event is rejected due to other\n  reasons.\n"
          title: failNotifyCode
          type: string
        rvWaitTime:
          description: indicating a time in seconds.
          title: DurationSec
          type: integer
        anaMetaInfo:
          $ref: '#/components/schemas/AnalyticsMetadataInfo'
        svcExps:
          items:
            $ref: '#/components/schemas/ServiceExperienceInfo'
          minItems: 1
          title: svcExps
          type: array
        wlanInfos:
          items:
            $ref: '#/components/schemas/WlanPerformanceInfo'
          minItems: 1
          title: wlanInfos
          type: array
        dataVlTrnsTmInfos:
          items:
            $ref: '#/components/schemas/E2eDataVolTransTimeInfo'
          minItems: 1
          title: dataVlTrnsTmInfos
          type: array
        accuInfo:
          $ref: '#/components/schemas/AccuracyInfo'
        cancelAccuInd:
          description: |
            Indicates cancelled subscription of the analytics accuracy information. Set to "true" indicates the NCOF cancelled subscription of analytics accuracy information as the NCOF does not support the accuracy checking capability. Otherwise set to "false". Default value is "false" if omitted.
          title: cancelAccuInd
          type: boolean
        pauseInd:
          description: |
            Pause analytics consumption indication. Set to "true" to indicate the consumer to stop the consumption of the analytics. Default value is "false" if omitted.
          title: pauseInd
          type: boolean
        resumeInd:
          description: |
            Resume analytics consumption indication. Set to "true" to indicate the consumer to resume the consumption of the analytics. Default value is "false" if omitted.
          title: resumeInd
          type: boolean
        _ctrlEventInd:
          description: |
            Control event indication. Set to "true" to indicate the desired event is control event  rather than analytics one.
          title: _ctrlEventInd
          type: boolean
        qosPolAssistInfos:
          description: The QoS and policy assistance information.
          items:
            $ref: '#/components/schemas/QosPolicyAssistInfo'
          minItems: 1
          title: qosPolAssistInfos
          type: array
        _cellPowerCtrlOptInfos:
          description: The cell power control and optimization information.
          items:
            $ref: '#/components/schemas/_CellPowerCtrlInfo'
          minItems: 1
          title: _cellPowerCtrlOptInfos
          type: array
      required:
      - event
      title: EventNotification
      type: object
    Float:
      description: string with format 'float' as defined in OpenAPI.
      format: float
      title: varTransTimeUl
      type: number
    FlowDescription:
      description: Defines a packet filter of an IP flow.
      title: FlowDescription
      type: string
    FlowDirection:
      description: "Indicates the direction of the service data flow.  \nPossible\
        \ values are:\n- DOWNLINK: The corresponding filter applies for traffic to\
        \ the UE.\n- UPLINK: The corresponding filter applies for traffic from the\
        \ UE.\n- BIDIRECTIONAL: The corresponding filter applies for traffic both\
        \ to and from the UE.\n- UNSPECIFIED: The corresponding filter applies for\
        \ traffic to the UE (downlink), but has no\nspecific direction declared. The\
        \ service data flow detection shall apply the filter for\nuplink traffic as\
        \ if the filter was bidirectional. The PCF shall not use the value\nUNSPECIFIED\
        \ in filters created by the network in NW-initiated procedures. The PCF shall\
        \ only\ninclude the value UNSPECIFIED in filters in UE-initiated procedures\
        \ if the same value is\nreceived from the SMF.\n"
      title: fDir
      type: string
    Fqdn:
      description: Fully Qualified Domain Name
      maxLength: 253
      minLength: 4
      pattern: "^([0-9A-Za-z]([-0-9A-Za-z]{0,61}[0-9A-Za-z])?\\.)+[A-Za-z]{2,63}\\\
        .?$"
      title: nrfId
      type: string
    GADShape:
      description: Common base type for GAD shapes.
      discriminator:
        mapping:
          POINT: '#/components/schemas/Point'
          POINT_UNCERTAINTY_CIRCLE: '#/components/schemas/PointUncertaintyCircle'
          POINT_UNCERTAINTY_ELLIPSE: '#/components/schemas/PointUncertaintyEllipse'
          POLYGON: '#/components/schemas/Polygon'
          POINT_ALTITUDE: '#/components/schemas/PointAltitude'
          POINT_ALTITUDE_UNCERTAINTY: '#/components/schemas/PointAltitudeUncertainty'
          ELLIPSOID_ARC: '#/components/schemas/EllipsoidArc'
          LOCAL_2D_POINT_UNCERTAINTY_ELLIPSE: '#/components/schemas/Local2dPointUncertaintyEllipse'
          LOCAL_3D_POINT_UNCERTAINTY_ELLIPSOID: '#/components/schemas/Local3dPointUncertaintyEllipsoid'
        propertyName: shape
      properties:
        shape:
          description: Indicates supported GAD shapes.
          title: SupportedGADShapes
          type: string
      required:
      - shape
      title: GADShape
      type: object
    GNbId:
      description: Provides the G-NB identifier.
      example:
        bitLength: 24
        gNBValue: gNBValue
      properties:
        bitLength:
          description: |
            Unsigned integer representing the bit length of the gNB ID as defined in clause 9.3.1.6 of 3GPP TS 38.413 [11], within the range 22 to 32.
          maximum: 32
          minimum: 22
          title: bitLength
          type: integer
        gNBValue:
          description: |
            This represents the identifier of the gNB. The value of the gNB ID shall be encoded in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The padding 0 shall be added to make multiple nibbles,  the most significant character representing the padding 0 if required together with the 4 most significant bits of the gNB ID shall appear first in the string, and the character representing the 4 least significant bit of the gNB ID shall appear last in the string.
          pattern: "^[A-Fa-f0-9]{6,8}$"
          title: gNBValue
          type: string
      required:
      - bitLength
      - gNBValue
      title: GNbId
      type: object
    Gci:
      description: |
        Global Cable Identifier uniquely identifying the connection between the 5G-CRG or FN-CRG to the 5GS. See clause 28.15.4 of 3GPP TS 23.003. This shall be encoded as a string per clause 28.15.4 of 3GPP TS 23.003, and compliant with the syntax specified  in clause 2.2  of IETF RFC 7542 for the username part of a NAI. The GCI value is specified in CableLabs WR-TR-5WWC-ARCH.
      title: Gci
      type: string
