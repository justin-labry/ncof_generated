    SamplingRatio:
      description: "Unsigned integer indicating Sampling Ratio (see clauses 4.15.1\
        \ of 3GPP TS 23.502), expressed in percent. \n"
      maximum: 100
      minimum: 1
      title: sampRatio
      type: integer
    PartitioningCriteria:
      description: |
        Possible values are:
        - "TAC": Type Allocation Code
        - "SUBPLMN": Subscriber PLMN ID
        - "GEOAREA": Geographical area, i.e. list(s) of TAI(s)
        - "SNSSAI": S-NSSAI
        - "DNN": DNN
      enum:
      - TAC
      - SUBPLMN
      - GEOAREA
      - SNSSAI
      - DNN
      title: PartitioningCriteria
      type: string
    NotificationFlag:
      description: "Possible values are:\n- ACTIVATE: The event notification is activated.\n\
        - DEACTIVATE: The event notification is deactivated and shall be muted. The\
        \ available\n   event(s) shall be stored.\n- RETRIEVAL: The event notification\
        \ shall be sent to the NF service consumer(s),\n  after that, is muted again.\
        \ \n"
      enum:
      - ACTIVATE
      - DEACTIVATE
      - RETRIEVAL
      title: NotificationFlag
      type: string
    MutingExceptionInstructions:
      description: |
        Indicates to an Event producer NF instructions for the subscription and stored events when an exception (e.g. full buffer) occurs at the Event producer NF while the event is muted.
      example:
        bufferedNotifs: SEND_ALL
        subscription: CLOSE
      properties:
        bufferedNotifs:
          $ref: "#/components/schemas/BufferedNotificationsAction"
        subscription:
          $ref: "#/components/schemas/SubscriptionAction"
      title: MutingExceptionInstructions
      type: object
    BufferedNotificationsAction:
      description: |
        Indicates the required action by the event producer NF on the buffered Notifications.
      enum:
      - SEND_ALL
      - DISCARD_ALL
      - DROP_OLD
      title: BufferedNotificationsAction
      type: string
    SubscriptionAction:
      description: |
        Indicates the required action by the event producer NF on the event subscription if an exception occurs while the event is muted.
      enum:
      - CLOSE
      - CONTINUE_WITH_MUTING
      - CONTINUE_WITHOUT_MUTING
      title: SubscriptionAction
      type: string
    MutingNotificationsSettings:
      description: |
        Indicates the Event producer NF settings to the Event consumer NF
      example:
        maxNoOfNotif: 0
        durationBufferedNotif: 9
      properties:
        maxNoOfNotif:
          title: maxNoOfNotif
          type: integer
        durationBufferedNotif:
          description: indicating a time in seconds.
          title: DurationSec
          type: integer
      title: MutingNotificationsSettings
      type: object
    ReferenceId:
      $ref: "#/components/schemas/Uint64"
    Uint64:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 64-bit integer.
      maximum: 18446744073709551615
      minimum: 0
      title: Uint64
      type: integer
    DnaiChangeType:
      description: "Possible values are:\n- EARLY: Early notification of UP path reconfiguration.\n\
        - EARLY_LATE: Early and late notification of UP path reconfiguration. This\
        \ value shall\n  only be present in the subscription to the DNAI change event.\n\
        - LATE: Late notification of UP path reconfiguration. \n"
      enum:
      - EARLY
      - EARLY_LATE
      - LATE
      title: DnaiChangeType
      type: string
    DddTrafficDescriptor:
      description: Contains a Traffic Descriptor.
      example:
        ipv6Addr: 2001:db8:85a3::8a2e:370:7334
        ipv4Addr: 198.51.100.1
        portNumber: 0
        macAddr: macAddr
      properties:
        ipv4Addr:
          description: |
            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          title: Ipv4Addr
          type: string
        ipv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
        portNumber:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
        macAddr:
          description: |
            String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
          pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
          title: MacAddr48
          type: string
      title: DddTrafficDescriptor
      type: object
    MacAddr48:
      description: |
        String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
      pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
      title: MacAddr48
      type: string
    DlDataDeliveryStatus:
      description: |
        Possible values are:
        - BUFFERED: The first downlink data is buffered with extended buffering matching the
          source of the downlink traffic.
        - TRANSMITTED: The first downlink data matching the source of the downlink traffic is
          transmitted after previous buffering or discarding of corresponding packet(s) because
          the UE of the PDU Session becomes ACTIVE, and buffered data can be delivered to UE.
        - DISCARDED: The first downlink data matching the source of the downlink traffic is
          discarded because the Extended Buffering time, as determined by the SMF, expires or
          the amount of downlink data to be buffered is exceeded.
      enum:
      - BUFFERED
      - TRANSMITTED
      - DISCARDED
      title: DlDataDeliveryStatus
      type: string
    ApplicationId:
      description: String providing an application identifier.
      title: ApplicationId
      type: string
    NetworkAreaInfo:
      description: |
        Describes a network area information in which the NF service consumer requests the number of UEs.
      example:
        ncgis:
        - nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          nrCellId: nrCellId
        - nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          nrCellId: nrCellId
        tais:
        - tac: tac
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
        - tac: tac
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
        gRanNodeIds:
        - eNbId: eNbId
          wagfId: wagfId
          tngfId: tngfId
          gNbId:
            bitLength: 27
            gNBValue: gNBValue
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          n3IwfId: n3IwfId
          ngeNbId: SMacroNGeNB-34B89
        - eNbId: eNbId
          wagfId: wagfId
          tngfId: tngfId
          gNbId:
            bitLength: 27
            gNBValue: gNBValue
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          n3IwfId: n3IwfId
          ngeNbId: SMacroNGeNB-34B89
        ecgis:
        - eutraCellId: eutraCellId
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
        - eutraCellId: eutraCellId
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
      properties:
        ecgis:
          description: Contains a list of E-UTRA cell identities.
          items:
            $ref: "#/components/schemas/Ecgi"
          minItems: 1
          title: ecgis
          type: array
        ncgis:
          description: Contains a list of NR cell identities.
          items:
            $ref: "#/components/schemas/Ncgi"
          minItems: 1
          title: ncgis
          type: array
        gRanNodeIds:
          description: Contains a list of NG RAN nodes.
          items:
            $ref: "#/components/schemas/GlobalRanNodeId"
          minItems: 1
          title: gRanNodeIds
          type: array
        tais:
          description: Contains a list of tracking area identities.
          items:
            $ref: "#/components/schemas/Tai"
          minItems: 1
          title: tais
          type: array
      title: NetworkAreaInfo
      type: object
    TimeWindow:
      description: Represents a time window identified by a start time and a stop
        time.
      example:
        startTime: 2000-01-23T04:56:07.000+00:00
        stopTime: 2000-01-23T04:56:07.000+00:00
      properties:
        startTime:
          description: string with format "date-time" as defined in OpenAPI.
          format: date-time
          title: DateTime_1
          type: string
        stopTime:
          description: string with format "date-time" as defined in OpenAPI.
          format: date-time
          title: DateTime_1
          type: string
      required:
      - startTime
      - stopTime
      title: TimeWindow
      type: object
    DateTime_1:
      description: string with format "date-time" as defined in OpenAPI.
      format: date-time
      title: DateTime_1
      type: string
    IpAddr:
      description: Contains an IP adresse.
      example:
        ipv6Addr: 2001:db8:85a3::8a2e:370:7334
        ipv4Addr: 198.51.100.1
        ipv6Prefix: 2001:db8:abcd:12::0/64
      nullable: true
      oneOf: []
      properties:
        ipv4Addr:
          description: |
            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          title: Ipv4Addr
          type: string
        ipv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
        ipv6Prefix:
          $ref: "#/components/schemas/Ipv6Prefix"
      title: IpAddr
      type: object
    Ipv6Prefix:
      description: |
        String identifying an IPv6 address prefix formatted according to clause 4 of RFC 5952. IPv6Prefix data type may contain an individual /128 IPv6 address.
      example: 2001:db8:abcd:12::0/64
      title: Ipv6Prefix
      type: string
    UpfEvent:
      description: UPF Event
      example:
        skipReportingInstruction:
          validityTimes:
          - recurTimeWindow:
              startTime: 2000-01-23T04:56:07.000+00:00
              endTime: 2000-01-23T04:56:07.000+00:00
            recurMonth:
            - null
            - null
            recurType: DAILY
            recurDate:
            - null
