            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          title: Ipv4Addr
          type: string
        ipv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
        portNumber:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
      required:
      - portNumber
      title: RouteInformation
      type: object
    AccessType:
      description: Indicates whether the access is  via 3GPP or via non-3GPP.
      enum:
      - 3GPP_ACCESS
      - NON_3GPP_ACCESS
      title: AccessType
      type: string
    RatType:
      description: Indicates the radio access used.
      enum:
      - NR
      - EUTRA
      - WLAN
      - VIRTUAL
      - NBIOT
      - WIRELINE
      - WIRELINE_CABLE
      - WIRELINE_BBF
      - LTE-M
      - NR_U
      - EUTRA_U
      - TRUSTED_N3GA
      - TRUSTED_WLAN
      - UTRA
      - GERA
      - NR_LEO
      - NR_MEO
      - NR_GEO
      - NR_OTHER_SAT
      - NR_REDCAP
      - WB_E_UTRAN_LEO
      - WB_E_UTRAN_MEO
      - WB_E_UTRAN_GEO
      - WB_E_UTRAN_OTHERSAT
      - NB_IOT_LEO
      - NB_IOT_MEO
      - NB_IOT_GEO
      - NB_IOT_OTHERSAT
      - LTE_M_LEO
      - LTE_M_MEO
      - LTE_M_GEO
      - LTE_M_OTHERSAT
      - NR_EREDCAP
      title: RatType
      type: string
    CommunicationFailure:
      description: Describes a communication failure detected by AMF
      example:
        ranReleaseCode:
          value: 0
          group: 0
        nasReleaseCode: nasReleaseCode
      properties:
        nasReleaseCode:
          title: nasReleaseCode
          type: string
        ranReleaseCode:
          $ref: "#/components/schemas/NgApCause"
      title: CommunicationFailure
      type: object
    PduSessionType:
      description: "PduSessionType indicates the type of a PDU session. It shall comply\
        \ with the provisions defined in table 5.4.3.3-1. \n"
      enum:
      - IPV4
      - IPV6
      - IPV4V6
      - UNSTRUCTURED
      - ETHERNET
      title: PduSessionType
      type: string
    SscMode:
      description: "represents the service and session continuity mode It shall comply\
        \ with the provisions defined in table 5.4.3.6-1. \n"
      enum:
      - SSC_MODE_1
      - SSC_MODE_2
      - SSC_MODE_3
      title: SscMode
      type: string
    Qfi:
      description: "Unsigned integer identifying a QoS flow, within the range 0 to\
        \ 63."
      maximum: 63
      minimum: 0
      title: Qfi
      type: integer
    BitRate:
      description: |
        String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
      pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
      title: BitRate
      type: string
    SatelliteBackhaulCategory:
      description: Indicates the satellite backhaul used.
      enum:
      - GEO
      - MEO
      - LEO
      - OTHER_SAT
      - DYNAMIC_GEO
      - DYNAMIC_MEO
      - DYNAMIC_LEO
      - DYNAMIC_OTHER_SAT
      - NON_SATELLITE
      title: SatelliteBackhaulCategory
      type: string
    "5Qi":
      description: |
        Unsigned integer representing a 5G QoS Identifier (see clause 5.7.2.1 of 3GPP TS 23.501, within the range 0 to 255.
      maximum: 255
      minimum: 0
      title: 5Qi
      type: integer
    QosPara:
      description: The values of the QoS parameters.
      example:
        rscType: NON_GBR
        gbrDl: gbrDl
        maxPlrDl: 335
        maxDataBurstVol: 2925
        mbrDl: mbrDl
        "5qi": 172
        pdb: 1
        maxPlrUl: 670
        gbrUl: gbrUl
        priorityLvl: 87
        mbrUl: mbrUl
        qosParamSetId: qosParamSetId
        per: per
        avgWin: 1267
      properties:
        qosParamSetId:
          description: Identifies the QoS parameter set.
          title: qosParamSetId
          type: string
        "5qi":
          description: |
            Unsigned integer representing a 5G QoS Identifier (see clause 5.7.2.1 of 3GPP TS 23.501, within the range 0 to 255.
          maximum: 255
          minimum: 0
          title: 5Qi
          type: integer
        priorityLvl:
          description: "Unsigned integer indicating the 5QI Priority Level (see clauses\
            \ 5.7.3.3 and 5.7.4 of 3GPP TS 23.501, within the range 1 to 127.Values\
            \ are ordered in decreasing order of priority,  i.e. with 1 as the highest\
            \ priority and 127 as the lowest priority. \n"
          maximum: 127
          minimum: 1
          title: 5QiPriorityLevel
          type: integer
        rscType:
          $ref: "#/components/schemas/QosResourceType"
        pdb:
          description: |
            Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds.
          minimum: 1
          title: PacketDelBudget
          type: integer
        per:
          description: |
            String representing Packet Error Rate (see clause 5.7.3.5 and 5.7.4 of 3GPP TS 23.501, expressed as a "scalar x 10-k" where the scalar and the exponent k are each encoded as one decimal digit.
          pattern: "^([0-9]E-[0-9])$"
          title: PacketErrRate
          type: string
        gbrUl:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        gbrDl:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        mbrUl:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        mbrDl:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        maxPlrUl:
          description: |
            Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
          maximum: 1000
          minimum: 0
          title: PacketLossRate
          type: integer
        maxPlrDl:
          description: |
            Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
          maximum: 1000
          minimum: 0
          title: PacketLossRate
          type: integer
        avgWin:
          default: 2000
          description: "Unsigned integer indicating Averaging Window (see clause 5.7.3.6\
            \ and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds. \n"
          maximum: 4095
          minimum: 1
          title: AverWindow
          type: integer
        maxDataBurstVol:
          description: "Unsigned integer indicating Maximum Data Burst Volume (see\
            \ clauses 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
          maximum: 4095
          minimum: 1
          title: MaxDataBurstVol
          type: integer
      title: QosPara
      type: object
    NfSignallingInfo:
      description: NF Signalling Information
      example:
        nfSigInfoPerWndw:
        - tw:
            startTime: 2000-01-23T04:56:07.000+00:00
            stopTime: 2000-01-23T04:56:07.000+00:00
          nfSigInfoPerService:
            key:
              numOfReqUnresp: 0
              numOfRedMessages: 0
              numOfReq: 0
              numOfReqReject: 0
              serviceName: nnrf-nfm
              numOfPosteriorReq: 0
        - tw:
            startTime: 2000-01-23T04:56:07.000+00:00
            stopTime: 2000-01-23T04:56:07.000+00:00
          nfSigInfoPerService:
            key:
              numOfReqUnresp: 0
              numOfRedMessages: 0
              numOfReq: 0
              numOfReqReject: 0
              serviceName: nnrf-nfm
              numOfPosteriorReq: 0
        nfHeartbeatInfo:
          hbIntvl: 0
          numOfRetrans: 0
        unexpStatusInd: false
        avgReqProcTime: 0
      properties:
        nfSigInfoPerWndw:
          items:
            $ref: "#/components/schemas/NfSignallingInfoPerTimeWindow"
          minItems: 1
          title: nfSigInfoPerWndw
          type: array
        avgReqProcTime:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
        nfHeartbeatInfo:
          $ref: "#/components/schemas/NfHeartbeatInfo"
        unexpStatusInd:
          default: false
          title: unexpStatusInd
          type: boolean
      title: NfSignallingInfo
      type: object
    NfSignallingInfoPerTimeWindow:
      description: NF Signalling Information Per time window
      example:
        tw:
          startTime: 2000-01-23T04:56:07.000+00:00
          stopTime: 2000-01-23T04:56:07.000+00:00
        nfSigInfoPerService:
          key:
            numOfReqUnresp: 0
            numOfRedMessages: 0
            numOfReq: 0
            numOfReqReject: 0
            serviceName: nnrf-nfm
            numOfPosteriorReq: 0
      properties:
        tw:
          $ref: "#/components/schemas/TimeWindow"
        nfSigInfoPerService:
          additionalProperties:
            $ref: "#/components/schemas/NfSignallingInfoPerService"
