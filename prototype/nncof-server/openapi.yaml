    QosPara:
      description: The values of the QoS parameters.
      example:
        rscType: null
        gbrDl: gbrDl
        maxPlrDl: 467
        maxDataBurstVol: 3739
        mbrDl: mbrDl
        "5qi": 5
        pdb: 1
        maxPlrUl: 104
        gbrUl: gbrUl
        priorityLvl: 84
        mbrUl: mbrUl
        qosParamSetId: qosParamSetId
        per: per
        avgWin: 2973
      properties:
        qosParamSetId:
          description: Identifies the QoS parameter set.
          title: qosParamSetId
          type: string
        "5qi":
          description: |
            Unsigned integer representing a 5G QoS Identifier (see clause 5.7.2.1 of 3GPP TS 23.501, within the range 0 to 255.
          maximum: 255
          minimum: 0
          title: 5Qi
          type: integer
        priorityLvl:
          description: "Unsigned integer indicating the 5QI Priority Level (see clauses\
            \ 5.7.3.3 and 5.7.4 of 3GPP TS 23.501, within the range 1 to 127.Values\
            \ are ordered in decreasing order of priority,  i.e. with 1 as the highest\
            \ priority and 127 as the lowest priority. \n"
          maximum: 127
          minimum: 1
          title: 5QiPriorityLevel
          type: integer
        rscType:
          $ref: "#/components/schemas/QosResourceType"
        pdb:
          description: |
            Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds.
          minimum: 1
          title: PacketDelBudget
          type: integer
        per:
          description: |
            String representing Packet Error Rate (see clause 5.7.3.5 and 5.7.4 of 3GPP TS 23.501, expressed as a "scalar x 10-k" where the scalar and the exponent k are each encoded as one decimal digit.
          pattern: "^([0-9]E-[0-9])$"
          title: PacketErrRate
          type: string
        gbrUl:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        gbrDl:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        mbrUl:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        mbrDl:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        maxPlrUl:
          description: |
            Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
          maximum: 1000
          minimum: 0
          title: PacketLossRate
          type: integer
        maxPlrDl:
          description: |
            Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
          maximum: 1000
          minimum: 0
          title: PacketLossRate
          type: integer
        avgWin:
          default: 2000
          description: "Unsigned integer indicating Averaging Window (see clause 5.7.3.6\
            \ and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds. \n"
          maximum: 4095
          minimum: 1
          title: AverWindow
          type: integer
        maxDataBurstVol:
          description: "Unsigned integer indicating Maximum Data Burst Volume (see\
            \ clauses 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
          maximum: 4095
          minimum: 1
          title: MaxDataBurstVol
          type: integer
      title: QosPara
      type: object
