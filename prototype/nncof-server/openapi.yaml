            lac: lac
          lai:
            plmnId:
              mnc: mnc
              mcc: mcc
            lac: lac
          mscNumber: mscNumber
          sai:
            sac: sac
            plmnId:
              mnc: mnc
              mcc: mcc
            lac: lac
