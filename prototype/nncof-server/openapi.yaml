      description: Represents the ID/address/FQDN of the UPF.
      example:
        upfId: upfId
        upfAddr:
          fqdn: fqdn
          ipAddr:
            ipv6Addr: 2001:db8:85a3::8a2e:370:7334
            ipv4Addr: 198.51.100.1
            ipv6Prefix: 2001:db8:abcd:12::0/64
      properties:
        upfId:
          title: upfId
          type: string
        upfAddr:
          $ref: "#/components/schemas/AddrFqdn"
      title: UpfInformation
      type: object
    AddrFqdn:
      description: IP address and/or FQDN.
      example:
        fqdn: fqdn
        ipAddr:
          ipv6Addr: 2001:db8:85a3::8a2e:370:7334
          ipv4Addr: 198.51.100.1
          ipv6Prefix: 2001:db8:abcd:12::0/64
      properties:
        ipAddr:
          $ref: "#/components/schemas/IpAddr"
        fqdn:
          description: Indicates an FQDN.
          title: fqdn
          type: string
      title: AddrFqdn
      type: object
    DateTime:
      description: string with format 'date-time' as defined in OpenAPI.
      format: date-time
      title: DateTime
      type: string
    SvcExperience:
      description: Contains a mean opinion score with the customized range.
      example:
        mos: 0.43431398
        lowerRange: 1.7325933
        upperRange: 2.9409642
      properties:
        mos:
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: Float
          type: number
        upperRange:
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: Float
          type: number
        lowerRange:
          description: string with format 'float' as defined in OpenAPI.
          format: float
          title: Float
          type: number
      title: SvcExperience
      type: object
    Float:
      description: string with format 'float' as defined in OpenAPI.
      format: float
      title: Float
      type: number
    Supi:
      description: "String identifying a Supi that shall contain either an IMSI, a\
        \ network specific identifier,\na Global Cable Identifier (GCI) or a Global\
        \ Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS 23.003. It\
        \ shall be formatted as follows\n - for an IMSI \"imsi-<imsi>\", where <imsi>\
        \ shall be formatted according to clause 2.2\n   of 3GPP TS 23.003 that describes\
        \ an IMSI.\n - for a network specific identifier \"nai-<nai>, where <nai>\
        \ shall be formatted\n   according to clause 28.7.2 of 3GPP TS 23.003 that\
        \ describes an NAI.\n - for a GCI \"gci-<gci>\", where <gci> shall be formatted\
        \ according to clause 28.15.2\n   of 3GPP TS 23.003.\n - for a GLI \"gli-<gli>\"\
        , where <gli> shall be formatted according to clause 28.16.2 of\n   3GPP TS\
        \ 23.003.To enable that the value is used as part of an URI, the string shall\n\
        \   only contain characters allowed according to the \"lower-with-hyphen\"\
        \ naming convention\n   defined in 3GPP TS 29.501.\n"
      pattern: "^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$"
      title: Supi
      type: string
    NsiId:
      description: Contains the Identifier of the selected Network Slice instance
      title: NsiId
      type: string
    SamplingRatio:
      description: "Unsigned integer indicating Sampling Ratio (see clauses 4.15.1\
        \ of 3GPP TS 23.502), expressed in percent. \n"
      maximum: 100
      minimum: 1
      title: SamplingRatio
      type: integer
    TimeWindow:
      description: Represents a time window identified by a start time and a stop
        time.
      example:
        startTime: 2000-01-23T04:56:07.000+00:00
        stopTime: 2000-01-23T04:56:07.000+00:00
      properties:
        startTime:
          description: string with format "date-time" as defined in OpenAPI.
          format: date-time
          title: DateTime_1
          type: string
        stopTime:
          description: string with format "date-time" as defined in OpenAPI.
          format: date-time
          title: DateTime_1
          type: string
      required:
      - startTime
      - stopTime
      title: TimeWindow
      type: object
    DateTime_1:
      description: string with format "date-time" as defined in OpenAPI.
      format: date-time
      title: DateTime_1
      type: string
    Gpsi:
      description: "String identifying a Gpsi shall contain either an External Id\
        \ or an MSISDN.  It shall be formatted as follows -External Identifier= \"\
        extid-'extid', where 'extid'  shall be formatted according to clause 19.7.2\
        \ of 3GPP TS 23.003 that describes an  External Identifier. \n"
      pattern: "^(msisdn-[0-9]{5,15}|extid-[^@]+@[^@]+|.+)$"
      title: Gpsi
      type: string
    GroupId:
      description: "String identifying a group of devices network internal globally\
        \ unique ID which identifies a set of IMSIs, as specified in clause 19.9 of\
        \ 3GPP TS 23.003. \n"
      pattern: "^[A-Fa-f0-9]{8}-[0-9]{3}-[0-9]{2,3}-([A-Fa-f0-9][A-Fa-f0-9]){1,10}$"
      title: GroupId
      type: string
    UserLocation:
