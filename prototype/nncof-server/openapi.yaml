    DeviceType:
      description: "Represents the device type.  \nPossible values are:  \n  - MOBILE_PHONE:\
        \ Mobile Phone.\n  - SMART_PHONE: Smartphone.\n  - TABLET: Tablet.\n  - DONGLE:\
        \ Dongle.\n  - MODEM: Modem.\n  - WLAN_ROUTER: WLAN Router.\n  - IOT_DEVICE:\
        \ IoT Device.\n  - WEARABLE: Wearable.\n  - MOBILE_TEST_PLATFORM: Mobile Test\
        \ Platform.\n  - UNDEFINED: Undefined.\n"
      enum:
      - MOBILE_PHONE
      - SMART_PHONE
      - TABLET
      - DONGLE
      - MODEM
      - WLAN_ROUTER
      - IOT_DEVICE
      - WEARABLE
      - MOBILE_TEST_PLATFORM
      - UNDEFINED
      title: DeviceType
      type: string
    WlanOrderingCriterion:
      description: "Represents the order criterion for the list of WLAN performance\
        \ information.  \nPossible values are:\n- TIME_SLOT_START: Indicates the order\
        \ of time slot start.\n- NUMBER_OF_UES: Indicates the order of number of UEs.\n\
        - RSSI: Indicates the order of RSSI.\n- RTT: Indicates the order of RTT.\n\
        - TRAFFIC_INFO: Indicates the order of Traffic information.\n"
      enum:
      - TIME_SLOT_START
      - NUMBER_OF_UES
      - RSSI
      - RTT
      - TRAFFIC_INFO
      title: WlanOrderingCriterion
      type: string
    ServiceExperienceType:
      description: "Represents the type of the service experience analytics.  \nPossible\
        \ values are:  \n- VOICE: Indicates that the service experience analytics\
        \ is for voice service.\n- VIDEO: Indicates that the service experience analytics\
        \ is for video service.\n- OTHER: Indicates that the service experience analytics\
        \ is for other service.\n"
      enum:
      - VOICE
      - VIDEO
      - OTHER
      title: ServiceExperienceType
      type: string
    TermCause:
      description: "Represents the cause for the analytics subscription termination\
        \ request.  \nPossible values are:  \n  - USER_CONSENT_REVOKED: The user consent\
        \ has been revoked.\n  - NCOF_OVERLOAD: The NCOF is overloaded.\n  - UE_LEFT_AREA:\
        \ The UE has moved out of the NCOF serving area.\n"
      enum:
      - USER_CONSENT_REVOKED
      - NCOF_OVERLOAD
      - UE_LEFT_AREA
      type: string
    UserDataConOrderCrit:
      description: "Represents the cause for requesting to terminate an analytics\
        \ subscription.  \nPossible values are:  \n  - APPLICABLE_TIME_WINDOW: The\
        \ ordering criterion is the Applicable Time Window.\n  - NETWORK_STATUS_INDICATION:\
        \ The ordering criterion is the network status indication.\n  \n"
      enum:
      - APPLICABLE_TIME_WINDOW
      - NETWORK_STATUS_INDICATION
      title: UserDataConOrderCrit
      type: string
    LocInfoGranularity:
      description: "Represents the preferred granularity of location information.\
        \  \nPossible values are:  \n  - TA_LEVEL: Indicates location granularity\
        \ of TA level.\n  - CELL_LEVEL: Indicates location granularity of Cell level.\n\
        \  - LON_AND_LAT_LEVEL: Indicates location granularity of longitude and latitude\
        \ level.\n"
      enum:
      - TA_LEVEL
      - CELL_LEVEL
      - LON_AND_LAT_LEVEL
      title: LocInfoGranularity
      type: string
    E2eDataVolTransTimeCriterion:
      description: "Represents the ordering criterion for the list of E2E data volume\
        \ transfer time.  \nPossible values are:  \n  - E2E_DATA_VOL_TRANS_TIME: The\
        \ ordering criterion is the E2E data volume transfer time.\n"
      enum:
      - E2E_DATA_VOL_TRANS_TIME
      title: E2eDataVolTransTimeCriterion
      type: string
    AnalyticsAccuracyIndication:
      description: "Represents the notification methods for the subscribed events.\
        \  \nPossible values are:\n- MEET: Indicates meet the analytics accuracy requirement.\n\
        - NOT_MEET: Indicates not meet the analytics accuracy requirement.\n"
      enum:
      - MEET
      - NOT_MEET
      title: AnalyticsAccuracyIndication
      type: string
    LocationOrientation:
      description: "Possible values are:  \n  - HORIZONTAL: Indicates horizontal orientation.\n\
        \  - VERTICAL: Indicates vertical orientation.\n  - HOR_AND_VER: Indicates\
        \ both horizontal and vertical orientation.\n"
      enum:
      - HORIZONTAL
      - VERTICAL
      - HOR_AND_VER
      title: LocationOrientation
      type: string
    QosPolOrderCriterion:
      description: "Possible values are: \n  - QOE: Indicates the order is the QoE.\n\
        \  - USAGE_DURATION: Indicates the order is the QoS Flow Usage Duration.\n\
        \  - NUMBER_OF_USAGES: Indicates the order is the number of usages of the\
        \ QoS Flow."
      enum:
      - QOE
      - USAGE_DURATION
      - NUMBER_OF_USAGES
      title: QosPolOrderCriterion
      type: string
    ProblemDetails:
      description: Provides additional information in an error response.
      properties:
        type:
          description: String providing an URI formatted according to RFC 3986.
          title: notificationURI
          type: string
        title:
          title: title
          type: string
        status:
          title: status
          type: integer
        detail:
          description: A human-readable explanation specific to this occurrence of
            the problem.
          title: detail
          type: string
        instance:
          description: String providing an URI formatted according to RFC 3986.
          title: notificationURI
          type: string
        cause:
          description: |
            A machine-readable application error cause specific to this occurrence of the problem.  This IE should be present and provide application-related error information, if available.
          title: cause
          type: string
        invalidParams:
          items:
            $ref: "#/components/schemas/InvalidParam"
          minItems: 1
          title: invalidParams
          type: array
        supportedFeatures:
          description: |
            A string used to indicate the features supported by an API that is used as defined in clause  6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in  hexadecimal representation Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in  table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
          pattern: "^[A-Fa-f0-9]*$"
          title: supportedFeatures
          type: string
        nrfId:
          description: Fully Qualified Domain Name
          maxLength: 253
          minLength: 4
          pattern: "^([0-9A-Za-z]([-0-9A-Za-z]{0,61}[0-9A-Za-z])?\\.)+[A-Za-z]{2,63}\\\
            .?$"
          title: nrfId
          type: string
        supportedApiVersions:
          items:
            type: string
          minItems: 1
          title: supportedApiVersions
          type: array
      title: ProblemDetails
      type: object
    Uri:
      description: String providing an URI formatted according to RFC 3986.
      title: notificationURI
      type: string
    InvalidParam:
      description: It contains an invalid parameter and a related description.
      properties:
        param:
          description: |
            If the invalid parameter is an attribute in a JSON body, this IE shall contain the  attribute's name and shall be encoded as a JSON Pointer. If the invalid parameter is  an HTTP header, this IE shall be formatted as the concatenation of the string "header "  plus the name of such header. If the invalid parameter is a query parameter, this IE  shall be formatted as the concatenation of the string "query " plus the name of such  query parameter. If the invalid parameter is a variable part in the path of a resource  URI, this IE shall contain the name of the variable, including the symbols "{" and "}"  used in OpenAPI specification as the notation to represent variable path segments.
          title: param
          type: string
        reason:
          description: |
            A human-readable reason, e.g. "must be a positive integer". In cases involving failed  operations in a PATCH request, the reason string should identify the operation that  failed using the operation's array index to assist in correlation of the invalid  parameter with the failed operation, e.g." Replacement value invalid for attribute  (failed operation index= 4)"
          title: reason
          type: string
      required:
      - param
      title: InvalidParam
      type: object
    SupportedFeatures:
      description: |
        A string used to indicate the features supported by an API that is used as defined in clause  6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in  hexadecimal representation Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in  table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
      pattern: "^[A-Fa-f0-9]*$"
      title: supportedFeatures
      type: string
    Fqdn:
