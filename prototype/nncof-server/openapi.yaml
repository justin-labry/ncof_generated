    EutraLocation:
      description: Contains the E-UTRA user location.
      example:
        geographicalInformation: geographicalInformation
        globalNgenbId:
          eNbId: eNbId
          wagfId: wagfId
          tngfId: tngfId
          gNbId:
            bitLength: 27
            gNBValue: gNBValue
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          n3IwfId: n3IwfId
          ngeNbId: SMacroNGeNB-34B89
        ageOfLocationInformation: 21703
        ignoreEcgi: false
        globalENbId:
          eNbId: eNbId
          wagfId: wagfId
          tngfId: tngfId
          gNbId:
            bitLength: 27
            gNBValue: gNBValue
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          n3IwfId: n3IwfId
          ngeNbId: SMacroNGeNB-34B89
        tai:
          tac: tac
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
        ignoreTai: false
        ueLocationTimestamp: 2000-01-23T04:56:07.000+00:00
        geodeticInformation: geodeticInformation
        ecgi:
          eutraCellId: eutraCellId
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
      properties:
        tai:
          $ref: "#/components/schemas/Tai"
        ignoreTai:
          default: false
          title: ignoreTai
          type: boolean
        ecgi:
          $ref: "#/components/schemas/Ecgi"
        ignoreEcgi:
          default: false
          description: |
            This flag when present shall indicate that the Ecgi shall be ignored When present, it shall be set as follows: - true: ecgi shall be ignored. - false (default): ecgi shall not be ignored.
          title: ignoreEcgi
          type: boolean
        ageOfLocationInformation:
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station.  Value "0" indicates that the location information was obtained after a successful paging procedure for Active Location Retrieval when the UE is in idle mode or after a successful NG-RAN location reporting procedure with the eNB when the UE is in connected mode.  Any other value than "0" indicates that the location information is the last known one.  See 3GPP TS 29.002 clause 17.7.8.
          maximum: 32767
          minimum: 0
          title: ageOfLocationInformation
          type: integer
        ueLocationTimestamp:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        geographicalInformation:
          description: |
            Refer to geographical Information. See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{16}$"
          title: geographicalInformation
          type: string
        geodeticInformation:
          description: |
            Refers to Calling Geodetic Location. See ITU-T Recommendation Q.763 (1999) [24] clause 3.88.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{20}$"
          title: geodeticInformation
          type: string
        globalNgenbId:
          $ref: "#/components/schemas/GlobalRanNodeId"
        globalENbId:
          $ref: "#/components/schemas/GlobalRanNodeId"
      required:
      - ecgi
      - tai
      title: EutraLocation
      type: object
    Tai:
      description: Contains the tracking area identity as described in 3GPP 23.003
      example:
        tac: tac
        nid: nid
        plmnId:
          mnc: mnc
          mcc: mcc
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        tac:
          description: "2 or 3-octet string identifying a tracking area code as specified\
            \ in clause 9.3.3.10  of 3GPP TS 38.413, in hexadecimal representation.\
            \ Each character in the string shall  take a value of \"0\" to \"9\",\
            \ \"a\" to \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most\
            \ significant character representing the 4 most significant bits of the\
            \ TAC shall  appear first in the string, and the character representing\
            \ the 4 least significant bit  of the TAC shall appear last in the string.\
            \ \n"
          pattern: "(^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)"
          title: Tac
          type: string
        nid:
          description: "This represents the Network Identifier, which together with\
            \ a PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS\
            \ 23.501 clause 5.30.2.1). \n"
          pattern: "^[A-Fa-f0-9]{11}$"
          title: Nid
          type: string
      required:
      - plmnId
      - tac
      title: Tai
      type: object
    PlmnId:
      description: |
        When PlmnId needs to be converted to string (e.g. when used in maps as key), the string  shall be composed of three digits "mcc" followed by "-" and two or three digits "mnc".
      example:
        mnc: mnc
        mcc: mcc
      properties:
        mcc:
          description: "Mobile Country Code part of the PLMN, comprising 3 digits,\
            \ as defined in clause 9.3.3.5 of 3GPP TS 38.413. \n"
          pattern: "^\\d{3}$"
          title: Mcc
          type: string
        mnc:
          description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits,\
            \ as defined in  clause 9.3.3.5 of 3GPP TS 38.413. \n"
          pattern: "^\\d{2,3}$"
          title: Mnc
          type: string
      required:
      - mcc
      - mnc
      title: PlmnId
      type: object
    Mcc:
      description: "Mobile Country Code part of the PLMN, comprising 3 digits, as\
        \ defined in clause 9.3.3.5 of 3GPP TS 38.413. \n"
      pattern: "^\\d{3}$"
      title: Mcc
      type: string
    Mnc:
      description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits,\
        \ as defined in  clause 9.3.3.5 of 3GPP TS 38.413. \n"
      pattern: "^\\d{2,3}$"
      title: Mnc
      type: string
    Tac:
      description: "2 or 3-octet string identifying a tracking area code as specified\
        \ in clause 9.3.3.10  of 3GPP TS 38.413, in hexadecimal representation. Each\
        \ character in the string shall  take a value of \"0\" to \"9\", \"a\" to\
        \ \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most significant\
        \ character representing the 4 most significant bits of the TAC shall  appear\
        \ first in the string, and the character representing the 4 least significant\
        \ bit  of the TAC shall appear last in the string. \n"
      pattern: "(^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)"
      title: Tac
      type: string
    Nid:
      description: "This represents the Network Identifier, which together with a\
        \ PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS 23.501\
        \ clause 5.30.2.1). \n"
      pattern: "^[A-Fa-f0-9]{11}$"
      title: Nid
      type: string
    Ecgi:
      description: "Contains the ECGI (E-UTRAN Cell Global Identity), as described\
        \ in 3GPP 23.003"
      example:
        eutraCellId: eutraCellId
        nid: nid
        plmnId:
          mnc: mnc
          mcc: mcc
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        eutraCellId:
          description: "28-bit string identifying an E-UTRA Cell Id as specified in\
            \ clause 9.3.1.9 of  3GPP TS 38.413, in hexadecimal representation. Each\
            \ character in the string shall take a  value of \"0\" to \"9\", \"a\"\
            \ to \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most  significant\
            \ character representing the 4 most significant bits of the Cell Id shall\
            \ appear  first in the string, and the character representing the 4 least\
            \ significant bit of the  Cell Id shall appear last in the string. \n"
          pattern: "^[A-Fa-f0-9]{7}$"
          title: EutraCellId
          type: string
        nid:
          description: "This represents the Network Identifier, which together with\
            \ a PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS\
            \ 23.501 clause 5.30.2.1). \n"
          pattern: "^[A-Fa-f0-9]{11}$"
          title: Nid
          type: string
      required:
      - eutraCellId
      - plmnId
      title: Ecgi
      type: object
    EutraCellId:
      description: "28-bit string identifying an E-UTRA Cell Id as specified in clause\
        \ 9.3.1.9 of  3GPP TS 38.413, in hexadecimal representation. Each character\
        \ in the string shall take a  value of \"0\" to \"9\", \"a\" to \"f\" or \"\
        A\" to \"F\" and shall represent 4 bits. The most  significant character representing\
        \ the 4 most significant bits of the Cell Id shall appear  first in the string,\
        \ and the character representing the 4 least significant bit of the  Cell\
        \ Id shall appear last in the string. \n"
      pattern: "^[A-Fa-f0-9]{7}$"
      title: EutraCellId
      type: string
    GlobalRanNodeId:
      description: |
        One of the six attributes n3IwfId, gNbIdm, ngeNbId, wagfId, tngfId, eNbId shall be present.
      example:
        eNbId: eNbId
        wagfId: wagfId
        tngfId: tngfId
        gNbId:
          bitLength: 27
          gNBValue: gNBValue
        nid: nid
        plmnId:
          mnc: mnc
          mcc: mcc
        n3IwfId: n3IwfId
        ngeNbId: SMacroNGeNB-34B89
      nullable: true
      oneOf: []
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        n3IwfId:
          description: "This represents the identifier of the N3IWF ID as specified\
            \ in clause 9.3.1.57 of  3GPP TS 38.413 in hexadecimal representation.\
            \ Each character in the string shall take a value  of \"0\" to \"9\",\
            \ \"a\" to \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most\
            \ significant  character representing the 4 most significant bits of the\
            \ N3IWF ID shall appear first in the  string, and the character representing\
            \ the 4 least significant bit of the N3IWF ID shall  appear last in the\
            \ string. \n"
          pattern: "^[A-Fa-f0-9]+$"
          title: N3IwfId
          type: string
        gNbId:
          $ref: "#/components/schemas/GNbId"
        ngeNbId:
          description: "This represents the identifier of the ng-eNB ID as specified\
            \ in clause 9.3.1.8 of  3GPP TS 38.413. The value of the ng-eNB ID shall\
            \ be encoded in hexadecimal representation.  Each character in the string\
            \ shall take a value of \"0\" to \"9\", \"a\" to \"f\" or \"A\" to \"\
            F\" and  shall represent 4 bits. The padding 0 shall be added to make\
            \ multiple nibbles, so the most  significant character representing the\
            \ padding 0 if required together with the 4 most  significant bits of\
            \ the ng-eNB ID shall appear first in the string, and the character  representing\
            \ the 4 least significant bit of the ng-eNB ID (to form a nibble) shall\
            \ appear last  in the string. \n"
          example: SMacroNGeNB-34B89
          pattern: "^(MacroNGeNB-[A-Fa-f0-9]{5}|LMacroNGeNB-[A-Fa-f0-9]{6}|SMacroNGeNB-[A-Fa-f0-9]{5})$"
          title: NgeNbId
          type: string
        wagfId:
          description: "This represents the identifier of the W-AGF ID as specified\
            \ in clause 9.3.1.162 of  3GPP TS 38.413 in hexadecimal representation.\
            \ Each character in the string shall take a value  of \"0\" to \"9\",\
            \ \"a\" to \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most\
            \ significant  character representing the 4 most significant bits of the\
            \ W-AGF ID shall appear first in the  string, and the character representing\
            \ the 4 least significant bit of the W-AGF ID shall  appear last in the\
            \ string. \n"
          pattern: "^[A-Fa-f0-9]+$"
          title: WAgfId
          type: string
        tngfId:
          description: "This represents the identifier of the TNGF ID as specified\
            \ in clause 9.3.1.161 of  3GPP TS 38.413  in hexadecimal representation.\
            \ Each character in the string shall take a value of \"0\" to \"9\", \"\
            a\"  to \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most significant\
            \ character representing the  4 most significant bits of the TNGF ID shall\
            \ appear first in the string, and the character  representing the 4 least\
            \ significant bit of the TNGF ID shall appear last in the string. \n"
          pattern: "^[A-Fa-f0-9]+$"
          title: TngfId
          type: string
        nid:
          description: "This represents the Network Identifier, which together with\
            \ a PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS\
            \ 23.501 clause 5.30.2.1). \n"
          pattern: "^[A-Fa-f0-9]{11}$"
          title: Nid
          type: string
        eNbId:
          description: |
            This represents the identifier of the eNB ID as specified in clause 9.2.1.37 of  3GPP TS 36.413. The string shall be formatted with the following pattern  '^('MacroeNB-[A-Fa-f0-9]{5}|LMacroeNB-[A-Fa-f0-9]{6}|SMacroeNB-[A-Fa-f0-9]{5} |HomeeNB-[A-Fa-f0-9]{7})$'. The value of the eNB ID shall be encoded in hexadecimal representation. Each character in the  string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits.  The padding 0 shall be added to make multiple nibbles, so the most significant character  representing the padding 0 if required together with the 4 most significant bits of the eNB ID  shall appear first in the string, and the character representing the 4 least significant bit  of the eNB ID (to form a nibble) shall appear last in the string.
          pattern: "^(MacroeNB-[A-Fa-f0-9]{5}|LMacroeNB-[A-Fa-f0-9]{6}|SMacroeNB-[A-Fa-f0-9]{5}|HomeeNB-[A-Fa-f0-9]{7})$"
          title: ENbId
          type: string
      required:
      - plmnId
      title: GlobalRanNodeId
      type: object
    N3IwfId:
      description: "This represents the identifier of the N3IWF ID as specified in\
        \ clause 9.3.1.57 of  3GPP TS 38.413 in hexadecimal representation. Each character\
        \ in the string shall take a value  of \"0\" to \"9\", \"a\" to \"f\" or \"\
        A\" to \"F\" and shall represent 4 bits. The most significant  character representing\
        \ the 4 most significant bits of the N3IWF ID shall appear first in the  string,\
        \ and the character representing the 4 least significant bit of the N3IWF\
        \ ID shall  appear last in the string. \n"
      pattern: "^[A-Fa-f0-9]+$"
      title: N3IwfId
      type: string
    GNbId:
      description: Provides the G-NB identifier.
      example:
        bitLength: 27
        gNBValue: gNBValue
      properties:
        bitLength:
          description: |
            Unsigned integer representing the bit length of the gNB ID as defined in clause 9.3.1.6 of 3GPP TS 38.413 [11], within the range 22 to 32.
          maximum: 32
          minimum: 22
          title: bitLength
          type: integer
        gNBValue:
          description: |
            This represents the identifier of the gNB. The value of the gNB ID shall be encoded in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The padding 0 shall be added to make multiple nibbles,  the most significant character representing the padding 0 if required together with the 4 most significant bits of the gNB ID shall appear first in the string, and the character representing the 4 least significant bit of the gNB ID shall appear last in the string.
          pattern: "^[A-Fa-f0-9]{6,8}$"
          title: gNBValue
          type: string
      required:
      - bitLength
      - gNBValue
      title: GNbId
      type: object
    NgeNbId:
      description: "This represents the identifier of the ng-eNB ID as specified in\
        \ clause 9.3.1.8 of  3GPP TS 38.413. The value of the ng-eNB ID shall be encoded\
        \ in hexadecimal representation.  Each character in the string shall take\
        \ a value of \"0\" to \"9\", \"a\" to \"f\" or \"A\" to \"F\" and  shall represent\
        \ 4 bits. The padding 0 shall be added to make multiple nibbles, so the most\
        \  significant character representing the padding 0 if required together with\
        \ the 4 most  significant bits of the ng-eNB ID shall appear first in the\
        \ string, and the character  representing the 4 least significant bit of the\
        \ ng-eNB ID (to form a nibble) shall appear last  in the string. \n"
      example: SMacroNGeNB-34B89
      pattern: "^(MacroNGeNB-[A-Fa-f0-9]{5}|LMacroNGeNB-[A-Fa-f0-9]{6}|SMacroNGeNB-[A-Fa-f0-9]{5})$"
      title: NgeNbId
      type: string
    WAgfId:
      description: "This represents the identifier of the W-AGF ID as specified in\
        \ clause 9.3.1.162 of  3GPP TS 38.413 in hexadecimal representation. Each\
        \ character in the string shall take a value  of \"0\" to \"9\", \"a\" to\
        \ \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most significant\
        \  character representing the 4 most significant bits of the W-AGF ID shall\
        \ appear first in the  string, and the character representing the 4 least\
        \ significant bit of the W-AGF ID shall  appear last in the string. \n"
      pattern: "^[A-Fa-f0-9]+$"
      title: WAgfId
      type: string
    TngfId:
      description: "This represents the identifier of the TNGF ID as specified in\
        \ clause 9.3.1.161 of  3GPP TS 38.413  in hexadecimal representation. Each\
        \ character in the string shall take a value of \"0\" to \"9\", \"a\"  to\
        \ \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most significant\
        \ character representing the  4 most significant bits of the TNGF ID shall\
        \ appear first in the string, and the character  representing the 4 least\
        \ significant bit of the TNGF ID shall appear last in the string. \n"
      pattern: "^[A-Fa-f0-9]+$"
      title: TngfId
      type: string
    ENbId:
      description: |
        This represents the identifier of the eNB ID as specified in clause 9.2.1.37 of  3GPP TS 36.413. The string shall be formatted with the following pattern  '^('MacroeNB-[A-Fa-f0-9]{5}|LMacroeNB-[A-Fa-f0-9]{6}|SMacroeNB-[A-Fa-f0-9]{5} |HomeeNB-[A-Fa-f0-9]{7})$'. The value of the eNB ID shall be encoded in hexadecimal representation. Each character in the  string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits.  The padding 0 shall be added to make multiple nibbles, so the most significant character  representing the padding 0 if required together with the 4 most significant bits of the eNB ID  shall appear first in the string, and the character representing the 4 least significant bit  of the eNB ID (to form a nibble) shall appear last in the string.
      pattern: "^(MacroeNB-[A-Fa-f0-9]{5}|LMacroeNB-[A-Fa-f0-9]{6}|SMacroeNB-[A-Fa-f0-9]{5}|HomeeNB-[A-Fa-f0-9]{7})$"
      title: ENbId
      type: string
    NrLocation:
      description: Contains the NR user location.
      example:
        ignoreNcgi: false
        geographicalInformation: geographicalInformation
        globalGnbId:
          eNbId: eNbId
          wagfId: wagfId
          tngfId: tngfId
          gNbId:
            bitLength: 27
            gNBValue: gNBValue
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          n3IwfId: n3IwfId
          ngeNbId: SMacroNGeNB-34B89
        ageOfLocationInformation: 14987
        ncgi:
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
          nrCellId: nrCellId
        ntnTaiInfo:
          tacList:
          - null
          - null
          derivedTac: derivedTac
          plmnId:
            mnc: mnc
            nid: nid
            mcc: mcc
        tai:
          tac: tac
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
        ueLocationTimestamp: 2000-01-23T04:56:07.000+00:00
        geodeticInformation: geodeticInformation
      properties:
        tai:
          $ref: "#/components/schemas/Tai"
        ncgi:
          $ref: "#/components/schemas/Ncgi"
        ignoreNcgi:
          default: false
          title: ignoreNcgi
          type: boolean
        ageOfLocationInformation:
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station. Value "0" indicates that the location information was obtained after a successful paging procedure for Active Location Retrieval when the UE is in idle mode or after a successful  NG-RAN location reporting procedure with the eNB when the UE is in connected mode. Any other value than "0" indicates that the location information is the last known one. See 3GPP TS 29.002 clause 17.7.8.
          maximum: 32767
          minimum: 0
          title: ageOfLocationInformation
          type: integer
        ueLocationTimestamp:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        geographicalInformation:
          description: |
            Refer to geographical Information. See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{16}$"
          title: geographicalInformation
          type: string
        geodeticInformation:
          description: |
            Refers to Calling Geodetic Location. See ITU-T Recommendation Q.763 (1999) [24] clause 3.88.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{20}$"
          title: geodeticInformation
          type: string
        globalGnbId:
          $ref: "#/components/schemas/GlobalRanNodeId"
        ntnTaiInfo:
          $ref: "#/components/schemas/NtnTaiInfo"
      required:
      - ncgi
      - tai
      title: NrLocation
      type: object
    Ncgi:
      description: "Contains the NCGI (NR Cell Global Identity), as described in 3GPP\
        \ 23.003"
      example:
        nid: nid
        plmnId:
          mnc: mnc
          mcc: mcc
        nrCellId: nrCellId
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        nrCellId:
          description: "36-bit string identifying an NR Cell Id as specified in clause\
            \ 9.3.1.7 of 3GPP TS 38.413,  in hexadecimal representation. Each character\
            \ in the string shall take a value of \"0\" to \"9\",  \"a\" to \"f\"\
            \ or \"A\" to \"F\" and shall represent 4 bits. The most significant character\
            \  representing the 4 most significant bits of the Cell Id shall appear\
            \ first in the string, and  the character representing the 4 least significant\
            \ bit of the Cell Id shall appear last in the  string. \n"
          pattern: "^[A-Fa-f0-9]{9}$"
          title: NrCellId
          type: string
        nid:
          description: "This represents the Network Identifier, which together with\
            \ a PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS\
            \ 23.501 clause 5.30.2.1). \n"
          pattern: "^[A-Fa-f0-9]{11}$"
          title: Nid
          type: string
      required:
      - nrCellId
      - plmnId
      title: Ncgi
      type: object
    NrCellId:
      description: "36-bit string identifying an NR Cell Id as specified in clause\
        \ 9.3.1.7 of 3GPP TS 38.413,  in hexadecimal representation. Each character\
        \ in the string shall take a value of \"0\" to \"9\",  \"a\" to \"f\" or \"\
        A\" to \"F\" and shall represent 4 bits. The most significant character  representing\
        \ the 4 most significant bits of the Cell Id shall appear first in the string,\
        \ and  the character representing the 4 least significant bit of the Cell\
        \ Id shall appear last in the  string. \n"
      pattern: "^[A-Fa-f0-9]{9}$"
      title: NrCellId
      type: string
    NtnTaiInfo:
      description: Contains NR NTN TAI Information.
      example:
        tacList:
        - null
        - null
        derivedTac: derivedTac
        plmnId:
          mnc: mnc
          nid: nid
          mcc: mcc
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnIdNid"
        tacList:
          items:
            $ref: "#/components/schemas/Tac"
          minItems: 1
          title: tacList
          type: array
        derivedTac:
          description: "2 or 3-octet string identifying a tracking area code as specified\
            \ in clause 9.3.3.10  of 3GPP TS 38.413, in hexadecimal representation.\
            \ Each character in the string shall  take a value of \"0\" to \"9\",\
            \ \"a\" to \"f\" or \"A\" to \"F\" and shall represent 4 bits. The most\
            \ significant character representing the 4 most significant bits of the\
            \ TAC shall  appear first in the string, and the character representing\
            \ the 4 least significant bit  of the TAC shall appear last in the string.\
            \ \n"
          pattern: "(^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)"
          title: Tac
          type: string
      required:
      - plmnId
      - tacList
      title: NtnTaiInfo
      type: object
    PlmnIdNid:
      description: |
        Contains the serving core network operator PLMN ID and, for an SNPN, the NID that together with the PLMN ID identifies the SNPN.
      example:
        mnc: mnc
        nid: nid
        mcc: mcc
      properties:
        mcc:
          description: "Mobile Country Code part of the PLMN, comprising 3 digits,\
            \ as defined in clause 9.3.3.5 of 3GPP TS 38.413. \n"
          pattern: "^\\d{3}$"
          title: Mcc
          type: string
        mnc:
          description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits,\
            \ as defined in  clause 9.3.3.5 of 3GPP TS 38.413. \n"
          pattern: "^\\d{2,3}$"
          title: Mnc
          type: string
        nid:
          description: "This represents the Network Identifier, which together with\
            \ a PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS\
            \ 23.501 clause 5.30.2.1). \n"
          pattern: "^[A-Fa-f0-9]{11}$"
          title: Nid
          type: string
      required:
      - mcc
      - mnc
      title: PlmnIdNid
      type: object
    N3gaLocation:
      description: Contains the Non-3GPP access user location.
      example:
        ueIpv4Addr: 198.51.100.1
        twapId:
          bssId: bssId
          civicAddress: civicAddress
          ssId: ssId
        hfcNodeId:
          hfcNId: hfcNId
        protocol: UDP
        gli: gli
        n3gppTai:
          tac: tac
          nid: nid
          plmnId:
            mnc: mnc
            mcc: mcc
        tnapId:
          bssId: bssId
          civicAddress: civicAddress
          ssId: ssId
        w5gbanLineType: DSL
        ueIpv6Addr: 2001:db8:85a3::8a2e:370:7334
        gci: gci
        n3IwfId: n3IwfId
        portNumber: 0
      properties:
        n3gppTai:
          $ref: "#/components/schemas/Tai"
        n3IwfId:
          description: "This IE shall contain the N3IWF identifier received over NGAP\
            \ and shall be encoded as a  string of hexadecimal characters. Each character\
            \ in the string shall take a value of \"0\"  to \"9\", \"a\" to \"f\"\
            \ or \"A\" to \"F\" and shall represent 4 bits. The most significant \
            \ character representing the 4 most significant bits of the N3IWF ID shall\
            \ appear first in  the string, and the character representing the 4 least\
            \ significant bit of the N3IWF ID  shall appear last in the string. \n"
          pattern: "^[A-Fa-f0-9]+$"
          title: n3IwfId
          type: string
        ueIpv4Addr:
          description: |
            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          title: Ipv4Addr
          type: string
        ueIpv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
        portNumber:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
        protocol:
          $ref: "#/components/schemas/TransportProtocol"
        tnapId:
          $ref: "#/components/schemas/TnapId"
        twapId:
          $ref: "#/components/schemas/TwapId"
        hfcNodeId:
          $ref: "#/components/schemas/HfcNodeId"
        gli:
          description: string with format 'bytes' as defined in OpenAPI
          format: byte
          title: Bytes
          type: string
        w5gbanLineType:
          $ref: "#/components/schemas/LineType"
        gci:
          description: |
            Global Cable Identifier uniquely identifying the connection between the 5G-CRG or FN-CRG to the 5GS. See clause 28.15.4 of 3GPP TS 23.003. This shall be encoded as a string per clause 28.15.4 of 3GPP TS 23.003, and compliant with the syntax specified  in clause 2.2  of IETF RFC 7542 for the username part of a NAI. The GCI value is specified in CableLabs WR-TR-5WWC-ARCH.
          title: Gci
          type: string
      title: N3gaLocation
      type: object
    Ipv4Addr:
      description: |
        String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
      example: 198.51.100.1
      pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
      title: Ipv4Addr
      type: string
    Ipv6Addr:
      description: |
        String identifying an IPv6 address formatted according to clause 4 of RFC5952. The mixed IPv4 IPv6 notation according to clause 5 of RFC5952 shall not be used.
      example: 2001:db8:85a3::8a2e:370:7334
      title: Ipv6Addr
      type: string
    TransportProtocol:
      description: "Possible values are:\n- UDP: User Datagram Protocol.\n- TCP: Transmission\
        \ Control Protocol. \n"
      enum:
      - UDP
      - TCP
      title: TransportProtocol
      type: string
    TnapId:
      description: Contain the TNAP Identifier see clause5.6.2 of 3GPP TS 23.501.
      example:
        bssId: bssId
        civicAddress: civicAddress
        ssId: ssId
      properties:
        ssId:
          description: "This IE shall be present if the UE is accessing the 5GC via\
            \ a trusted WLAN access network.When present, it shall contain the SSID\
            \ of the access point to which the UE is attached, that is received over\
            \ NGAP,  see IEEE Std 802.11-2012. \n"
          title: ssId
          type: string
        bssId:
          description: "When present, it shall contain the BSSID of the access point\
            \ to which the UE is attached, that is received over NGAP, see IEEE Std\
            \ 802.11-2012. \n"
          title: bssId
          type: string
        civicAddress:
          description: string with format 'bytes' as defined in OpenAPI
          format: byte
          title: Bytes
          type: string
      title: TnapId
      type: object
    Bytes:
      description: string with format 'bytes' as defined in OpenAPI
      format: byte
      title: Bytes
      type: string
    TwapId:
      description: |
        Contain the TWAP Identifier as defined in clause 4.2.8.5.3 of 3GPP TS 23.501 or the WLAN location information as defined in clause 4.5.7.2.8 of 3GPP TS 23.402.
      example:
        bssId: bssId
        civicAddress: civicAddress
        ssId: ssId
      properties:
        ssId:
          description: "This IE shall contain the SSID of the access point to which\
            \ the UE is attached, that is received over NGAP, see IEEE Std 802.11-2012.\
            \ \n"
          title: ssId
          type: string
        bssId:
          description: "When present, it shall contain the BSSID of the access point\
            \ to which the UE is attached, for trusted WLAN access, see IEEE Std 802.11-2012.\
            \ \n"
          title: bssId
          type: string
        civicAddress:
          description: string with format 'bytes' as defined in OpenAPI
          format: byte
          title: Bytes
          type: string
      required:
      - ssId
      title: TwapId
      type: object
    HfcNodeId:
      description: REpresents the HFC Node Identifer received over NGAP.
      example:
        hfcNId: hfcNId
      properties:
        hfcNId:
          description: |
            This IE represents the identifier of the HFC node Id as specified in CableLabs WR-TR-5WWC-ARCH. It is provisioned by the wireline operator as part of wireline operations and may contain up to six characters.
          maxLength: 6
          title: HfcNId
          type: string
      required:
      - hfcNId
      title: HfcNodeId
      type: object
    HfcNId:
      description: |
        This IE represents the identifier of the HFC node Id as specified in CableLabs WR-TR-5WWC-ARCH. It is provisioned by the wireline operator as part of wireline operations and may contain up to six characters.
      maxLength: 6
      title: HfcNId
      type: string
    Gli:
      $ref: "#/components/schemas/Bytes"
    LineType:
      description: |
        Possible values are:
        - DSL: Identifies a DSL line
        - PON: Identifies a PON line
      enum:
      - DSL
      - PON
      title: LineType
      type: string
    Gci:
      description: |
        Global Cable Identifier uniquely identifying the connection between the 5G-CRG or FN-CRG to the 5GS. See clause 28.15.4 of 3GPP TS 23.003. This shall be encoded as a string per clause 28.15.4 of 3GPP TS 23.003, and compliant with the syntax specified  in clause 2.2  of IETF RFC 7542 for the username part of a NAI. The GCI value is specified in CableLabs WR-TR-5WWC-ARCH.
      title: Gci
      type: string
    UtraLocation:
      description: "Exactly one of cgi, sai or lai shall be present."
      example:
        geographicalInformation: geographicalInformation
        ageOfLocationInformation: 30323
        cgi:
          plmnId:
            mnc: mnc
            mcc: mcc
          cellId: cellId
          lac: lac
        lai:
          plmnId:
            mnc: mnc
            mcc: mcc
          lac: lac
        sai:
          sac: sac
          plmnId:
            mnc: mnc
            mcc: mcc
          lac: lac
        rai:
          rac: rac
          plmnId:
            mnc: mnc
            mcc: mcc
          lac: lac
        ueLocationTimestamp: 2000-01-23T04:56:07.000+00:00
        geodeticInformation: geodeticInformation
      nullable: true
      oneOf: []
      properties:
        cgi:
          $ref: "#/components/schemas/CellGlobalId"
        sai:
          $ref: "#/components/schemas/ServiceAreaId"
        lai:
          $ref: "#/components/schemas/LocationAreaId"
        rai:
          $ref: "#/components/schemas/RoutingAreaId"
        ageOfLocationInformation:
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station.  Value "0" indicates that the location information was obtained after a successful paging procedure for Active Location Retrieval when the UE is in idle mode
             or after a successful location reporting procedure the UE is in connected mode. Any
            other value than "0" indicates that the location information is the last known one.  See 3GPP TS 29.002 clause 17.7.8.
          maximum: 32767
          minimum: 0
          title: ageOfLocationInformation
          type: integer
        ueLocationTimestamp:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        geographicalInformation:
          description: |
            Refer to geographical Information.See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{16}$"
          title: geographicalInformation
          type: string
        geodeticInformation:
          description: |
            Refers to Calling Geodetic Location. See ITU-T Recommendation Q.763 (1999) clause 3.88.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{20}$"
          title: geodeticInformation
          type: string
      title: UtraLocation
      type: object
    CellGlobalId:
      description: "Contains a Cell Global Identification as defined in 3GPP TS 23.003,\
        \ clause 4.3.1."
      example:
        plmnId:
          mnc: mnc
          mcc: mcc
        cellId: cellId
        lac: lac
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        lac:
          pattern: "^[A-Fa-f0-9]{4}$"
          title: lac
          type: string
        cellId:
          pattern: "^[A-Fa-f0-9]{4}$"
          title: cellId
          type: string
      required:
      - cellId
      - lac
      - plmnId
      title: CellGlobalId
      type: object
    ServiceAreaId:
      description: "Contains a Service Area Identifier as defined in 3GPP TS 23.003,\
        \ clause 12.5."
      example:
        sac: sac
        plmnId:
          mnc: mnc
          mcc: mcc
        lac: lac
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        lac:
          description: Location Area Code.
          pattern: "^[A-Fa-f0-9]{4}$"
          title: lac
          type: string
        sac:
          description: Service Area Code.
          pattern: "^[A-Fa-f0-9]{4}$"
          title: sac
          type: string
      required:
      - lac
      - plmnId
      - sac
      title: ServiceAreaId
      type: object
    LocationAreaId:
      description: "Contains a Location area identification as defined in 3GPP TS\
        \ 23.003, clause 4.1."
      example:
        plmnId:
          mnc: mnc
          mcc: mcc
        lac: lac
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        lac:
          description: Location Area Code.
          pattern: "^[A-Fa-f0-9]{4}$"
          title: lac
          type: string
      required:
      - lac
      - plmnId
      title: LocationAreaId
      type: object
    RoutingAreaId:
      description: "Contains a Routing Area Identification as defined in 3GPP TS 23.003,\
        \ clause 4.2."
      example:
        rac: rac
        plmnId:
          mnc: mnc
          mcc: mcc
        lac: lac
      properties:
        plmnId:
          $ref: "#/components/schemas/PlmnId"
        lac:
          description: Location Area Code
          pattern: "^[A-Fa-f0-9]{4}$"
          title: lac
          type: string
        rac:
          description: Routing Area Code
          pattern: "^[A-Fa-f0-9]{2}$"
          title: rac
          type: string
      required:
      - lac
      - plmnId
      - rac
      title: RoutingAreaId
      type: object
    GeraLocation:
      description: "Exactly one of cgi, sai or lai shall be present."
      example:
        geographicalInformation: geographicalInformation
        ageOfLocationInformation: 5986
        cgi:
          plmnId:
            mnc: mnc
            mcc: mcc
          cellId: cellId
          lac: lac
        lai:
          plmnId:
            mnc: mnc
            mcc: mcc
          lac: lac
        mscNumber: mscNumber
        sai:
          sac: sac
          plmnId:
            mnc: mnc
            mcc: mcc
          lac: lac
        rai:
          rac: rac
          plmnId:
            mnc: mnc
            mcc: mcc
          lac: lac
        vlrNumber: vlrNumber
        locationNumber: locationNumber
        ueLocationTimestamp: 2000-01-23T04:56:07.000+00:00
        geodeticInformation: geodeticInformation
      nullable: true
      oneOf: []
      properties:
        locationNumber:
          description: "Location number within the PLMN. See 3GPP TS 23.003, clause\
            \ 4.5."
          title: locationNumber
          type: string
        cgi:
          $ref: "#/components/schemas/CellGlobalId"
        sai:
          $ref: "#/components/schemas/ServiceAreaId"
        lai:
          $ref: "#/components/schemas/LocationAreaId"
        rai:
          $ref: "#/components/schemas/RoutingAreaId"
        vlrNumber:
          description: VLR number. See 3GPP TS 23.003 clause 5.1.
          title: vlrNumber
          type: string
        mscNumber:
          description: MSC number. See 3GPP TS 23.003 clause 5.1.
          title: mscNumber
          type: string
        ageOfLocationInformation:
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station. Value "0" indicates that the location information was obtained after a successful paging procedure for  Active Location Retrieval when the UE is in idle mode or after a successful location reporting procedure the UE is in connected mode. Any other value than "0" indicates that the location information is the last known one. See 3GPP TS 29.002 clause 17.7.8.
          maximum: 32767
          minimum: 0
          title: ageOfLocationInformation
          type: integer
        ueLocationTimestamp:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        geographicalInformation:
          description: |
            Refer to geographical Information.See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{16}$"
          title: geographicalInformation
          type: string
        geodeticInformation:
          description: |
            Refers to Calling Geodetic Location.See ITU-T Recommendation Q.763 (1999) clause 3.88.2.  Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
          pattern: "^[0-9A-F]{20}$"
          title: geodeticInformation
          type: string
      title: GeraLocation
      type: object
    "5Qi":
      description: |
        Unsigned integer representing a 5G QoS Identifier (see clause 5.7.2.1 of 3GPP TS 23.501, within the range 0 to 255.
      maximum: 255
      minimum: 0
      title: 5Qi
      type: integer
    QosResourceType:
      description: "The enumeration QosResourceType indicates whether a QoS Flow is\
        \ non-GBR, delay critical GBR, or non-delay critical GBR (see clauses 5.7.3.4\
        \ and 5.7.3.5 of 3GPP TS 23.501). It shall comply with the provisions defined\
        \ in table 5.5.3.6-1. \n"
      enum:
      - NON_GBR
      - NON_CRITICAL_GBR
      - CRITICAL_GBR
      title: QosResourceType
      type: string
    PacketErrRate:
      description: |
        String representing Packet Error Rate (see clause 5.7.3.5 and 5.7.4 of 3GPP TS 23.501, expressed as a "scalar x 10-k" where the scalar and the exponent k are each encoded as one decimal digit.
      pattern: "^([0-9]E-[0-9])$"
      title: PacketErrRate
      type: string
    VelocityEstimate:
      anyOf:
      - $ref: "#/components/schemas/HorizontalVelocity"
      - $ref: "#/components/schemas/HorizontalWithVerticalVelocity"
      - $ref: "#/components/schemas/HorizontalVelocityWithUncertainty"
      - $ref: "#/components/schemas/HorizontalWithVerticalVelocityAndUncertainty"
      - $ref: "#/components/schemas/RelativeVelocityWithUncertainty"
      description: Velocity estimate.
      title: VelocityEstimate
    HorizontalVelocity:
      description: Horizontal velocity.
      example:
        hSpeed: 1387.5231
        bearing: 247
      properties:
        hSpeed:
          description: Indicates value of horizontal speed.
          format: float
          maximum: 2047
          minimum: 0
          title: HorizontalSpeed
          type: number
        bearing:
          description: Indicates value of angle.
          maximum: 360
          minimum: 0
          title: Angle
          type: integer
      required:
      - bearing
      - hSpeed
      title: HorizontalVelocity
      type: object
    HorizontalSpeed:
      description: Indicates value of horizontal speed.
      format: float
      maximum: 2047
      minimum: 0
      title: HorizontalSpeed
      type: number
    HorizontalWithVerticalVelocity:
      description: Horizontal and vertical velocity.
      properties:
        hSpeed:
          description: Indicates value of horizontal speed.
          format: float
          maximum: 2047
          minimum: 0
          title: HorizontalSpeed
          type: number
        bearing:
          description: Indicates value of angle.
          maximum: 360
          minimum: 0
          title: Angle
          type: integer
        vSpeed:
          description: Indicates value of vertical speed.
          format: float
          maximum: 255
          minimum: 0
          title: VerticalSpeed
          type: number
        vDirection:
          $ref: "#/components/schemas/VerticalDirection"
      required:
      - bearing
      - hSpeed
      - vDirection
      - vSpeed
      title: HorizontalWithVerticalVelocity
      type: object
    VerticalSpeed:
      description: Indicates value of vertical speed.
      format: float
      maximum: 255
      minimum: 0
      title: VerticalSpeed
      type: number
    VerticalDirection:
      description: Indicates direction of vertical speed.
      enum:
      - UPWARD
      - DOWNWARD
      title: VerticalDirection
      type: string
    HorizontalVelocityWithUncertainty:
      description: Horizontal velocity with speed uncertainty.
      properties:
        hSpeed:
          description: Indicates value of horizontal speed.
          format: float
          maximum: 2047
          minimum: 0
          title: HorizontalSpeed
          type: number
        bearing:
          description: Indicates value of angle.
          maximum: 360
          minimum: 0
          title: Angle
          type: integer
        hUncertainty:
          description: Indicates value of speed uncertainty.
          format: float
          maximum: 255
          minimum: 0
          title: SpeedUncertainty
          type: number
      required:
      - bearing
      - hSpeed
      - hUncertainty
      title: HorizontalVelocityWithUncertainty
      type: object
    SpeedUncertainty:
      description: Indicates value of speed uncertainty.
      format: float
      maximum: 255
      minimum: 0
      title: SpeedUncertainty
      type: number
    HorizontalWithVerticalVelocityAndUncertainty:
      description: Horizontal and vertical velocity with speed uncertainty.
      properties:
        hSpeed:
          description: Indicates value of horizontal speed.
          format: float
          maximum: 2047
          minimum: 0
          title: HorizontalSpeed
          type: number
        bearing:
          description: Indicates value of angle.
          maximum: 360
          minimum: 0
          title: Angle
          type: integer
        vSpeed:
          description: Indicates value of vertical speed.
          format: float
          maximum: 255
          minimum: 0
          title: VerticalSpeed
          type: number
        vDirection:
          $ref: "#/components/schemas/VerticalDirection"
        hUncertainty:
          description: Indicates value of speed uncertainty.
          format: float
          maximum: 255
          minimum: 0
          title: SpeedUncertainty
          type: number
        vUncertainty:
          description: Indicates value of speed uncertainty.
          format: float
          maximum: 255
          minimum: 0
          title: SpeedUncertainty
          type: number
      required:
      - bearing
      - hSpeed
      - hUncertainty
      - vDirection
      - vSpeed
      - vUncertainty
      title: HorizontalWithVerticalVelocityAndUncertainty
      type: object
    RelativeVelocityWithUncertainty:
      description: Relative velocity with radial velocity and transverse velocity.
      properties:
        rVelocity:
          $ref: "#/components/schemas/RadialVelocity"
        aTransverseVelocity:
          $ref: "#/components/schemas/AngularVelocity"
        eTransverseVelocity:
          $ref: "#/components/schemas/AngularVelocity"
      title: RelativeVelocityWithUncertainty
      type: object
    RadialVelocity:
      description: Rate of change of a range.
      properties:
        unitsRadialVelocity:
          $ref: "#/components/schemas/UnitsLinearVelocity"
        radialVelocity:
          description: Indicates value of rate of change of a range between the device
            A and device B.
          maximum: 2047
          minimum: -2048
          title: RadialVelocityValue
          type: integer
        rVelocityUncertainty:
          description: Indicates uncertainty for rate of change of an range.
          maximum: 255
          minimum: 0
          title: RadialVelocityUncertainty
          type: integer
      required:
      - rVelocityUncertainty
      - radialVelocity
      - unitsRadialVelocity
      title: RadialVelocity
      type: object
    UnitsLinearVelocity:
      description: The the units of linear velocity.
      enum:
      - MPERS
      - CMPERS
      title: UnitsLinearVelocity
      type: string
    RadialVelocityValue:
      description: Indicates value of rate of change of a range between the device
        A and device B.
      maximum: 2047
      minimum: -2048
      title: RadialVelocityValue
      type: integer
    RadialVelocityUncertainty:
      description: Indicates uncertainty for rate of change of an range.
      maximum: 255
      minimum: 0
      title: RadialVelocityUncertainty
      type: integer
    AngularVelocity:
      description: Rate of change of an angle.
      properties:
        unitsAngularVelocity:
          $ref: "#/components/schemas/UnitsAngularVelocity"
        angularVelocity:
          description: Indicates rate of change of an angle.
          maximum: 1023
          minimum: -1024
          title: AngularVelocityValue
          type: integer
        aVelocityUncertainty:
          description: Indicates uncertainty for rate of change of an angle.
          maximum: 255
          minimum: 0
          title: AngularVelocityUncertainty
          type: integer
      required:
      - aVelocityUncertainty
      - angularVelocity
      - unitsAngularVelocity
      title: AngularVelocity
      type: object
    UnitsAngularVelocity:
      description: The units of angular velocity.
      enum:
      - DEGPERSEC1
      - DEGPERSEC01
      title: UnitsAngularVelocity
      type: string
    AngularVelocityValue:
      description: Indicates rate of change of an angle.
      maximum: 1023
      minimum: -1024
      title: AngularVelocityValue
      type: integer
    AngularVelocityUncertainty:
      description: Indicates uncertainty for rate of change of an angle.
      maximum: 255
      minimum: 0
      title: AngularVelocityUncertainty
      type: integer
    PacketLossRate:
      description: |
        Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
      maximum: 1000
      minimum: 0
      title: PacketLossRate
      type: integer
    FlowDescription:
      description: Defines a packet filter of an IP flow.
      title: FlowDescription
      type: string
    EthFlowDescription:
      description: Identifies an Ethernet flow.
      example:
        destMacAddr: destMacAddr
        destMacAddrEnd: destMacAddrEnd
        sourceMacAddr: sourceMacAddr
        fDir: DOWNLINK
        ethType: ethType
        fDesc: fDesc
        vlanTags:
        - vlanTags
        - vlanTags
        srcMacAddrEnd: srcMacAddrEnd
      properties:
        destMacAddr:
          description: |
            String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
          pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
          title: MacAddr48
          type: string
        ethType:
          title: ethType
          type: string
        fDesc:
          description: Defines a packet filter of an IP flow.
          title: FlowDescription
          type: string
        fDir:
          $ref: "#/components/schemas/FlowDirection"
        sourceMacAddr:
          description: |
            String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
          pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
          title: MacAddr48
          type: string
        vlanTags:
          items:
            type: string
          maxItems: 2
          minItems: 1
          title: vlanTags
          type: array
        srcMacAddrEnd:
          description: |
            String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
          pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
          title: MacAddr48
          type: string
        destMacAddrEnd:
          description: |
            String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
          pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
          title: MacAddr48
          type: string
      required:
      - ethType
      title: EthFlowDescription
      type: object
    FlowDirection:
      description: "Indicates the direction of the service data flow.  \nPossible\
        \ values are:\n- DOWNLINK: The corresponding filter applies for traffic to\
        \ the UE.\n- UPLINK: The corresponding filter applies for traffic from the\
        \ UE.\n- BIDIRECTIONAL: The corresponding filter applies for traffic both\
        \ to and from the UE.\n- UNSPECIFIED: The corresponding filter applies for\
        \ traffic to the UE (downlink), but has no\nspecific direction declared. The\
        \ service data flow detection shall apply the filter for\nuplink traffic as\
        \ if the filter was bidirectional. The PCF shall not use the value\nUNSPECIFIED\
        \ in filters created by the network in NW-initiated procedures. The PCF shall\
        \ only\ninclude the value UNSPECIFIED in filters in UE-initiated procedures\
        \ if the same value is\nreceived from the SMF.\n"
      enum:
      - DOWNLINK
      - UPLINK
      - BIDIRECTIONAL
      - UNSPECIFIED
      title: FlowDirection
      type: string
    Volume:
      description: Unsigned integer identifying a volume in units of bytes.
      format: int64
      minimum: 0
      title: Volume
      type: integer
    ArfcnValueNR:
      description: |
        Integer value indicating the ARFCN applicable for a downlink, uplink or bi-directional (TDD) NR global frequency raster, as definition of "ARFCN-ValueNR" IE in clause 6.3.2 of 3GPP TS 38.331.
      maximum: 3279165
      minimum: 0
      title: ArfcnValueNR
      type: integer
    RatType:
      description: Indicates the radio access used.
      enum:
      - NR
      - EUTRA
      - WLAN
      - VIRTUAL
      - NBIOT
      - WIRELINE
      - WIRELINE_CABLE
      - WIRELINE_BBF
      - LTE-M
      - NR_U
      - EUTRA_U
      - TRUSTED_N3GA
      - TRUSTED_WLAN
      - UTRA
      - GERA
      - NR_LEO
      - NR_MEO
      - NR_GEO
      - NR_OTHER_SAT
      - NR_REDCAP
      - WB_E_UTRAN_LEO
      - WB_E_UTRAN_MEO
      - WB_E_UTRAN_GEO
      - WB_E_UTRAN_OTHERSAT
      - NB_IOT_LEO
      - NB_IOT_MEO
      - NB_IOT_GEO
      - NB_IOT_OTHERSAT
      - LTE_M_LEO
      - LTE_M_MEO
      - LTE_M_GEO
      - LTE_M_OTHERSAT
      - NR_EREDCAP
      title: RatType
      type: string
    PduSessionType:
      description: "PduSessionType indicates the type of a PDU session. It shall comply\
        \ with the provisions defined in table 5.4.3.3-1. \n"
      enum:
      - IPV4
      - IPV6
      - IPV4V6
      - UNSTRUCTURED
      - ETHERNET
      title: PduSessionType
      type: string
    SscMode:
      description: "represents the service and session continuity mode It shall comply\
        \ with the provisions defined in table 5.4.3.6-1. \n"
      enum:
      - SSC_MODE_1
      - SSC_MODE_2
      - SSC_MODE_3
      title: SscMode
      type: string
    AccessType:
      description: Indicates whether the access is  via 3GPP or via non-3GPP.
      enum:
      - 3GPP_ACCESS
      - NON_3GPP_ACCESS
      title: AccessType
      type: string
    "5QiPriorityLevel":
      description: "Unsigned integer indicating the 5QI Priority Level (see clauses\
        \ 5.7.3.3 and 5.7.4 of 3GPP TS 23.501, within the range 1 to 127.Values are\
        \ ordered in decreasing order of priority,  i.e. with 1 as the highest priority\
        \ and 127 as the lowest priority. \n"
      maximum: 127
      minimum: 1
      title: 5QiPriorityLevel
      type: integer
    AverWindow:
      default: 2000
      description: "Unsigned integer indicating Averaging Window (see clause 5.7.3.6\
        \ and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds. \n"
      maximum: 4095
      minimum: 1
      title: AverWindow
      type: integer
    MaxDataBurstVol:
      description: "Unsigned integer indicating Maximum Data Burst Volume (see clauses\
        \ 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
      maximum: 4095
      minimum: 1
      title: MaxDataBurstVol
      type: integer
    PartitioningCriteria:
      description: |
        Possible values are:
        - "TAC": Type Allocation Code
        - "SUBPLMN": Subscriber PLMN ID
        - "GEOAREA": Geographical area, i.e. list(s) of TAI(s)
        - "SNSSAI": S-NSSAI
        - "DNN": DNN
      enum:
      - TAC
      - SUBPLMN
      - GEOAREA
      - SNSSAI
      - DNN
      title: PartitioningCriteria
      type: string
    NotificationFlag:
      description: "Possible values are:\n- ACTIVATE: The event notification is activated.\n\
        - DEACTIVATE: The event notification is deactivated and shall be muted. The\
        \ available\n   event(s) shall be stored.\n- RETRIEVAL: The event notification\
        \ shall be sent to the NF service consumer(s),\n  after that, is muted again.\
        \ \n"
      enum:
      - ACTIVATE
      - DEACTIVATE
      - RETRIEVAL
      title: NotificationFlag
      type: string
    MutingExceptionInstructions:
      description: |
        Indicates to an Event producer NF instructions for the subscription and stored events when an exception (e.g. full buffer) occurs at the Event producer NF while the event is muted.
      example:
        bufferedNotifs: SEND_ALL
        subscription: CLOSE
      properties:
        bufferedNotifs:
          $ref: "#/components/schemas/BufferedNotificationsAction"
        subscription:
          $ref: "#/components/schemas/SubscriptionAction"
      title: MutingExceptionInstructions
      type: object
    BufferedNotificationsAction:
      description: |
        Indicates the required action by the event producer NF on the buffered Notifications.
      enum:
      - SEND_ALL
      - DISCARD_ALL
      - DROP_OLD
      title: BufferedNotificationsAction
      type: string
    SubscriptionAction:
      description: |
        Indicates the required action by the event producer NF on the event subscription if an exception occurs while the event is muted.
      enum:
      - CLOSE
      - CONTINUE_WITH_MUTING
      - CONTINUE_WITHOUT_MUTING
      title: SubscriptionAction
      type: string
    MutingNotificationsSettings:
      description: |
        Indicates the Event producer NF settings to the Event consumer NF
      example:
        maxNoOfNotif: 4
        durationBufferedNotif: 6
      properties:
        maxNoOfNotif:
          title: maxNoOfNotif
          type: integer
        durationBufferedNotif:
          description: indicating a time in seconds.
          title: DurationSec
          type: integer
      title: MutingNotificationsSettings
      type: object
    StationaryIndication:
      description: |
        Possible values are:
        - STATIONARY: Identifies the UE is stationary
        - MOBILE: Identifies the UE is mobile
      enum:
      - STATIONARY
      - MOBILE
      title: StationaryIndication
      type: string
    ScheduledCommunicationTime:
      description: Identifies time and day of the week when the UE is available for
        communication.
      example:
        timeOfDayEnd: timeOfDayEnd
        daysOfWeek:
        - null
        - null
        - null
        - null
        - null
        timeOfDayStart: timeOfDayStart
      properties:
        daysOfWeek:
          description: |
            Identifies the day(s) of the week. If absent, it indicates every day of the week.
          items:
            $ref: "#/components/schemas/DayOfWeek"
          maxItems: 6
          minItems: 1
          title: daysOfWeek
          type: array
        timeOfDayStart:
          description: "String with format partial-time or full-time as defined in\
            \ clause 5.6 of IETF RFC 3339. Examples, 20:15:00, 20:15:00-08:00 (for\
            \ 8 hours behind UTC). \n"
          title: TimeOfDay
          type: string
        timeOfDayEnd:
          description: "String with format partial-time or full-time as defined in\
            \ clause 5.6 of IETF RFC 3339. Examples, 20:15:00, 20:15:00-08:00 (for\
            \ 8 hours behind UTC). \n"
          title: TimeOfDay
          type: string
      title: ScheduledCommunicationTime
      type: object
    DayOfWeek:
      description: |
        integer between and including 1 and 7 denoting a weekday. 1 shall indicate Monday, and the subsequent weekdays shall be indicated with the next higher numbers. 7 shall indicate Sunday.
      maximum: 7
      minimum: 1
      title: DayOfWeek
      type: integer
    TimeOfDay:
      description: "String with format partial-time or full-time as defined in clause\
        \ 5.6 of IETF RFC 3339. Examples, 20:15:00, 20:15:00-08:00 (for 8 hours behind\
        \ UTC). \n"
      title: TimeOfDay
      type: string
    ScheduledCommunicationType:
      description: |
        Possible values are:
        -DOWNLINK_ONLY: Downlink only
        -UPLINK_ONLY: Uplink only
        -BIDIRECTIONA: Bi-directional
      enum:
      - DOWNLINK_ONLY
      - UPLINK_ONLY
      - BIDIRECTIONAL
      title: ScheduledCommunicationType
      type: string
    TrafficProfile:
      description: "Possible values are:\n- SINGLE_TRANS_UL: Uplink single packet\
        \ transmission.\n- SINGLE_TRANS_DL: Downlink single packet transmission.\n\
        - DUAL_TRANS_UL_FIRST: Dual packet transmission, firstly uplink packet transmission\n\
        \  with subsequent downlink packet transmission.\n- DUAL_TRANS_DL_FIRST: Dual\
        \ packet transmission, firstly downlink packet transmission\n  with subsequent\
        \ uplink packet transmission. \n"
      enum:
      - SINGLE_TRANS_UL
      - SINGLE_TRANS_DL
      - DUAL_TRANS_UL_FIRST
      - DUAL_TRANS_DL_FIRST
      - MULTI_TRANS
      title: TrafficProfile
      type: string
    BatteryIndication:
      description: |
        Parameters "replaceableInd" and "rechargeableInd" are only included if the value of Parameter "batteryInd" is true.
      example:
        replaceableInd: true
        batteryInd: true
        rechargeableInd: true
      properties:
        batteryInd:
          description: |
            This IE shall indicate whether the UE is battery powered or not. true: the UE is battery powered; false or absent: the UE is not battery powered
          title: batteryInd
          type: boolean
        replaceableInd:
          description: |
            This IE shall indicate whether the battery of the UE is replaceable or not. true: the battery of the UE is replaceable; false or absent: the battery of the UE is not replaceable.
          title: replaceableInd
          type: boolean
        rechargeableInd:
          description: |
            This IE shall indicate whether the battery of the UE is rechargeable or not. true: the battery of UE is rechargeable; false or absent: the battery of the UE is not rechargeable.
          title: rechargeableInd
          type: boolean
      title: BatteryIndication
      type: object
    IpAddr:
      description: Contains an IP adresse.
      example:
        ipv6Addr: 2001:db8:85a3::8a2e:370:7334
        ipv4Addr: 198.51.100.1
        ipv6Prefix: 2001:db8:abcd:12::0/64
      nullable: true
      oneOf: []
      properties:
        ipv4Addr:
          description: |
            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          title: Ipv4Addr
          type: string
        ipv6Addr:
          $ref: "#/components/schemas/Ipv6Addr"
        ipv6Prefix:
          $ref: "#/components/schemas/Ipv6Prefix"
      title: IpAddr
      type: object
    Ipv6Prefix:
      description: |
        String identifying an IPv6 address prefix formatted according to clause 4 of RFC 5952. IPv6Prefix data type may contain an individual /128 IPv6 address.
      example: 2001:db8:abcd:12::0/64
      title: Ipv6Prefix
      type: string
    MacAddr48:
      description: |
        String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
      pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
      title: MacAddr48
      type: string
  securitySchemes:
    oAuth2ClientCredentials:
      flows:
        clientCredentials:
          scopes:
            nncof-eventssubscription: Access to the Nncof_EventsSubscription API
            nncof-eventssubscription:transfer: |
              Access to service operations applying to NCOF event subscription transfer.
          tokenUrl: "{nrfApiRoot}/oauth2/token"
      type: oauth2
