    NotificationMethod:
      description: "Represents the notification methods for the subscribed events.\
        \  \nPossible values are:\n- PERIODIC: The notification of the subscribed\
        \ NCOF Event is periodical. The period\n  between the notifications is identified\
        \ by repetitionPeriod and represents time in\n  seconds.\n- THRESHOLD: The\
        \ subscribe of NCOF Event is upon threshold exceeded.\n"
      enum:
      - PERIODIC
      - THRESHOLD
      title: NotificationMethod
      type: string
    NcofEvent:
      description: "Describes the NCOF Events.  \nPossible values are:\n- SLICE_LOAD_LEVEL:\
        \ Indicates that the event subscribed is load level information of Network\n\
        \  Slice.\n- NETWORK_PERFORMANCE: Indicates that the event subscribed is network\
        \ performance\n  information.\n- NF_LOAD: Indicates that the event subscribed\
        \ is load level and status of one or several\n  Network Functions.\n- SERVICE_EXPERIENCE:\
        \ Indicates that the event subscribed is service experience.\n- UE_MOBILITY:\
        \ Indicates that the event subscribed is UE mobility information.\n- UE_COMMUNICATION:\
        \ Indicates that the event subscribed is UE communication information.\n-\
        \ QOS_SUSTAINABILITY: Indicates that the event subscribed is QoS sustainability.\n\
        - ABNORMAL_BEHAVIOUR: Indicates that the event subscribed is abnormal behaviour.\n\
        - USER_DATA_CONGESTION: Indicates that the event subscribed is user data congestion\n\
        \  information.\n- NSI_LOAD_LEVEL: Indicates that the event subscribed is\
        \ load level information of Network\n  Slice and the optionally associated\
        \ Network Slice Instance.\n- DN_PERFORMANCE: Indicates that the event subscribed\
        \ is DN performance information.\n- DISPERSION: Indicates that the event subscribed\
        \ is dispersion information.\n- RED_TRANS_EXP: Indicates that the event subscribed\
        \ is redundant transmission experience.\n- WLAN_PERFORMANCE: Indicates that\
        \ the event subscribed is WLAN performance.\n- SM_CONGESTION: Indicates the\
        \ Session Management Congestion Control Experience information\n  for specific\
        \ DNN and/or S-NSSAI.\n- PFD_DETERMINATION: Indicates that the event subscribed\
        \ is the PFD Determination nformation\n  for known application identifier(s).\n\
        - PDU_SESSION_TRAFFIC: Indicates that the event subscribed is the PDU Session\
        \ traffic\n  information.\n- E2E_DATA_VOL_TRANS_TIME: Indicates that the event\
        \ subscribed is of E2E data volume \n  transfer time.\n- MOVEMENT_BEHAVIOUR:\
        \ Indicates that the event subscribed is the Movement Behaviour\n  information.\n\
        - LOC_ACCURACY: Indicates that the event subscribed is of location accuracy.\n\
        - RELATIVE_PROXIMITY: Indicates that the event subscribed is the Relative\
        \ Proximity\n  information.\n- SIGNALLING_STORM: Indicates that the event\
        \ subscribed is the Signalling Storm information.\n- QOS_POLICY_ASSIST: Indicates\
        \ that the event subscribed is the QoS and Policy\n  Assistance information.\n"
      enum:
      - SLICE_LOAD_LEVEL
      - NETWORK_PERFORMANCE
      - NF_LOAD
      - SERVICE_EXPERIENCE
      - UE_MOBILITY
      - UE_COMMUNICATION
      - QOS_SUSTAINABILITY
      - ABNORMAL_BEHAVIOUR
      - USER_DATA_CONGESTION
      - NSI_LOAD_LEVEL
      - DN_PERFORMANCE
      - DISPERSION
      - RED_TRANS_EXP
      - WLAN_PERFORMANCE
      - SM_CONGESTION
      - PFD_DETERMINATION
      - PDU_SESSION_TRAFFIC
      - E2E_DATA_VOL_TRANS_TIME
      - MOVEMENT_BEHAVIOUR
      - LOC_ACCURACY
      - RELATIVE_PROXIMITY
      - SIGNALLING_STORM
      - QOS_POLICY_ASSIST
      - _CELL_POWER_CTRL
      title: NcofEvent
      type: string
    Accuracy:
      description: "Represents the preferred level of accuracy of the analytics. \
        \ \nPossible values are:\n- LOW: Low accuracy.\n- MEDIUM: Medium accuracy.\n\
        - HIGH: High accuracy.\n- HIGHEST: Highest accuracy.\n"
      enum:
      - LOW
      - MEDIUM
      - HIGH
      - HIGHEST
      title: Accuracy
      type: string
    _OptimizationLevel:
      description: "Represents the preferred level of optimization of the quality.\
        \  \nPossible values are:\n- LOW: Low quality.\n- MEDIUM: Medium quality.\n\
        - HIGH: High quality.\n- HIGHEST: Highest quality.\n"
      enum:
      - LOW
      - MEDIUM
      - HIGH
      - HIGHEST
      title: _OptimizationLevel
      type: string
    _CellPowerState:
      description: "Represents the preferred power state of cell.  \nPossible values\
        \ are:\n- ACTIVE.\n- ACTIVE_UL.\n- ACTIVE_DL.\n- MICRO_SLEEP.\n- LIGHT_SLEEP.\
        \ \n- DEEP_SLEEP.\n"
      enum:
      - ACTIVE
      - ACTIVE_UL
      - ACTIVE_DL
      - MICRO_SLEEP
      - LIGHT_SLEEP
      - DEEP_SLEEP
      title: _CellPowerState
      type: string
    ExceptionId:
      description: "Describes the Exception Id.  \nPossible values are:\n- UNEXPECTED_UE_LOCATION:\
        \ Unexpected UE location.\n- UNEXPECTED_LONG_LIVE_FLOW: Unexpected long-live\
        \ rate flows.\n- UNEXPECTED_LARGE_RATE_FLOW: Unexpected large rate flows.\n\
        - UNEXPECTED_WAKEUP: Unexpected wakeup.\n- SUSPICION_OF_DDOS_ATTACK: Suspicion\
        \ of DDoS attack.\n- WRONG_DESTINATION_ADDRESS: Wrong destination address.\n\
        - TOO_FREQUENT_SERVICE_ACCESS: Too frequent Service Access.\n- UNEXPECTED_RADIO_LINK_FAILURES:\
        \ Unexpected radio link failures.\n- PING_PONG_ACROSS_CELLS: Ping-ponging\
        \ across neighbouring cells.\n"
      enum:
      - UNEXPECTED_UE_LOCATION
      - UNEXPECTED_LONG_LIVE_FLOW
      - UNEXPECTED_LARGE_RATE_FLOW
      - UNEXPECTED_WAKEUP
      - SUSPICION_OF_DDOS_ATTACK
      - WRONG_DESTINATION_ADDRESS
      - TOO_FREQUENT_SERVICE_ACCESS
      - UNEXPECTED_RADIO_LINK_FAILURES
      - PING_PONG_ACROSS_CELLS
      title: ExceptionId
      type: string
    ExceptionTrend:
      description: "Represents the Exception Trend.  \nPossible values are:\n- UP:\
        \ Up trend of the exception level.\n- DOWN: Down trend of the exception level.\n\
        - UNKNOW: Unknown trend of the exception level.\n- STABLE: Stable trend of\
        \ the exception level.\n"
      enum:
      - UP
      - DOWN
      - UNKNOW
      - STABLE
      title: ExceptionTrend
      type: string
    TimeUnit:
      description: "Represents the unit for the session active time.  \nPossible values\
        \ are:\n- MINUTE: Time unit is per minute.\n- HOUR: Time unit is per hour.\n\
        - DAY: Time unit is per day.\n"
      enum:
      - MINUTE
      - HOUR
      - DAY
      type: string
    ExpectedAnalyticsType:
      description: "Represents the expected UE analytics type.  \nPossible values\
        \ are:\n- MOBILITY: Mobility related abnormal behaviour analytics is expected\
        \ by the consumer.\n- COMMUN: Communication related abnormal behaviour analytics\
        \ is expected by the consumer.\n- MOBILITY_AND_COMMUN: Both mobility and communication\
        \ related abnormal behaviour analytics\n  is expected by the consumer.\n"
      enum:
      - MOBILITY
      - COMMUN
      - MOBILITY_AND_COMMUN
      title: ExpectedAnalyticsType
      type: string
    MatchingDirection:
      description: "Represents the matching direction when crossing a threshold. \
        \ \nPossible values are:\n- ASCENDING: Threshold is crossed in ascending direction.\n\
        - DESCENDING: Threshold is crossed in descending direction.\n- CROSSED: Threshold\
        \ is crossed either in ascending or descending direction.\n"
      enum:
      - ASCENDING
      - DESCENDING
      - CROSSED
      title: MatchingDirection
      type: string
    NcofFailureCode:
      description: "Represents the failure reason.  \nPossible values are:\n- UNAVAILABLE_DATA:\
        \ Indicates the requested statistics information for the event is rejected\n\
        \  since necessary data to perform the service is unavailable.\n- BOTH_STAT_PRED_NOT_ALLOWED:\
        \ Indicates the requested analysis information for the event is\n  rejected\
        \ since the start time is in the past and the end time is in the future, which\n\
        \  means the NF service consumer requested both statistics and prediction\
        \ for the analytics.\n- PREDICTION_NOT_ALLOWED: Indicates that the request\
        \ for the prediction of the analytics\n  event is not allowed.\n- UNSATISFIED_REQUESTED_ANALYTICS_TIME:\
        \ Indicates that the requested event is rejected since\n  the analytics information\
        \ is not ready when the time indicated by the \"timeAnaNeeded\"\n  attribute\
        \ (as provided during the creation or modification of subscription) is reached.\n\
        - NO_ROAMING_SUPPORT: Indicates that the request shall be rejected because\
        \ roaming analytics\n  or data are required and the NCOF neither supports\
        \ roaming exchange capabilitiy nor can\n  it forward the request to another\
        \ NCOF.\n- OTHER: Indicates the requested analysis information for the event\
        \ is rejected due to other\n  reasons.\n"
      enum:
      - UNAVAILABLE_DATA
      - BOTH_STAT_PRED_NOT_ALLOWED
      - PREDICTION_NOT_ALLOWED
      - UNSATISFIED_REQUESTED_ANALYTICS_TIME
      - NO_ROAMING_SUPPORT
      - OTHER
      title: NcofFailureCode
      type: string
    AnalyticsMetadata:
      description: "Represents the types of analytics metadata information that can\
        \ be requested.  \nPossible values are:\n- NUM_OF_SAMPLES: Number of data\
        \ samples used for the generation of the output analytics.\n- DATA_WINDOW:\
        \ Data time window of the data samples.\n- DATA_STAT_PROPS: Dataset statistical\
        \ properties of the data used to generate the\n  analytics.\n- STRATEGY: Output\
        \ strategy used for the reporting of the analytics.\n- ACCURACY: Level of\
        \ accuracy reached for the analytics.\n- DATA_SOURCES: Data sources of the\
        \ data used for the generation of the output analytics.\n- USED_PROC_INSTRUCT:\
        \ Processing instructions used when collecting data for the\n  generation\
        \ of the output analytics.\n"
      enum:
      - NUM_OF_SAMPLES
      - DATA_WINDOW
      - DATA_STAT_PROPS
      - STRATEGY
      - ACCURACY
      - DATA_SOURCES
      - USED_PROC_INSTRUCT
      title: AnalyticsMetadata
      type: string
    DatasetStatisticalProperty:
      description: "Represents the dataset statistical properties.  \nPossible values\
        \ are:\n- UNIFORM_DIST_DATA: Indicates the use of data samples that are uniformly\
        \ distributed\n  according to the different aspects of the requested analytics.\n\
        - NO_OUTLIERS: Indicates that the data samples shall disregard data samples\
        \ that are at\n  the extreme boundaries of the value range.\n"
      enum:
      - UNIFORM_DIST_DATA
      - NO_OUTLIERS
      title: DatasetStatisticalProperty
      type: string
    OutputStrategy:
      description: "Represents the output strategy used for the analytics reporting.\
        \  \nPossible values are:\n- BINARY: Indicates that the analytics shall only\
        \ be reported when the requested level\n  of accuracy is reached within a\
        \ cycle of periodic notification.\n- GRADIENT: Indicates that the analytics\
        \ shall be reported according with the periodicity\n  irrespective of whether\
        \ the requested level of accuracy has been reached or not.\n"
      enum:
      - BINARY
      - GRADIENT
      title: OutputStrategy
      type: string
    TransferRequestType:
      description: "Represents the request type for the analytics subscription transfer.\
        \  \nPossible values are:\n- PREPARE: Indicates that the request is for analytics\
        \ subscription transfer preparation.\n- TRANSFER: Indicates that the request\
        \ is for analytics subscription transfer execution.\n"
      enum:
      - PREPARE
      - TRANSFER
      title: TransferRequestType
      type: string
    AnalyticsSubset:
      description: "Represents the analytics subset.  \nPossible values are:\n- NUM_OF_UE_REG:\
        \ The number of UE registered. This value is only applicable to\n  NSI_LOAD_LEVEL\
        \ event.\n- NUM_OF_PDU_SESS_ESTBL: The number of PDU sessions established.\
        \ This value is only\n  applicable to NSI_LOAD_LEVEL event.\n- RES_USAGE:\
        \ The current usage of the virtual resources assigned to the NF instances\n\
        \  belonging to a particular network slice instance. This value is only applicable\
        \ to\n  NSI_LOAD_LEVEL event.\n- NUM_OF_EXCEED_RES_USAGE_LOAD_LEVEL_THR: The\
        \ number of times the resource usage threshold\n  of the network slice instance\
        \ is reached or exceeded if a threshold value is provided by\n  the consumer.\
        \ This value is only applicable to NSI_LOAD_LEVEL event.\n- PERIOD_OF_EXCEED_RES_USAGE_LOAD_LEVEL_THR:\
        \ The time interval between each time the\n  threshold being met or exceeded\
        \ on the network slice (instance). This value is only\n  applicable to NSI_LOAD_LEVEL\
        \ event.\n- EXCEED_LOAD_LEVEL_THR_IND: Whether the Load Level Threshold is\
        \ met or exceeded by the\n  statistics value. This value is only applicable\
        \ to NSI_LOAD_LEVEL event.\n- LIST_OF_TOP_APP_UL: The list of applications\
        \ that contribute the most to the traffic in\n  the UL direction. This value\
        \ is only applicable to USER_DATA_CONGESTION event.\n- LIST_OF_TOP_APP_DL:\
        \ The list of applications that contribute the most to the traffic in\n  the\
        \ DL direction. This value is only applicable to USER_DATA_CONGESTION event.\n\
        - NF_STATUS: The availability status of the NF on the Analytics target period,\
        \ expressed\n  as a percentage of time per status value (registered, suspended,\
        \ undiscoverable). This\n  value is only applicable to NF_LOAD event.\n- NF_RESOURCE_USAGE:\
        \ The average usage of assigned resources (CPU, memory, storage). This\n \
        \ value is only applicable to NF_LOAD event.\n- NF_LOAD: The average load\
        \ of the NF instance over the Analytics target period. This value\n  is only\
        \ applicable to NF_LOAD event.\n- NF_PEAK_LOAD: The maximum load of the NF\
        \ instance over the Analytics target period. This\n  value is only applicable\
        \ to NF_LOAD event.\n- NF_LOAD_AVG_IN_AOI: The average load of the NF instances\
        \ over the area of interest. This\n  value is only applicable to NF_LOAD event.\n\
        - DISPER_AMOUNT: Indicates the dispersion amount of the reported data volume\
        \ or transaction\n  dispersion type. This value is only applicable to DISPERSION\
        \ event.\n- DISPER_CLASS: Indicates the dispersion mobility class: fixed,\
        \ camper, traveller upon set\n  its usage threshold, and/or the top-heavy\
        \ class upon set its percentile rating threshold.\n  This value is only applicable\
        \ to DISPERSION event.\n- RANKING: Data/transaction usage ranking high (i.e.value\
        \ 1), medium (2) or low (3). This\n  value is only applicable to DISPERSION\
        \ event.\n- PERCENTILE_RANKING: Percentile ranking of the target UE in the\
        \ Cumulative Distribution\n  Function of data usage for the population of\
        \ all UEs. This value is only applicable to\n  DISPERSION event.\n- RSSI:\
        \ Indicated the RSSI in the unit of dBm. This value is only applicable to\n\
        \  WLAN_PERFORMANCE event.\n- RTT: Indicates the RTT in the unit of millisecond.\
        \ This value is only applicable to\n  WLAN_PERFORMANCE event.\n- TRAFFIC_INFO:\
        \ Traffic information including UL/DL data rate and/or Traffic volume. This\n\
        \  value is only applicable to WLAN_PERFORMANCE event.\n- NUMBER_OF_UES: Number\
        \ of UEs observed for the SSID. This value is only applicable to\n  WLAN_PERFORMANCE\
        \ event.\n- APP_LIST_FOR_UE_COMM: The analytics of the application list used\
        \ by UE. This value is only\n  applicable to UE_COMMUNICATION event.\n- N4_SESS_INACT_TIMER_FOR_UE_COMM:\
        \ The N4 Session inactivity timer. This value is only\n  applicable to UE_COMMUNICATION\
        \ event.\n- AVG_TRAFFIC_RATE: Indicates average traffic rate. This value is\
        \ only applicable to\n  DN_PERFORMANCE event.\n- MAX_TRAFFIC_RATE: Indicates\
        \ maximum traffic rate. This value is only applicable to\n  DN_PERFORMANCE\
        \ event.\n- AGG_TRAFFIC_RATE: Indicates aggregated traffic rate. This value\
        \ is only applicable to\n  DN_PERFORMANCE event.\n- VAR_TRAFFIC_RATE: Indicates\
        \ variance traffic rate. This value is only applicable to\n  DN_PERFORMANCE\
        \ event.\n- AVG_PACKET_DELAY: Indicates average Packet Delay. This value is\
        \ only applicable to\n  DN_PERFORMANCE event.\n- MAX_PACKET_DELAY: Indicates\
        \ maximum Packet Delay. This value is only applicable to\n  DN_PERFORMANCE\
        \ event.\n- VAR_PACKET_DELAY: Indicates variance Packet Delay. This value\
        \ is only applicable to\n  DN_PERFORMANCE event.\n- AVG_PACKET_LOSS_RATE:\
        \ Indicates average Loss Rate. This value is only applicable to\n  DN_PERFORMANCE\
        \ event.\n- MAX_PACKET_LOSS_RATE: Indicates maximum Packet Loss Rate. This\
        \ value is only applicable to\n  DN_PERFORMANCE event.\n- VAR_PACKET_LOSS_RATE:\
        \ Indicates variance Packet Loss Rate. This value is only applicable\n  to\
        \ DN_PERFORMANCE event.\n- UE_LOCATION: Indicates UE location information.\
        \ This value is only applicable to\n  SERVICE_EXPERIENCE event.\n- LIST_OF_HIGH_EXP_UE:\
        \ Indicates list of high experienced UE. This value is only applicable\n \
        \ to SM_CONGESTION event.\n- LIST_OF_MEDIUM_EXP_UE: Indicates list of medium\
        \ experienced UE. This value is only\n  applicable to SM_CONGESTION event.\n\
        - LIST_OF_LOW_EXP_UE: Indicates list of low experienced UE. This value is\
        \ only applicable to\n  SM_CONGESTION event.\n- AVG_UL_PKT_DROP_RATE: Indicates\
        \ average uplink packet drop rate on GTP-U path on N3. This\n  value is only\
        \ applicable to RED_TRANS_EXP event.\n- VAR_UL_PKT_DROP_RATE: Indicates variance\
        \ of uplink packet drop rate on GTP-U path on N3.\n  This value is only applicable\
        \ to RED_TRANS_EXP event.\n- AVG_DL_PKT_DROP_RATE: Indicates average downlink\
        \ packet drop rate on GTP-U path on N3.\n  This value is only applicable to\
        \ RED_TRANS_EXP event.\n- VAR_DL_PKT_DROP_RATE: Indicates variance of downlink\
        \ packet drop rate on GTP-U path on N3.\n  This value is only applicable to\
        \ RED_TRANS_EXP event.\n- AVG_UL_PKT_DELAY: Indicates average uplink packet\
        \ delay round trip on GTP-U path on N3.\n  This value is only applicable to\
        \ RED_TRANS_EXP event.\n- VAR_UL_PKT_DELAY: Indicates variance uplink packet\
        \ delay round trip on GTP-U path on N3.\n  This value is only applicable to\
        \ RED_TRANS_EXP event.\n- AVG_DL_PKT_DELAY: Indicates average downlink packet\
        \ delay round trip on GTP-U path on N3.\n  This value is only applicable to\
        \ RED_TRANS_EXP event.\n- VAR_DL_PKT_DELAY: Indicates variance downlink packet\
        \ delay round trip on GTP-U path on N3.\n  This value is only applicable to\
        \ RED_TRANS_EXP event.\n- TRAFFIC_MATCH_TD: Identifies traffic that matches\
        \ Traffic Descriptor provided by\n  the consumer.\n- TRAFFIC_UNMATCH_TD: Identifies\
        \ traffic that does not match Traffic Descriptor\n  provided by the consumer.\n\
        - NUMBER_OF_UE: Indicates the number of UEs. This value is only applicable\
        \ to\n  DN_PERFORMANCE event.\n- UE_GEOG_DIST: Indicates the geographical\
        \ distribution of the UEs that can be selected by\n  the AF for application\
        \ service. This value is only applicable to UE_MOBILITY event.\n- UE_DIRECTION:\
        \ Indicates the direction of the UEs. This value is only applicable to\n \
        \ UE_MOBILITY event.\n- AVG_E2E_UL_PKT_DELAY: Indicates average End-to-End\
        \ (between UE and UPF) uplink packet\n  delay. This value is only applicable\
        \ to RED_TRANS_EXP event.\n- VAR_E2E_UL_PKT_DELAY: Indicates the variance\
        \ of End-to-End (between UE and UPF) uplink\n  packet delay. This value is\
        \ only applicable to RED_TRANS_EXP event.\n- AVG_E2E_DL_PKT_DELAY: Indicates\
        \ average End-to-End (between UE and UPF) downlink packet\n  delay. This value\
        \ is only applicable to RED_TRANS_EXP event.\n- VAR_E2E_DL_PKT_DELAY: Indicates\
        \ the variance of End-to-End (between UE and UPF) downlink\n  packet delay.\
        \ This value is only applicable to RED_TRANS_EXP event.\n- AVG_E2E_UL_PKT_LOSS_RATE:\
        \ Indicates average End-to-End (between UE and UPF) uplink packet\n  loss\
        \ rate. This value is only applicable to RED_TRANS_EXP event.\n- VAR_E2E_UL_PKT_LOSS_RATE:\
        \ Indicates the variance of End-to-End (between UE and UPF) uplink\n  packet\
        \ loss rate. This value is only applicable to RED_TRANS_EXP event.\n- AVG_E2E_DL_PKT_LOSS_RATE:\
        \ Indicates average End-to-End (between UE and UPF) downlink\n  packet loss\
        \ rate. This value is only applicable to RED_TRANS_EXP event.\n- VAR_E2E_DL_PKT_LOSS_RATE:\
        \ Indicates the variance of End-to-End (between UE and UPF)\n  downlink packet\
        \ loss rate. This value is only applicable to RED_TRANS_EXP event.\n- E2E_DATA_VOL_TRANS_TIME_FOR_UE_LIST:\
        \ Indicates the classified E2E data volume transfer\n  time statistics or\
        \ predictions for multiple UEs with respect to one or more reporting\n  thresholds.\n\
        - NUM_OF_UE: Indicates the total number of users in the area of interest.\
        \ This\n  value is only applicable to MOVEMENT_BEHAVIOUR event.\n- MOV_UE_RATIO:\
        \ Indicates the Ratio of moving UEs in the area of interest. This value\n\
        \  is only applicable to MOVEMENT_BEHAVIOUR event.\n- AVR_SPEED: Indicates\
        \ the average speed of all UEs in the area of interest. This value\n  is only\
        \ applicable to MOVEMENT_BEHAVIOUR event.\n- SPEED_THRESHOLD: Indicates the\
        \ information on UEs in the area of interest whose speed\n  is faster than\
        \ the speed threshold. This value is only applicable to MOVEMENT_BEHAVIOUR\n\
        \  event.\n- MOV_UE_DIRECTION: Indicates the heading directions of the UE\
        \ flow in the target area.\n  This value is only applicable to MOVEMENT_BEHAVIOUR\
        \ event.\n- IN_OUT_PERCENT: Indicates the percentage of indoor/outdoor UEs\
        \ at a location.\n  The value is only applicable to the LOC_ACCURACY event.\n\
        - TIME_TO_COLLISION: Indicates the time until for a collision with another\
        \ UE happens.\n  This value is only applicable to RELATIVE_PROXIMITY event\
        \ prediction.\n"
      enum:
      - NUM_OF_UE_REG
      - NUM_OF_PDU_SESS_ESTBL
      - RES_USAGE
      - NUM_OF_EXCEED_RES_USAGE_LOAD_LEVEL_THR
      - PERIOD_OF_EXCEED_RES_USAGE_LOAD_LEVEL_THR
      - EXCEED_LOAD_LEVEL_THR_IND
      - LIST_OF_TOP_APP_UL
