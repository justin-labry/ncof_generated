[loggers]
keys=root

[handlers]
keys=console

[formatters]
keys=colored

[logger_root]
level=INFO
handlers=console

[handler_console]
class=StreamHandler
level=INFO
formatter=colored
args=(sys.stderr,)

[formatter_colored]
class=colorlog.ColoredFormatter
; format=%(log_color)s[%(asctime)s] [%(levelname)s] [%(name)s] - %(message)s [%(filename)s:%(lineno)d]
format=%(log_color)s[%(asctime)s] [%(levelname)s] - %(message)s [%(filename)s:%(lineno)d]
; datefmt=%Y-%m-%d %H:%M:%S
datefmt=%H:%M:%S
log_colors=
    DEBUG=cyan
    INFO=green
    WARNING=yellow
    ERROR=red
    CRITICAL=bold_red
