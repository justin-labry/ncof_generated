    RedirectResponse:
      description: |
        The response shall include a Location header field containing a different URI  (pointing to a different URI of an other service instance), or the same URI if a request  is redirected to the same target resource via a different SCP.
      example:
        targetSepp: targetSepp
        cause: cause
        targetScp: targetScp
      properties:
        cause:
          title: cause
          type: string
        targetScp:
          description: String providing an URI formatted according to RFC 3986.
          title: targetScp
          type: string
        targetSepp:
          description: String providing an URI formatted according to RFC 3986.
          title: targetScp
          type: string
      title: RedirectResponse
      type: object
    ReferenceId:
      $ref: '#/components/schemas/Uint64'
    RouteInformation:
      description: "At least one of the \"ipv4Addr\" attribute and the \"ipv6Addr\"\
        \ attribute shall be included in the \"RouteInformation\" data type. \n"
      example:
        ipv6Addr: 2001:db8:85a3::8a2e:370:7334
        ipv4Addr: 198.51.100.1
        portNumber: 0
      nullable: true
      properties:
        ipv4Addr:
          description: |
            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          title: Ipv4Addr
          type: string
        ipv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        portNumber:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
      required:
      - portNumber
      title: RouteInformation
      type: object
    RouteToLocation:
      anyOf: []
      description: |
        At least one of the "routeInfo" attribute and the "routeProfId" attribute shall be included in the "RouteToLocation" data type.
      example:
        dnai: dnai
