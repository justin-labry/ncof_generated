        smNasType: smNasType
        appliedSmccType: appliedSmccType
        backoffTimer: 1
      properties:
        smNasType:
          title: smNasType
          type: string
        timeStamp:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        backoffTimer:
          description: indicating a time in seconds.
          title: DurationSec
          type: integer
        appliedSmccType:
          description: "Represents the type of applied SM congestion control.  \n\
            Possible values are:\n- DNN_CC: Indicates the DNN based congestion control.\n\
            - SNSSAI_CC: Indicates the S-NSSAI based congestion control.\n"
          title: AppliedSmccType
          type: string
      required:
      - appliedSmccType
      - backoffTimer
      - smNasType
      - timeStamp
      title: SmNasFromSmf
      type: object
    SmNasFromUe:
      description: |
        Represents information on the SM NAS messages that SMF receives from UE for PDU Session.
      example:
        timeStamp: 2000-01-23T04:56:07.000+00:00
        smNasType: smNasType
      properties:
        smNasType:
          title: smNasType
          type: string
        timeStamp:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
      required:
      - smNasType
      - timeStamp
      title: SmNasFromUe
      type: object
    SmfEvent:
      description: "Represents the types of events that can be subscribed.  \nPossible\
        \ values are:\n- AC_TY_CH: Access Type Change.\n- UP_PATH_CH: UP Path Change.\n\
        - PDU_SES_REL: PDU Session Release.\n- PLMN_CH: PLMN Change.\n- UE_IP_CH:\
        \ UE IP address change.\n- RAT_TY_CH: RAT Type Change.\n- DDDS: Downlink data\
        \ delivery status.\n- COMM_FAIL: Communication Failure.\n- PDU_SES_EST: PDU\
        \ Session Establishment.\n- QFI_ALLOC: QFI allocation.\n- QOS_MON: QoS Monitoring.\n\
        - SMCC_EXP: SM congestion control experience for PDU Session.\n- DISPERSION:\
        \ Session Management transaction dispersion.\n- RED_TRANS_EXP: Redundant transmission\
        \ experience for PDU Session.\n- WLAN_INFO: WLAN information on PDU session\
        \ for which Access Type is NON_3GPP_ACCESS and\n  RAT Type is TRUSTED_WLAN.\n\
        - UPF_INFO: The UPF information, including the UPF ID/address/FQDN information.\n\
        - UP_STATUS_INFO: The User Plane status information.\n- UPF_EVENT: UPF event\
        \ subscribed via SMF.\n- SATB_CH: Satellite backhaul category change.\n- TRAFFIC_CORRELATION:\
        \ Indicates that the SMF provides 5GC determined traffic correlation\n  information\
        \ for a set of UEs identified by Traffic Correlation ID.\n- TRAFF_ROUTE_REQ_OUTCOME:\
        \ Indicates the report of the installation outcome of the requested\n  traffic\
        \ routing requirements.\n- SIM_CONN_FAIL: Indicates that the simultaneous\
        \ connectivity over the source and the target\n  PDU Session Anchor failed\
        \ to be established during a PDU Session Anchor change.\n- QFI_DEALLOCATION:\
        \ QFI deallocation.\n- QOS_FLOW_CHANGE: QoS flow change.\n- ENERGY_USAGE_DATA:\
        \ Indicates that the SMF event is the user-plane energy consumption\n  information.\n\
        - SIGNALLING_INFO: Indicates the report of Service Signalling characteristics.\n"
      title: SmfEvent
      type: string
    Snssai:
      description: |
        When Snssai needs to be converted to string (e.g. when used in maps as key), the string shall be composed of one to three digits "sst" optionally followed by "-" and 6 hexadecimal digits "sd".
      example:
        sd: sd
        sst: 37
      properties:
        sst:
          description: "Unsigned integer, within the range 0 to 255, representing\
            \ the Slice/Service Type.  It indicates the expected Network Slice behaviour\
            \ in terms of features and services. Values 0 to 127 correspond to the\
            \ standardized SST range. Values 128 to 255 correspond  to the Operator-specific\
            \ range. See clause 28.4.2 of 3GPP TS 23.003. Standardized values are\
            \ defined in clause 5.15.2.2 of 3GPP TS 23.501. \n"
          maximum: 255
          minimum: 0
          title: sst
          type: integer
        sd:
          description: |
            3-octet string, representing the Slice Differentiator, in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the SD shall appear first in the string, and the character representing the 4 least significant bit of the SD shall appear last in the string. This is an optional parameter that complements the Slice/Service type(s) to allow to  differentiate amongst multiple Network Slices of the same Slice/Service type. This IE shall be absent if no SD value is associated with the SST.
          pattern: "^[A-Fa-f0-9]{6}$"
          title: sd
          type: string
      required:
      - sst
      title: Snssai
      type: object
    SscMode:
      description: "represents the service and session continuity mode It shall comply\
        \ with the provisions defined in table 5.4.3.6-1. \n"
      title: sscMode
      type: string
    StateTransitionInfo:
      allOf:
      - required:
        - supi
      - anyOf: []
        nullable: true
      description: Represents session-related state transition information.
      example:
        transType: transType
        numOfTran: 0
        pctUes: 0
        groupId: groupId
        supi: supi
      properties:
        supi:
          description: "String identifying a Supi that shall contain either an IMSI,\
            \ a network specific identifier,\na Global Cable Identifier (GCI) or a\
            \ Global Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS\
            \ 23.003. It shall be formatted as follows\n - for an IMSI \"imsi-<imsi>\"\
            , where <imsi> shall be formatted according to clause 2.2\n   of 3GPP\
            \ TS 23.003 that describes an IMSI.\n - for a network specific identifier\
            \ \"nai-<nai>, where <nai> shall be formatted\n   according to clause\
            \ 28.7.2 of 3GPP TS 23.003 that describes an NAI.\n - for a GCI \"gci-<gci>\"\
            , where <gci> shall be formatted according to clause 28.15.2\n   of 3GPP\
            \ TS 23.003.\n - for a GLI \"gli-<gli>\", where <gli> shall be formatted\
            \ according to clause 28.16.2 of\n   3GPP TS 23.003.To enable that the\
            \ value is used as part of an URI, the string shall\n   only contain characters\
            \ allowed according to the \"lower-with-hyphen\" naming convention\n \
            \  defined in 3GPP TS 29.501.\n"
          pattern: "^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$"
          title: Supi
          type: string
        groupId:
          description: "String identifying a group of devices network internal globally\
            \ unique ID which identifies a set of IMSIs, as specified in clause 19.9\
            \ of 3GPP TS 23.003. \n"
          pattern: "^[A-Fa-f0-9]{8}-[0-9]{3}-[0-9]{2,3}-([A-Fa-f0-9][A-Fa-f0-9]){1,10}$"
          title: GroupId
          type: string
        transType:
          description: "Represents the types of events that can be subscribed.  \n\
            Possible values are:\n- AC_TY_CH: Access Type Change.\n- UP_PATH_CH: UP\
            \ Path Change.\n- PDU_SES_REL: PDU Session Release.\n- PLMN_CH: PLMN Change.\n\
            - UE_IP_CH: UE IP address change.\n- RAT_TY_CH: RAT Type Change.\n- DDDS:\
            \ Downlink data delivery status.\n- COMM_FAIL: Communication Failure.\n\
            - PDU_SES_EST: PDU Session Establishment.\n- QFI_ALLOC: QFI allocation.\n\
            - QOS_MON: QoS Monitoring.\n- SMCC_EXP: SM congestion control experience\
            \ for PDU Session.\n- DISPERSION: Session Management transaction dispersion.\n\
            - RED_TRANS_EXP: Redundant transmission experience for PDU Session.\n\
            - WLAN_INFO: WLAN information on PDU session for which Access Type is\
            \ NON_3GPP_ACCESS and\n  RAT Type is TRUSTED_WLAN.\n- UPF_INFO: The UPF\
            \ information, including the UPF ID/address/FQDN information.\n- UP_STATUS_INFO:\
            \ The User Plane status information.\n- UPF_EVENT: UPF event subscribed\
            \ via SMF.\n- SATB_CH: Satellite backhaul category change.\n- TRAFFIC_CORRELATION:\
            \ Indicates that the SMF provides 5GC determined traffic correlation\n\
            \  information for a set of UEs identified by Traffic Correlation ID.\n\
            - TRAFF_ROUTE_REQ_OUTCOME: Indicates the report of the installation outcome\
            \ of the requested\n  traffic routing requirements.\n- SIM_CONN_FAIL:\
            \ Indicates that the simultaneous connectivity over the source and the\
            \ target\n  PDU Session Anchor failed to be established during a PDU Session\
            \ Anchor change.\n- QFI_DEALLOCATION: QFI deallocation.\n- QOS_FLOW_CHANGE:\
            \ QoS flow change.\n- ENERGY_USAGE_DATA: Indicates that the SMF event\
            \ is the user-plane energy consumption\n  information.\n- SIGNALLING_INFO:\
            \ Indicates the report of Service Signalling characteristics.\n"
          title: SmfEvent
          type: string
        numOfTran:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
        pctUes:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
      required:
      - transType
      title: StateTransitionInfo
      type: object
    Supi:
      description: "String identifying a Supi that shall contain either an IMSI, a\
        \ network specific identifier,\na Global Cable Identifier (GCI) or a Global\
        \ Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS 23.003. It\
        \ shall be formatted as follows\n - for an IMSI \"imsi-<imsi>\", where <imsi>\
        \ shall be formatted according to clause 2.2\n   of 3GPP TS 23.003 that describes\
        \ an IMSI.\n - for a network specific identifier \"nai-<nai>, where <nai>\
        \ shall be formatted\n   according to clause 28.7.2 of 3GPP TS 23.003 that\
        \ describes an NAI.\n - for a GCI \"gci-<gci>\", where <gci> shall be formatted\
        \ according to clause 28.15.2\n   of 3GPP TS 23.003.\n - for a GLI \"gli-<gli>\"\
        , where <gli> shall be formatted according to clause 28.16.2 of\n   3GPP TS\
        \ 23.003.To enable that the value is used as part of an URI, the string shall\n\
        \   only contain characters allowed according to the \"lower-with-hyphen\"\
        \ naming convention\n   defined in 3GPP TS 29.501.\n"
      pattern: "^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$"
      title: Supi
      type: string
    SupportedFeatures:
      description: |
        A string used to indicate the features supported by an API that is used as defined in clause  6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in  hexadecimal representation Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in  table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
      pattern: "^[A-Fa-f0-9]*$"
      title: supportedFeatures
      type: string
    TimeWindow:
      description: Represents a time window identified by a start time and a stop
        time.
      example:
        startTime: 2000-01-23T04:56:07.000+00:00
        stopTime: 2000-01-23T04:56:07.000+00:00
      properties:
        startTime:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        stopTime:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
      required:
      - startTime
      - stopTime
      title: TimeWindow
      type: object
    TraffRouteReqOutcome:
      allOf:
      - not:
          required:
          - succEthTrafficFlows
          - succTrafficFlows
      - not:
          required:
          - failedEthTrafficFlows
          - failedTrafficFlows
      description: |
        Represents the installation outcome of the requested traffic routing requirements.
      example:
        succTrafficFlows:
        - null
        - null
        succEthTrafficFlows:
        - destMacAddr: destMacAddr
          destMacAddrEnd: destMacAddrEnd
          sourceMacAddr: sourceMacAddr
          fDir: fDir
          ethType: ethType
          fDesc: fDesc
          vlanTags:
          - vlanTags
          - vlanTags
          srcMacAddrEnd: srcMacAddrEnd
        - destMacAddr: destMacAddr
          destMacAddrEnd: destMacAddrEnd
          sourceMacAddr: sourceMacAddr
          fDir: fDir
          ethType: ethType
          fDesc: fDesc
          vlanTags:
          - vlanTags
          - vlanTags
          srcMacAddrEnd: srcMacAddrEnd
        failedTrafficFlows:
        - null
        - null
        failedEthTrafficFlows:
        - destMacAddr: destMacAddr
          destMacAddrEnd: destMacAddrEnd
          sourceMacAddr: sourceMacAddr
          fDir: fDir
          ethType: ethType
          fDesc: fDesc
          vlanTags:
          - vlanTags
          - vlanTags
          srcMacAddrEnd: srcMacAddrEnd
        - destMacAddr: destMacAddr
          destMacAddrEnd: destMacAddrEnd
          sourceMacAddr: sourceMacAddr
          fDir: fDir
          ethType: ethType
          fDesc: fDesc
          vlanTags:
          - vlanTags
          - vlanTags
          srcMacAddrEnd: srcMacAddrEnd
      properties:
        succTrafficFlows:
          items:
            $ref: '#/components/schemas/FlowDescription'
          minItems: 1
          title: succTrafficFlows
          type: array
        succEthTrafficFlows:
          items:
            $ref: '#/components/schemas/EthFlowDescription'
          minItems: 1
          title: succEthTrafficFlows
          type: array
        failedTrafficFlows:
          items:
            $ref: '#/components/schemas/FlowDescription'
          minItems: 1
          title: failedTrafficFlows
          type: array
        failedEthTrafficFlows:
          items:
            $ref: '#/components/schemas/EthFlowDescription'
          minItems: 1
          title: failedEthTrafficFlows
          type: array
      title: TraffRouteReqOutcome
      type: object
    TrafficCorrelationNotification:
      anyOf: []
      description: Represents notifications for 5GC determined Traffic Correlation
        Information.
      example:
        smfId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        tfcCorrId: tfcCorrId
        dnais:
        - null
        - null
        pduSessionNbr: 0
        easIpAddr:
          ipv6Addr: 2001:db8:85a3::8a2e:370:7334
          ipv4Addr: 198.51.100.1
          ipv6Prefix: 2001:db8:abcd:12::0/64
        easFqdn: easFqdn
      nullable: true
      properties:
        smfId:
          description: "String uniquely identifying a NF instance. The format of the\
            \ NF Instance ID shall be a  Universally Unique Identifier (UUID) version\
            \ 4. \n"
          format: uuid
          title: NfInstanceId
          type: string
        tfcCorrId:
          description: |
            Identification of a set of UEs accessing the application identified by the  Application Identifier or traffic filtering information.
          title: tfcCorrId
          type: string
        dnais:
          items:
            $ref: '#/components/schemas/Dnai'
          minItems: 1
          title: dnais
          type: array
        easFqdn:
          description: Fully Qualified Domain Name
          maxLength: 253
          minLength: 4
          pattern: "^([0-9A-Za-z]([-0-9A-Za-z]{0,61}[0-9A-Za-z])?\\.)+[A-Za-z]{2,63}\\\
            .?$"
          title: Fqdn
          type: string
        easIpAddr:
          $ref: '#/components/schemas/IpAddr'
        pduSessionNbr:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
      required:
      - pduSessionNbr
      - smfId
      - tfcCorrId
      title: TrafficCorrelationNotification
      type: object
    TransactionInfo:
      description: Represents SMF Transaction Information.
      example:
        snssai:
          sd: sd
          sst: 37
        appIds:
        - null
        - null
        transacMetrics:
        - null
        - null
        transaction: 0
      properties:
        transaction:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
        snssai:
          $ref: '#/components/schemas/Snssai'
        appIds:
          items:
            $ref: '#/components/schemas/ApplicationId'
          minItems: 1
          title: appIds
          type: array
        transacMetrics:
          items:
            $ref: '#/components/schemas/TransactionMetric'
          minItems: 1
          title: transacMetrics
          type: array
      required:
      - transaction
      title: TransactionInfo
      type: object
    TransactionMetric:
      description: "Represents the metric on UE Session Management transactions. \
        \ \nPossible values are:\n- PDU_SES_EST: PDU Session Establishment.\n- PDU_SES_AUTH:\
        \ PDU Session Authentication.\n- PDU_SES_MODIF: PDU Session Modification.\n\
        - PDU_SES_REL: PDU Session Release\n"
      title: TransactionMetric
      type: string
    Uint64:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 64-bit integer.
      minimum: 0
      title: referenceId
      type: integer
    Uinteger:
      description: "Unsigned Integer, i.e. only value 0 and integers above 0 are permissible."
      minimum: 0
      title: Uinteger
      type: integer
    UpfInformation:
      description: Represents the ID/address/FQDN of the UPF.
      example:
        upfId: upfId
        upfAddr:
          fqdn: fqdn
          ipAddr:
            ipv6Addr: 2001:db8:85a3::8a2e:370:7334
            ipv4Addr: 198.51.100.1
            ipv6Prefix: 2001:db8:abcd:12::0/64
      properties:
        upfId:
          title: upfId
          type: string
        upfAddr:
          $ref: '#/components/schemas/AddrFqdn'
      title: UpfInformation
      type: object
    Uri:
      description: String providing an URI formatted according to RFC 3986.
      title: targetScp
      type: string
    VolumeTimedReport:
      description: Contains Usage data information.
      example:
        downlinkVolume: 8
        startTimeStamp: 2000-01-23T04:56:07.000+00:00
        endTimeStamp: 2000-01-23T04:56:07.000+00:00
        uplinkVolume: 9
      properties:
        startTimeStamp:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        endTimeStamp:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        downlinkVolume:
          description: string with format 'int64' as defined in OpenAPI.
          format: int64
          title: Int64
          type: integer
        uplinkVolume:
          description: string with format 'int64' as defined in OpenAPI.
          format: int64
          title: Int64
          type: integer
      required:
      - downlinkVolume
      - endTimeStamp
      - startTimeStamp
      - uplinkVolume
      title: VolumeTimedReport
      type: object
  securitySchemes:
    oAuth2ClientCredentials:
      flows:
        clientCredentials:
          scopes:
            nsmf-event-exposure: Access to the Nsmf_EventExposure API
          tokenUrl: "{nrfApiRoot}/oauth2/token"
      type: oauth2
