    PduSessionId:
      description: "Unsigned integer identifying a PDU session, within the range 0\
        \ to 255, as specified in  clause 11.2.3.1b, bits 1 to 8, of 3GPP TS 24.007.\
        \ If the PDU Session ID is allocated by the  Core Network for UEs not supporting\
        \ N1 mode, reserved range 64 to 95 is used. PDU Session ID  within the reserved\
        \ range is only visible in the Core Network. \n"
      maximum: 255
      minimum: 0
      title: PduSessionId
      type: integer
    PduSessionInfo:
      description: Represents session information.
      example:
        pduSessStatus: pduSessStatus
        sessInactiveTimer: 1
        n4SessId: n4SessId
      properties:
        n4SessId:
          description: The identifier of the N4 session for the reported PDU Session.
          title: n4SessId
          type: string
        sessInactiveTimer:
          description: indicating a time in seconds.
          title: DurationSec
          type: integer
        pduSessStatus:
          description: "Represents the status of the PDU Session.  \nPossible values\
            \ are:\n- ACTIVATED: PDU Session status is activated.\n- DEACTIVATED:\
            \ PDU Session status is deactivated."
          title: PduSessionStatus
          type: string
      title: PduSessionInfo
      type: object
    PduSessionInformation:
      description: Represents the PDU session related information.
      example:
        sessInfo:
          pduSessStatus: pduSessStatus
          sessInactiveTimer: 1
          n4SessId: n4SessId
        pduSessId: 26
      properties:
        pduSessId:
          description: "Unsigned integer identifying a PDU session, within the range\
            \ 0 to 255, as specified in  clause 11.2.3.1b, bits 1 to 8, of 3GPP TS\
            \ 24.007. If the PDU Session ID is allocated by the  Core Network for\
            \ UEs not supporting N1 mode, reserved range 64 to 95 is used. PDU Session\
            \ ID  within the reserved range is only visible in the Core Network. \n"
          maximum: 255
          minimum: 0
          title: PduSessionId
          type: integer
        sessInfo:
          $ref: '#/components/schemas/PduSessionInfo'
      title: PduSessionInformation
      type: object
    PduSessionStatus:
      description: "Represents the status of the PDU Session.  \nPossible values are:\n\
        - ACTIVATED: PDU Session status is activated.\n- DEACTIVATED: PDU Session\
        \ status is deactivated."
      title: PduSessionStatus
      type: string
    PduSessionType:
      description: "PduSessionType indicates the type of a PDU session. It shall comply\
        \ with the provisions defined in table 5.4.3.3-1. \n"
      title: pduSessType
      type: string
    PlmnIdNid:
      description: |
        Contains the serving core network operator PLMN ID and, for an SNPN, the NID that together with the PLMN ID identifies the SNPN.
      example:
        mnc: mnc
        nid: nid
        mcc: mcc
      properties:
        mcc:
          description: "Mobile Country Code part of the PLMN, comprising 3 digits,\
            \ as defined in clause 9.3.3.5 of 3GPP TS 38.413. \n"
          pattern: "^\\d{3}$"
          title: Mcc
          type: string
        mnc:
          description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits,\
            \ as defined in  clause 9.3.3.5 of 3GPP TS 38.413. \n"
          pattern: "^\\d{2,3}$"
          title: Mnc
          type: string
        nid:
          description: "This represents the Network Identifier, which together with\
            \ a PLMN ID is used to identify an SNPN (see 3GPP TS 23.003 and 3GPP TS\
            \ 23.501 clause 5.30.2.1). \n"
          pattern: "^[A-Fa-f0-9]{11}$"
          title: Nid
          type: string
      required:
      - mcc
      - mnc
      title: PlmnIdNid
      type: object
    ProblemDetails:
      description: Provides additional information in an error response.
      properties:
        type:
          description: String providing an URI formatted according to RFC 3986.
          title: targetScp
          type: string
        title:
          title: title
          type: string
        status:
          title: status
          type: integer
        detail:
          description: A human-readable explanation specific to this occurrence of
            the problem.
          title: detail
          type: string
        instance:
          description: String providing an URI formatted according to RFC 3986.
          title: targetScp
          type: string
        cause:
          description: |
            A machine-readable application error cause specific to this occurrence of the problem.  This IE should be present and provide application-related error information, if available.
          title: cause
          type: string
        invalidParams:
          items:
            $ref: '#/components/schemas/InvalidParam'
          minItems: 1
          title: invalidParams
          type: array
        supportedFeatures:
          description: |
            A string used to indicate the features supported by an API that is used as defined in clause  6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in  hexadecimal representation Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in  table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
          pattern: "^[A-Fa-f0-9]*$"
          title: supportedFeatures
          type: string
        nrfId:
          description: Fully Qualified Domain Name
          maxLength: 253
          minLength: 4
          pattern: "^([0-9A-Za-z]([-0-9A-Za-z]{0,61}[0-9A-Za-z])?\\.)+[A-Za-z]{2,63}\\\
            .?$"
          title: Fqdn
          type: string
        supportedApiVersions:
          items:
            type: string
          minItems: 1
          title: supportedApiVersions
          type: array
      title: ProblemDetails
      type: object
    Qfi:
      description: "Unsigned integer identifying a QoS flow, within the range 0 to\
        \ 63."
      maximum: 63
      minimum: 0
      title: qfi
      type: integer
    QosPara:
      description: The values of the QoS parameters.
      example:
        rscType: rscType
        gbrDl: gbrDl
        maxPlrDl: 996
        maxDataBurstVol: 2737
        mbrDl: mbrDl
        "5qi": 190
        pdb: 1
        maxPlrUl: 502
        gbrUl: gbrUl
        priorityLvl: 15
        mbrUl: mbrUl
        qosParamSetId: qosParamSetId
        per: per
        avgWin: 3836
      properties:
        qosParamSetId:
          description: Identifies the QoS parameter set.
          title: qosParamSetId
          type: string
        "5qi":
          description: |
            Unsigned integer representing a 5G QoS Identifier (see clause 5.7.2.1 of 3GPP TS 23.501, within the range 0 to 255.
          maximum: 255
          minimum: 0
          title: 5Qi
          type: integer
        priorityLvl:
          description: "Unsigned integer indicating the 5QI Priority Level (see clauses\
            \ 5.7.3.3 and 5.7.4 of 3GPP TS 23.501, within the range 1 to 127.Values\
            \ are ordered in decreasing order of priority,  i.e. with 1 as the highest\
            \ priority and 127 as the lowest priority. \n"
          maximum: 127
          minimum: 1
          title: 5QiPriorityLevel
          type: integer
        rscType:
          description: "The enumeration QosResourceType indicates whether a QoS Flow\
            \ is non-GBR, delay critical GBR, or non-delay critical GBR (see clauses\
            \ 5.7.3.4 and 5.7.3.5 of 3GPP TS 23.501). It shall comply with the provisions\
            \ defined in table 5.5.3.6-1. \n"
          title: QosResourceType
          type: string
        pdb:
          description: |
            Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds.
          minimum: 1
          title: PacketDelBudget
          type: integer
        per:
          description: |
            String representing Packet Error Rate (see clause 5.7.3.5 and 5.7.4 of 3GPP TS 23.501, expressed as a "scalar x 10-k" where the scalar and the exponent k are each encoded as one decimal digit.
          pattern: "^([0-9]E-[0-9])$"
          title: PacketErrRate
          type: string
        gbrUl:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        gbrDl:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        mbrUl:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        mbrDl:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          title: BitRate
          type: string
        maxPlrUl:
          description: |
            Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
          maximum: 1000
          minimum: 0
          title: PacketLossRate
          type: integer
        maxPlrDl:
          description: |
            Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
          maximum: 1000
          minimum: 0
          title: PacketLossRate
          type: integer
        avgWin:
          default: 2000
          description: "Unsigned integer indicating Averaging Window (see clause 5.7.3.6\
            \ and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds. \n"
          maximum: 4095
          minimum: 1
          title: AverWindow
          type: integer
        maxDataBurstVol:
          description: "Unsigned integer indicating Maximum Data Burst Volume (see\
            \ clauses 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
          maximum: 4095
          minimum: 1
          title: MaxDataBurstVol
          type: integer
      title: QosPara
      type: object
    QosResourceType:
      description: "The enumeration QosResourceType indicates whether a QoS Flow is\
        \ non-GBR, delay critical GBR, or non-delay critical GBR (see clauses 5.7.3.4\
        \ and 5.7.3.5 of 3GPP TS 23.501). It shall comply with the provisions defined\
        \ in table 5.5.3.6-1. \n"
      title: QosResourceType
      type: string
    RatType:
      description: Indicates the radio access used.
      title: ratType
