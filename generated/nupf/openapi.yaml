          minimum: 0
          title: Uinteger
          type: integer
      required:
      - portManCont
      - portNum
      title: PortManagementContainer
      type: object
    TsnPortNumber:
      $ref: '#/components/schemas/Uinteger'
    Uinteger:
      description: "Unsigned Integer, i.e. only value 0 and integers above 0 are permissible."
      minimum: 0
      title: Uinteger
      type: integer
    BridgeManagementContainer:
      description: Contains the UMIC.
      example:
        bridgeManCont: bridgeManCont
      properties:
        bridgeManCont:
          description: string with format 'bytes' as defined in OpenAPI
          format: byte
          title: Bytes
          type: string
      required:
      - bridgeManCont
      title: BridgeManagementContainer
      type: object
    TrafficVolume:
      description: |
        String representing a Traffic Volume measured in bytes; the prefixes follow the symbols from The International System of Units, and represent x1000 multipliers.
      pattern: ^\d+(\.\d+)? (B|kB|MB|GB|TB)$
      title: TrafficVolume
      type: string
    Uint64:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 64-bit integer.
      minimum: 0
      title: Uint64
      type: integer
    PacketRate:
      description: |
        String representing a packet rate, i.e., packet per second; the prefixes follow the symbols from The International System of Units, and represent x1000 multipliers.
      pattern: ^\d+(\.\d+)? (pps|kpps|Mpps|Gpps|Tpps)$
      title: PacketRate
      type: string
    TransportProtocol:
      description: "Possible values are:\n- UDP: User Datagram Protocol.\n- TCP: Transmission\
        \ Control Protocol. \n"
      title: TransportProtocol
      type: string
    HeaderHandlingAction:
      description: |
        Represents the type of header handling actions.
        Possible values are:
        - DETECT: Indicates that the request is for the detection of a header field.
        - REMOVE: Indicates that the request is for the removal of a header field.
        - REPLACE: Indicates that the request is for the replacement of information in a header
          field.
        - INSERT: Indicates that the request is for the addition of a header field.
      title: HeaderHandlingAction
      type: string
    RecurTime:
