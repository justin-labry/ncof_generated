        path:
          description: |
            contains a JSON pointer value (as defined in IETF RFC 6901) that references a location of a resource on which the patch operation shall be performed.
          title: path
          type: string
        from:
          description: |
            indicates the path of the source JSON element (according to JSON Pointer syntax) being moved or copied to the location indicated by the "path" attribute.
          title: from
          type: string
        value:
          title: value
      required:
      - op
      - path
      title: PatchItem
      type: object
    PatchOperation:
      description: Operations as defined in IETF RFC 6902.
      title: op
      type: string
    PatchResult:
      description: The execution report result on failed modification.
      example:
        report:
        - path: path
          reason: reason
        - path: path
          reason: reason
      properties:
        report:
          description: |
            The execution report contains an array of report items. Each report item indicates one  failed modification.
          items:
            $ref: '#/components/schemas/ReportItem'
          minItems: 1
          title: report
          type: array
      required:
      - report
      title: PatchResult
      type: object
    ReportItem:
      description: indicates performed modivications.
      example:
        path: path
        reason: reason
      properties:
        path:
          description: |
            Contains a JSON pointer value (as defined in IETF RFC 6901) that references a  location of a resource to which the modification is subject.
          title: path
          type: string
        reason:
          description: |
            A human-readable reason providing details on the reported modification failure.  The reason string should identify the operation that failed using the operation's  array index to assist in correlation of the invalid parameter with the failed  operation, e.g. "Replacement value invalid for attribute (failed operation index= 4)".
          title: reason
          type: string
      required:
      - path
      title: ReportItem
      type: object
    SamplingRatio:
      description: "Unsigned integer indicating Sampling Ratio (see clauses 4.15.1\
        \ of 3GPP TS 23.502), expressed in percent. \n"
      maximum: 100
      minimum: 1
      title: SamplingRatio
      type: integer
    Ipv4Addr:
      description: |
        String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
      example: 198.51.100.1
      pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
      title: Ipv4Addr
      type: string
    Ipv6Prefix:
      description: |
        String identifying an IPv6 address prefix formatted according to clause 4 of RFC 5952. IPv6Prefix data type may contain an individual /128 IPv6 address.
      example: 2001:db8:abcd:12::0/64
      title: Ipv6Prefix
      type: string
    MacAddr48:
      description: |
        String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
      pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
      title: MacAddr48
      type: string
    Dnn:
      description: |
        String representing a Data Network as defined in clause 9A of 3GPP TS 23.003;  it shall contain either a DNN Network Identifier, or a full DNN with both the Network  Identifier and Operator Identifier, as specified in 3GPP TS 23.003 clause 9.1.1 and 9.1.2. It shall be coded as string in which the labels are separated by dots  (e.g. "Label1.Label2.Label3").
      title: Dnn
      type: string
    Snssai:
      description: |
        When Snssai needs to be converted to string (e.g. when used in maps as key), the string shall be composed of one to three digits "sst" optionally followed by "-" and 6 hexadecimal digits "sd".
      example:
        sd: sd
        sst: 26
      properties:
        sst:
          description: "Unsigned integer, within the range 0 to 255, representing\
            \ the Slice/Service Type.  It indicates the expected Network Slice behaviour\
            \ in terms of features and services. Values 0 to 127 correspond to the\
            \ standardized SST range. Values 128 to 255 correspond  to the Operator-specific\
            \ range. See clause 28.4.2 of 3GPP TS 23.003. Standardized values are\
            \ defined in clause 5.15.2.2 of 3GPP TS 23.501. \n"
          maximum: 255
          minimum: 0
          title: sst
          type: integer
        sd:
          description: |
            3-octet string, representing the Slice Differentiator, in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the SD shall appear first in the string, and the character representing the 4 least significant bit of the SD shall appear last in the string. This is an optional parameter that complements the Slice/Service type(s) to allow to  differentiate amongst multiple Network Slices of the same Slice/Service type. This IE shall be absent if no SD value is associated with the SST.
          pattern: "^[A-Fa-f0-9]{6}$"
          title: sd
          type: string
      required:
      - sst
      title: Snssai
      type: object
    Gpsi:
      description: "String identifying a Gpsi shall contain either an External Id\
        \ or an MSISDN.  It shall be formatted as follows -External Identifier= \"\
        extid-'extid', where 'extid'  shall be formatted according to clause 19.7.2\
        \ of 3GPP TS 23.003 that describes an  External Identifier. \n"
      pattern: "^(msisdn-[0-9]{5,15}|extid-[^@]+@[^@]+|.+)$"
      title: Gpsi
      type: string
    Supi:
      description: "String identifying a Supi that shall contain either an IMSI, a\
        \ network specific identifier,\na Global Cable Identifier (GCI) or a Global\
        \ Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS 23.003. It\
        \ shall be formatted as follows\n - for an IMSI \"imsi-<imsi>\", where <imsi>\
        \ shall be formatted according to clause 2.2\n   of 3GPP TS 23.003 that describes\
        \ an IMSI.\n - for a network specific identifier \"nai-<nai>, where <nai>\
        \ shall be formatted\n   according to clause 28.7.2 of 3GPP TS 23.003 that\
        \ describes an NAI.\n - for a GCI \"gci-<gci>\", where <gci> shall be formatted\
        \ according to clause 28.15.2\n   of 3GPP TS 23.003.\n - for a GLI \"gli-<gli>\"\
        , where <gli> shall be formatted according to clause 28.16.2 of\n   3GPP TS\
        \ 23.003.To enable that the value is used as part of an URI, the string shall\n\
        \   only contain characters allowed according to the \"lower-with-hyphen\"\
        \ naming convention\n   defined in 3GPP TS 29.501.\n"
      pattern: "^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$"
      title: Supi
      type: string
    DateTime:
      description: string with format "date-time" as defined in OpenAPI.
      format: date-time
      title: DateTime
      type: string
    RatType:
      description: Indicates the radio access used.
      title: RatType
      type: string
    NfInstanceId:
      description: "String uniquely identifying a NF instance. The format of the NF\
        \ Instance ID shall be a  Universally Unique Identifier (UUID) version 4.\
        \ \n"
      format: uuid
      title: nfId
      type: string
    IpAddr:
      description: Contains an IP adresse.
      example:
        ipv6Addr: 2001:db8:85a3::8a2e:370:7334
        ipv4Addr: 198.51.100.1
        ipv6Prefix: 2001:db8:abcd:12::0/64
      properties:
        ipv4Addr:
          description: |
            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          title: Ipv4Addr
          type: string
        ipv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        ipv6Prefix:
          $ref: '#/components/schemas/Ipv6Prefix'
      title: IpAddr
      type: object
    Ipv6Addr:
      description: |
        String identifying an IPv6 address formatted according to clause 4 of RFC5952. The mixed IPv4 IPv6 notation according to clause 5 of RFC5952 shall not be used.
      example: 2001:db8:85a3::8a2e:370:7334
      title: Ipv6Addr
      type: string
    Uint32:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 32-bit integer.
      maximum: 4294967295
      minimum: 0
      title: Uint32
      type: integer
    DurationSec:
      description: indicating a time in seconds.
      title: DurationSec
      type: integer
    PartitioningCriteria:
      description: |
        Possible values are:
        - "TAC": Type Allocation Code
        - "SUBPLMN": Subscriber PLMN ID
        - "GEOAREA": Geographical area, i.e. list(s) of TAI(s)
        - "SNSSAI": S-NSSAI
        - "DNN": DNN
      title: PartitioningCriteria
      type: string
    NotificationFlag:
      description: "Possible values are:\n- ACTIVATE: The event notification is activated.\n\
        - DEACTIVATE: The event notification is deactivated and shall be muted. The\
        \ available\n   event(s) shall be stored.\n- RETRIEVAL: The event notification\
        \ shall be sent to the NF service consumer(s),\n  after that, is muted again.\
        \ \n"
      title: NotificationFlag
      type: string
    MutingExceptionInstructions:
      description: |
        Indicates to an Event producer NF instructions for the subscription and stored events when an exception (e.g. full buffer) occurs at the Event producer NF while the event is muted.
      properties:
        bufferedNotifs:
          description: |
            Indicates the required action by the event producer NF on the buffered Notifications.
          title: BufferedNotificationsAction
          type: string
        subscription:
          description: |
            Indicates the required action by the event producer NF on the event subscription if an exception occurs while the event is muted.
          title: SubscriptionAction
          type: string
      title: MutingExceptionInstructions
      type: object
    BufferedNotificationsAction:
      description: |
        Indicates the required action by the event producer NF on the buffered Notifications.
      title: BufferedNotificationsAction
      type: string
    SubscriptionAction:
      description: |
        Indicates the required action by the event producer NF on the event subscription if an exception occurs while the event is muted.
      title: SubscriptionAction
      type: string
    MutingNotificationsSettings:
      description: |
        Indicates the Event producer NF settings to the Event consumer NF
      properties:
        maxNoOfNotif:
          title: maxNoOfNotif
          type: integer
        durationBufferedNotif:
          description: indicating a time in seconds.
          title: DurationSec
          type: integer
      title: MutingNotificationsSettings
      type: object
    ApplicationId:
      description: String providing an application identifier.
      title: ApplicationId
      type: string
    FlowInformation:
      description: Contains the flow information.
      example:
        flowLabel: flowLabel
        packFiltId: packFiltId
        flowDirection: flowDirection
        packetFilterUsage: true
        tosTrafficClass: tosTrafficClass
        mpxMediaDlInfos:
        - payloadType: 76
          rtcpPacketType: 152
          identificationTag: identificationTag
          ssrcId: 343953088
          rtpSdesHdrExtId: 0
        - payloadType: 76
          rtcpPacketType: 152
          identificationTag: identificationTag
          ssrcId: 343953088
          rtpSdesHdrExtId: 0
        spi: spi
        flowDescription: flowDescription
        ethFlowDescription:
          destMacAddr: destMacAddr
          destMacAddrEnd: destMacAddrEnd
          sourceMacAddr: sourceMacAddr
          fDir: fDir
          ethType: ethType
          fDesc: fDesc
          vlanTags:
          - vlanTags
          - vlanTags
          srcMacAddrEnd: srcMacAddrEnd
        mpxMediaUlInfos:
        - payloadType: 76
          rtcpPacketType: 152
          identificationTag: identificationTag
          ssrcId: 343953088
          rtpSdesHdrExtId: 0
        - payloadType: 76
          rtcpPacketType: 152
          identificationTag: identificationTag
          ssrcId: 343953088
          rtpSdesHdrExtId: 0
      properties:
        flowDescription:
          description: Defines a packet filter of an IP flow.
          title: FlowDescription
          type: string
        ethFlowDescription:
          $ref: '#/components/schemas/EthFlowDescription'
        packFiltId:
          description: An identifier of packet filter.
          title: packFiltId
          type: string
        packetFilterUsage:
          description: |
            Indicates whether the packet filter shall be sent to the UE. true indicates that Tthe packet filter shall be sent to the UE. false indicates that the packet filter shall not be sent to the UE.  The default value is "false" shall apply, if the attribute is not present and has not been supplied previously.
          title: packetFilterUsage
          type: boolean
        tosTrafficClass:
          description: |
            Contains the Ipv4 Type-of-Service and mask field or the Ipv6 Traffic-Class field and  mask field.
          nullable: true
          title: tosTrafficClass
          type: string
        spi:
          description: the security parameter index of the IPSec packet.
          nullable: true
          title: spi
          type: string
        flowLabel:
          description: the Ipv6 flow label header field.
          nullable: true
          title: flowLabel
          type: string
        flowDirection:
          description: "Indicates the direction of the service data flow.  \nPossible\
            \ values are:\n- DOWNLINK: The corresponding filter applies for traffic\
            \ to the UE.\n- UPLINK: The corresponding filter applies for traffic from\
            \ the UE.\n- BIDIRECTIONAL: The corresponding filter applies for traffic\
            \ both to and from the UE.\n- UNSPECIFIED: The corresponding filter applies\
            \ for traffic to the UE (downlink), but has no\nspecific direction declared.\
            \ The service data flow detection shall apply the filter for\nuplink traffic\
            \ as if the filter was bidirectional. The PCF shall not use the value\n\
            UNSPECIFIED in filters created by the network in NW-initiated procedures.\
            \ The PCF shall only\ninclude the value UNSPECIFIED in filters in UE-initiated\
            \ procedures if the same value is\nreceived from the SMF.\n"
          title: FlowDirection
          type: string
        mpxMediaUlInfos:
          description: Multiplexed media information for the Uplink IP flow.
          items:
            $ref: '#/components/schemas/MpxMediaInfo'
          minItems: 1
          title: mpxMediaUlInfos
          type: array
        mpxMediaDlInfos:
          description: Multiplexed media information for the Downlink IP flow.
          items:
            $ref: '#/components/schemas/MpxMediaInfo'
          minItems: 1
          title: mpxMediaDlInfos
          type: array
      title: FlowInformation
      type: object
    FlowDescription:
      description: Defines a packet filter of an IP flow.
      title: FlowDescription
      type: string
    EthFlowDescription:
      description: Identifies an Ethernet flow.
      example:
        destMacAddr: destMacAddr
        destMacAddrEnd: destMacAddrEnd
        sourceMacAddr: sourceMacAddr
        fDir: fDir
        ethType: ethType
        fDesc: fDesc
        vlanTags:
        - vlanTags
        - vlanTags
        srcMacAddrEnd: srcMacAddrEnd
      properties:
        destMacAddr:
          description: |
            String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
          pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
          title: MacAddr48
          type: string
        ethType:
          title: ethType
          type: string
        fDesc:
          description: Defines a packet filter of an IP flow.
          title: FlowDescription
          type: string
        fDir:
          description: "Indicates the direction of the service data flow.  \nPossible\
            \ values are:\n- DOWNLINK: The corresponding filter applies for traffic\
            \ to the UE.\n- UPLINK: The corresponding filter applies for traffic from\
            \ the UE.\n- BIDIRECTIONAL: The corresponding filter applies for traffic\
            \ both to and from the UE.\n- UNSPECIFIED: The corresponding filter applies\
            \ for traffic to the UE (downlink), but has no\nspecific direction declared.\
            \ The service data flow detection shall apply the filter for\nuplink traffic\
            \ as if the filter was bidirectional. The PCF shall not use the value\n\
            UNSPECIFIED in filters created by the network in NW-initiated procedures.\
            \ The PCF shall only\ninclude the value UNSPECIFIED in filters in UE-initiated\
            \ procedures if the same value is\nreceived from the SMF.\n"
          title: FlowDirection
          type: string
        sourceMacAddr:
          description: |
            String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
          pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
          title: MacAddr48
          type: string
        vlanTags:
          items:
            type: string
          maxItems: 2
          minItems: 1
          title: vlanTags
          type: array
        srcMacAddrEnd:
          description: |
            String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
          pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
          title: MacAddr48
          type: string
        destMacAddrEnd:
          description: |
            String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
          pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
          title: MacAddr48
          type: string
      required:
      - ethType
      title: EthFlowDescription
      type: object
    FlowDirection:
      description: "Indicates the direction of the service data flow.  \nPossible\
        \ values are:\n- DOWNLINK: The corresponding filter applies for traffic to\
        \ the UE.\n- UPLINK: The corresponding filter applies for traffic from the\
        \ UE.\n- BIDIRECTIONAL: The corresponding filter applies for traffic both\
        \ to and from the UE.\n- UNSPECIFIED: The corresponding filter applies for\
        \ traffic to the UE (downlink), but has no\nspecific direction declared. The\
        \ service data flow detection shall apply the filter for\nuplink traffic as\
        \ if the filter was bidirectional. The PCF shall not use the value\nUNSPECIFIED\
        \ in filters created by the network in NW-initiated procedures. The PCF shall\
        \ only\ninclude the value UNSPECIFIED in filters in UE-initiated procedures\
        \ if the same value is\nreceived from the SMF.\n"
      title: FlowDirection
      type: string
    FlowDirectionRm:
      $ref: '#/components/schemas/FlowDirection'
    MpxMediaInfo:
      anyOf: []
      description: Contains the Multiplexed Media Identification Information.
      example:
        payloadType: 76
        rtcpPacketType: 152
        identificationTag: identificationTag
        ssrcId: 343953088
        rtpSdesHdrExtId: 0
      nullable: true
      properties:
        ssrcId:
          description: |
            Integer where the allowed values correspond to the value range of an unsigned 32-bit integer.
          maximum: 4294967295
          minimum: 0
          title: Uint32
          type: integer
        payloadType:
          maximum: 127
          minimum: 0
          title: payloadType
          type: integer
        identificationTag:
          title: identificationTag
          type: string
        rtpSdesHdrExtId:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          title: Uinteger
          type: integer
        rtcpPacketType:
          maximum: 255
          minimum: 0
          title: rtcpPacketType
          type: integer
      title: MpxMediaInfo
      type: object
    Uint16:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 16-bit integer.
      maximum: 65535
      minimum: 0
      title: Uint16
      type: integer
    BitRate:
      description: |
        String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
      pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
      title: BitRate
      type: string
    PacketLossRate:
      description: |
        Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
      maximum: 1000
      minimum: 0
      title: PacketLossRate
      type: integer
    Float:
      description: string with format 'float' as defined in OpenAPI.
      format: float
      title: Float
      type: number
    PortManagementContainer:
      description: Contains the port management information container for a port.
      example:
        portNum: 0
        portManCont: portManCont
      properties:
        portManCont:
          description: string with format 'bytes' as defined in OpenAPI
          format: byte
          title: Bytes
          type: string
        portNum:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
