        startTime: 2000-01-23T04:56:07.000+00:00
        endTime: 2000-01-23T04:56:07.000+00:00
      properties:
        startTime:
          description: string with format "date-time" as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        endTime:
          description: string with format "date-time" as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
      title: ValidTimePeriod
      type: object
    RecurType:
      description: Indicates the recurrence applicable to a time window.
      title: RecurType
      type: string
    NullValue:
      description: JSON's null value.
      enum:
      - null
      type: string
    Bytes:
      description: string with format 'bytes' as defined in OpenAPI
      format: byte
      title: Bytes
      type: string
    MonthOfYear:
