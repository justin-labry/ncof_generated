        recurMonth:
        - null
        - null
        recurType: recurType
        recurDate:
        - null
        - null
        recurWeek:
        - 45
        - 45
        recurEndTime: 2000-01-23T04:56:07.000+00:00
        recurDay:
        - null
        - null
      properties:
        recurTimeWindow:
