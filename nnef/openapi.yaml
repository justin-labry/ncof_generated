    BaseEventRecord:
      description: Abstract base data type describing a single UE data record or summarising
        a set of UE data records.
      properties:
        recordType:
          $ref: '#/components/schemas/EventRecordType'
        recordTimestamp:
          description: string with format 'date-time' as defined in OpenAPI.
          format: date-time
          title: DateTime
          type: string
        appId:
          description: String providing an application identifier.
          title: ApplicationId
          type: string
        provisioningSessionId:
          description: String chosen by the 5GMS AF to serve as an identifier in a
            resource URI.
          title: ResourceId
          type: string
        sessionId:
          description: A unique identifier for a media delivery session.
          title: MediaDeliverySessionId
          type: string
        ueIdentification:
          description: GPSI of the requesting UE or a stable globally unique string
            identifying the requesting Media Session Handler. Present only for individual
            data sample record type and only when exposure is permitted by the data
            exposure restrictions in force for the event type in question.
          title: ueIdentification
          type: string
        dataNetworkName:
          description: |
            String representing a Data Network as defined in clause 9A of 3GPP TS 23.003;  it shall contain either a DNN Network Identifier, or a full DNN with both the Network  Identifier and Operator Identifier, as specified in 3GPP TS 23.003 clause 9.1.1 and 9.1.2. It shall be coded as string in which the labels are separated by dots  (e.g. "Label1.Label2.Label3").
          title: Dnn
          type: string
        sliceId:
          $ref: '#/components/schemas/Snssai'
        ueLocations:
          description: The location of the UE when the data described by this record
            was sampled. Present only for individual data sample record type and only
            when exposure is permitted by the data exposure restrictions in force
            for the event in question.
          items:
            $ref: '#/components/schemas/LocationArea5G'
          minItems: 0
          title: ueLocations
          type: array
