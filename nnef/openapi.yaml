    FlowInfo:
      description: Represents IP flow information.
      example:
        tosTC: tosTC
        flowDescriptions:
        - flowDescriptions
        - flowDescriptions
        flowId: 1
      properties:
        flowId:
          description: Indicates the IP flow identifier.
          title: flowId
