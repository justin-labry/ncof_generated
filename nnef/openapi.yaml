          maximum: 4294967295
          minimum: 0
          title: Uint32
          type: integer
        _maxRtt:
          description: |
            Integer where the allowed values correspond to the value range of an unsigned 32-bit integer.
          maximum: 4294967295
          minimum: 0
          title: Uint32
          type: integer
        _delayUl:
          description: |
            Integer where the allowed values correspond to the value range of an unsigned 32-bit integer.
          maximum: 4294967295
          minimum: 0
          title: Uint32
          type: integer
        _minDelayUl:
          description: |
            Integer where the allowed values correspond to the value range of an unsigned 32-bit integer.
          maximum: 4294967295
          minimum: 0
