[metadata]
name = nsmf_cb
version = 0.1.0
description = Callback receiver specification for the Nsmf_EventExposure service.  This spec is consumed by NCOF (the NF service consumer) that subscribes to SMF events. The consumer must implement an HTTP server that exposes the endpoint defined here so that SMF can deliver notifications to it.  It is intentionally extracted from &#x60;TS29508_Nsmf_EventExposure_PoC_ETRI_DoDo1.yaml&#x60; because OpenAPI Generator does not generate server stubs for the &#x60;callbacks:&#x60; section of an OpenAPI document. Generating from this standalone spec yields a ready-to-implement FastAPI server stub on the consumer side.  Schema simplifications applied for code-generator compatibility (the original &#x60;TS29508_Nsmf_EventExposure_PoC_ETRI_DoDo1.yaml&#x60; is unchanged):   - &#x60;oneOf&#x60; constraints are dropped (validation deferred to business logic).   - 3GPP forward-compatible enum pattern (&#x60;anyOf: [enum-string, free-string]&#x60;)     is flattened to plain &#x60;type: string&#x60;.   - All cross-file &#x60;$ref&#x60;s are inlined into this single document.  6G-I2P ETRI-MoDuTec PoC Scenario. 
long_description = file: README.md
keywords = OpenAPI Nsmf_EventExposure Notification (Callback Receiver)
python_requires = >= 3.7.*
classifiers =
    Operating System :: OS Independent
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3.7

[options]
install_requires = fastapi[all]
setup_requires = setuptools
package_dir = =src
packages = find_namespace:

[options.packages.find]
where = src
